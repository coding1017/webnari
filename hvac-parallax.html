<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thermostat Cooldown | HVAC</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
/* ---- TOKENS ---- */
:root {
  --black:    #050C18;
  --dark:     #0A1628;
  --surface:  #0F1E35;
  --surface2: #162540;
  --border:   #1E3A5F;
  --border2:  #274D78;
  --ice:      #38BDF8;
  --ice2:     #7DD3FC;
  --ice3:     #BAE6FD;
  --cyan:     #06B6D4;
  --white:    #EEF6FF;
  --muted:    #5A7A9A;
  --text:     #A8C4DC;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --radius:    12px;
  --radius-lg: 20px;
  --radius-sm: 6px;
  --glow: 0 0 40px rgba(56,189,248,0.14);
  --shadow: 0 20px 60px rgba(0,0,0,0.5);
}
/* ---- RESET ---- */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-body);
  background: var(--black);
  color: var(--text);
  overflow-x: hidden;
  line-height: 1.6;
}
img { display: block; max-width: 100%; }
a { color: inherit; text-decoration: none; }
/* ---- NOISE TEXTURE ---- */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.35;
}

/* ══════════════════════════════════════════════════════════════
   THERMOSTAT COOLDOWN PARALLAX — CSS
   ══════════════════════════════════════════════════════════════ */

/* ── Weather particle system: steam -> water droplets -> snowflakes ── */
.weather-particles { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; }

/* STEAM — narrow wispy columns rising from the bottom */
.steam-layer { position: absolute; inset: 0; }
.steam-v2 {
  position: absolute;
  border-radius: 50%;
  filter: blur(3.5px);
  will-change: transform, opacity;
  /* Tall pill with transparent ends = recognizable steam column */
  background: linear-gradient(to top,
    transparent 0%,
    rgba(215,230,242,0.55) 20%,
    rgba(220,235,245,0.72) 50%,
    rgba(215,230,242,0.55) 80%,
    transparent 100%);
}
@keyframes steamWisp {
  0%   { transform: translateY(0)      translateX(0)                   scaleX(1);   opacity: 0; }
  8%   { opacity: var(--sop); }
  35%  { transform: translateY(-32vh)  translateX(var(--sx))            scaleX(1.5); opacity: calc(var(--sop)*0.7); }
  70%  { transform: translateY(-65vh)  translateX(calc(var(--sx)*-0.4)) scaleX(1.8); opacity: calc(var(--sop)*0.25); }
  100% { transform: translateY(-100vh) translateX(var(--sx))            scaleX(0.6); opacity: 0; }
}

/* WATER DROPLETS — condensation drops sliding DOWN the screen */
.droplet-layer { position: absolute; inset: 0; }
.water-drop {
  position: absolute;
  will-change: transform, opacity;
}
@keyframes dropSlide {
  0%   { transform: translateY(var(--dy-start)) translateX(0);              opacity: 0; }
  6%   { opacity: var(--dop); }
  /* slight hesitation — surface tension holding the drop */
  18%  { transform: translateY(calc(var(--dy-start) + 4px)) translateX(2px);  opacity: var(--dop); }
  /* break free and accelerate down */
  85%  { opacity: calc(var(--dop)*0.7); }
  100% { transform: translateY(110vh) translateX(var(--ddx));               opacity: 0; }
}

/* SNOWFLAKES — drift from top to bottom, sway, rotate */
.snowflake-layer { position: absolute; inset: 0; }
.snow-flake {
  position: absolute;
  top: -60px;
  will-change: transform, opacity;
}
@keyframes snowDrift {
  0%   { transform: translateY(-40px) translateX(0)           rotate(0deg);           opacity: 0; }
  6%   { opacity: var(--sfop); }
  94%  { opacity: calc(var(--sfop) * 0.55); }
  100% { transform: translateY(112vh)  translateX(var(--sfdx)) rotate(var(--sfrot));   opacity: 0; }
}

/* ── Parallax sequence wrapper ── */
.hvac-sequence {
  position: relative;
  height: 500vh;
}

/* ── Glow halos (behind everything) ── */
.glow-halos { position: absolute; inset: 0; z-index: 1; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.glow-halo { position: absolute; border-radius: 50%; pointer-events: none; }
@keyframes haloPulse { 0%,100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.06); opacity: 0.65; } }

/* ── Orbital rings ── */
.orbit-rings { position: absolute; inset: 0; z-index: 2; pointer-events: none; display: flex; align-items: center; justify-content: center; }
.orbit-ring { position: absolute; border-radius: 50%; will-change: transform; }
.orbit-ring-1 { width: 430px; height: 430px; border: 1px dashed rgba(220,80,20,0.18); animation: orbitSpin 14s linear infinite; }
.orbit-ring-2 { width: 570px; height: 570px; border: 1px solid rgba(220,80,20,0.10); animation: orbitSpin 24s linear infinite reverse; }
.orbit-ring-3 { width: 730px; height: 730px; border: 1px dashed rgba(220,80,20,0.06); animation: orbitSpin 40s linear infinite; }
@keyframes orbitSpin { to { transform: rotate(360deg); } }

/* ── Pulsing rings ── */
.pulse-ring {
  position: absolute; top: 50%; left: 50%;
  width: 370px; height: 370px; border-radius: 50%;
  border: 1px solid rgba(220,80,20,0.45);
  transform: translate(-50%,-50%) scale(1);
  animation: ringPulse 2.4s ease-out infinite;
  pointer-events: none; z-index: 2;
}
.pulse-ring-b { animation-delay: 0.8s; width: 390px; height: 390px; border-color: rgba(220,80,20,0.3); }
.pulse-ring-c { animation-delay: 1.6s; width: 410px; height: 410px; border-color: rgba(220,80,20,0.15); }
@keyframes ringPulse {
  0%   { transform: translate(-50%,-50%) scale(0.92); opacity: 0.8; }
  100% { transform: translate(-50%,-50%) scale(1.22); opacity: 0; }
}

/* ── Ambient particle field ── */
.ambient-field { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.amb-dot { position: absolute; border-radius: 50%; will-change: transform, opacity; }
@keyframes ambFloat {
  0%   { transform: translate(0, 0) scale(1);    opacity: var(--aop); }
  33%  { transform: translate(var(--adx), -18px) scale(1.15); opacity: calc(var(--aop) * 1.6); }
  66%  { transform: translate(calc(var(--adx) * -0.5), -8px) scale(0.9); opacity: calc(var(--aop) * 0.7); }
  100% { transform: translate(0, 0) scale(1);    opacity: var(--aop); }
}

/* ── Data stream numbers (hot phase) ── */
.data-stream { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.data-num { position: absolute; font-family: var(--font-head); font-size: 10px; font-weight: 700; letter-spacing: 0.12em; will-change: transform, opacity; }
@keyframes dataRise {
  0%   { transform: translateY(50px); opacity: 0; }
  12%  { opacity: 1; }
  85%  { opacity: 0.45; }
  100% { transform: translateY(-90px); opacity: 0; }
}

/* ── Corner HUD panels ── */
.hud-panel {
  position: absolute; z-index: 4; pointer-events: none;
  font-family: var(--font-head);
  padding: 14px 18px;
  border: 1px solid rgba(255,255,255,0.07);
  background: rgba(0,0,0,0.35);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  min-width: 148px;
  border-radius: 6px;
}
.hud-tl { top: 80px; left: 36px; }
.hud-tr { top: 80px; right: 36px; text-align: right; }
.hud-bl { bottom: 72px; left: 36px; }
.hud-br { bottom: 72px; right: 36px; text-align: right; }
.hud-row { margin-bottom: 10px; }
.hud-row:last-child { margin-bottom: 0; }
.hud-lbl { font-size: 8px; font-weight: 700; letter-spacing: 0.22em; text-transform: uppercase; color: rgba(255,255,255,0.2); margin-bottom: 3px; }
.hud-val { font-size: 17px; font-weight: 900; letter-spacing: 0.02em; color: rgba(255,255,255,0.45); transition: color 0.4s; }
.hud-bar { height: 2px; background: rgba(255,255,255,0.07); margin-top: 5px; border-radius: 2px; overflow: hidden; }
.hud-bar-fill { height: 100%; border-radius: 2px; transition: width 0.6s ease, background 0.5s ease; }
.hud-sep { height: 1px; background: rgba(255,255,255,0.05); margin: 9px 0; }

/* ── Scan line ── */
.scan-line {
  position: absolute; left: 0; right: 0; height: 1px;
  z-index: 3; pointer-events: none; top: -2px;
  animation: scanSweep 5s ease-in-out infinite;
}
@keyframes scanSweep {
  0%   { top: -2px;   opacity: 0; }
  4%   { opacity: 0.7; }
  96%  { opacity: 0.2; }
  100% { top: 102%;   opacity: 0; }
}

/* ── Frost crystal layer ── */
.frost-layer { position: absolute; inset: 0; z-index: 3; pointer-events: none; overflow: hidden; opacity: 0; transition: opacity 0.8s ease; }
.frost-crystal { position: absolute; }
@keyframes crystallize {
  0%   { transform: scale(0) rotate(0deg);   opacity: 0; }
  50%  { opacity: 0.7; }
  100% { transform: scale(1) rotate(45deg);  opacity: 0.45; }
}

/* ── Arc needle dot ── */
.arc-needle-dot {
  position: absolute;
  width: 10px; height: 10px; border-radius: 50%;
  background: rgb(220,50,15);
  top: 50%; left: 50%;
  transform-origin: 0 0;
  pointer-events: none;
  box-shadow: 0 0 8px 2px rgba(220,50,15,0.6);
  transition: background 0.3s, box-shadow 0.3s;
}

/* ── Sticky scene ── */
.hvac-scene {
  position: sticky;
  top: 0;
  height: 100vh;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #1C0300;
}

/* ── Large ghost temperature number behind everything ── */
.temp-ghost {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-family: var(--font-head);
  font-size: 42vw;
  font-weight: 900;
  letter-spacing: -0.06em;
  line-height: 1;
  color: rgba(255,255,255,0.025);
  pointer-events: none;
  z-index: 1;
  white-space: nowrap;
  user-select: none;
}

/* ── Heat shimmer lines (rise upward, phase 1) ── */
.heat-shimmer { position: absolute; inset: 0; z-index: 1; pointer-events: none; overflow: hidden; }
.heat-line {
  position: absolute;
  left: -5%; right: -5%;
  height: 1px;
  background: linear-gradient(90deg, transparent 5%, rgba(255,110,20,0.35) 30%, rgba(255,70,10,0.25) 65%, transparent 95%);
  will-change: transform, opacity;
}
@keyframes heatRise {
  0%   { transform: translateY(0) scaleX(1.0); opacity: 0; }
  15%  { opacity: 1; }
  85%  { opacity: 0.4; }
  100% { transform: translateY(-110px) scaleX(1.06); opacity: 0; }
}

/* ── Central thermostat ring ── */
.thermo-ring-wrap {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 3;
  display: flex; align-items: center; justify-content: center;
}
.thermo-svg {
  width: 340px; height: 340px;
  overflow: visible;
  filter: drop-shadow(0 0 48px rgba(220,50,10,0.35));
  transition: filter 0.5s ease;
}
/* Temperature text centered over SVG */
.thermo-text-wrap {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  pointer-events: none;
}
.seq-temp-num {
  font-family: var(--font-head);
  font-size: 82px;
  font-weight: 900;
  line-height: 0.85;
  letter-spacing: -0.04em;
  color: rgb(235, 110, 50);
  transition: color 0.25s ease;
}
.seq-temp-sup {
  font-family: var(--font-head);
  font-size: 30px;
  font-weight: 700;
  vertical-align: super;
  line-height: 1;
}
.seq-temp-unit {
  font-family: var(--font-head);
  font-size: 24px;
  font-weight: 700;
}
.seq-temp-label {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: rgba(255,255,255,0.3);
  margin-top: 12px;
  transition: color 0.5s;
}

/* ── AC schematic (fades in during phase 2-3) ── */
.ac-schematic-layer {
  position: absolute;
  bottom: 0; left: 50%;
  transform: translateX(-50%);
  z-index: 2;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.6s ease;
  width: 100%; max-width: 760px;
}
.ac-schematic-svg { width: 100%; color: var(--ice); }
/* Animated refrigerant flow lines */
.refrig-hot  { stroke: rgba(220,90,20,0.5);  stroke-dasharray: 8 5; animation: refrigFlow 1.8s linear infinite reverse; }
.refrig-cold { stroke: rgba(56,189,248,0.5); stroke-dasharray: 8 5; animation: refrigFlow 1.8s linear infinite; }
@keyframes refrigFlow { to { stroke-dashoffset: -52; } }

/* ── Cool air particles (radiate outward, phase 3) ── */
.cool-streams { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
.cool-dot {
  position: absolute;
  border-radius: 50%;
  background: var(--ice);
  opacity: 0;
  will-change: transform, opacity;
}
@keyframes coolSpread {
  0%   { transform: translate(0, 0) scale(1);   opacity: 0; }
  18%  { opacity: 0.85; }
  80%  { opacity: 0.3; }
  100% { transform: translate(var(--tx), var(--ty)) scale(0.4); opacity: 0; }
}

/* ── Phase label + scrub bar ── */
.seq-phase-lbl {
  position: absolute;
  bottom: 56px; left: 50%; transform: translateX(-50%);
  z-index: 5;
  font-family: var(--font-head);
  font-size: 11px; font-weight: 700;
  letter-spacing: 0.24em; text-transform: uppercase;
  color: rgba(255,255,255,0.25); text-align: center;
  white-space: nowrap; pointer-events: none;
}
.seq-scrub { position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: rgba(255,255,255,0.05); z-index: 5; }
.seq-scrub-fill { height: 100%; width: 0%; background: rgba(220,50,10,0.8); transition: background 0.5s ease; }

/* ── Scroll hint ── */
.seq-scroll-hint {
  position: absolute;
  bottom: 26px; left: 50%; transform: translateX(-50%);
  z-index: 6;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
  font-family: var(--font-head); font-size: 10px; font-weight: 700;
  letter-spacing: 0.22em; text-transform: uppercase;
  color: rgba(255,255,255,0.28); transition: opacity 0.3s;
}
.seq-hint-arrow {
  width: 14px; height: 14px;
  border-right: 1.5px solid rgba(255,255,255,0.22);
  border-bottom: 1.5px solid rgba(255,255,255,0.22);
  transform: rotate(45deg);
  animation: hintBounce 2s ease-in-out infinite;
}
@keyframes hintBounce {
  0%, 100% { transform: rotate(45deg) translateY(0); }
  50%       { transform: rotate(45deg) translateY(5px); }
}

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  .thermo-svg { width: 210px !important; height: 210px !important; }
  .seq-temp-num { font-size: 52px !important; }
  .orbit-ring-1 { width: 240px !important; height: 240px !important; }
  .orbit-ring-2 { width: 310px !important; height: 310px !important; }
  .orbit-ring-3 { width: 380px !important; height: 380px !important; }
  .pulse-ring { width: 220px !important; height: 220px !important; }
  .pulse-ring-b { width: 240px !important; height: 240px !important; }
  .pulse-ring-c { width: 260px !important; height: 260px !important; }
  .ac-schematic-layer { display: none !important; }
}
</style>
</head>
<body>

<!-- ══════════════ THERMOSTAT COOLDOWN SEQUENCE ════════════════════ -->
<div class="hvac-sequence" id="hvac-seq">
  <div class="hvac-scene" id="hvac-scene">

    <!-- ── Layer 1: Glow halos (deepest) ── -->
    <div class="glow-halos" id="glow-halos">
      <div class="glow-halo" id="halo-1" style="width:280px;height:280px;background:radial-gradient(circle,rgba(220,50,10,0.22) 0%,transparent 70%);animation:haloPulse 3s ease-in-out infinite;"></div>
      <div class="glow-halo" id="halo-2" style="width:500px;height:500px;background:radial-gradient(circle,rgba(220,50,10,0.1) 0%,transparent 70%);animation:haloPulse 4.5s ease-in-out 1.2s infinite;"></div>
      <div class="glow-halo" id="halo-3" style="width:800px;height:800px;background:radial-gradient(circle,rgba(220,50,10,0.04) 0%,transparent 70%);animation:haloPulse 6s ease-in-out 2.5s infinite;"></div>
    </div>

    <!-- ── Layer 2: Ambient particle field ── -->
    <div class="ambient-field" id="ambient-field"></div>

    <!-- ── Layer 3: Orbital rings ── -->
    <div class="orbit-rings" id="orbit-rings">
      <div class="orbit-ring orbit-ring-1" id="orbit-1"></div>
      <div class="orbit-ring orbit-ring-2" id="orbit-2"></div>
      <div class="orbit-ring orbit-ring-3" id="orbit-3"></div>
    </div>

    <!-- ── Pulsing rings behind thermostat ── -->
    <div class="pulse-ring" id="pulse-ring-a"></div>
    <div class="pulse-ring pulse-ring-b" id="pulse-ring-b"></div>
    <div class="pulse-ring pulse-ring-c" id="pulse-ring-c"></div>

    <!-- Giant background ghost temperature number -->
    <div class="temp-ghost" id="temp-ghost">95</div>

    <!-- Heat shimmer lines (phase 1) — generated by JS -->
    <div class="heat-shimmer" id="heat-shimmer"></div>

    <!-- Data stream numbers (hot phase) — generated by JS -->
    <div class="data-stream" id="data-stream"></div>

    <!-- ── Central thermostat ring ── -->
    <div class="thermo-ring-wrap" id="thermo-ring-wrap">
      <svg class="thermo-svg" id="thermo-svg" viewBox="0 0 300 300" fill="none" xmlns="http://www.w3.org/2000/svg">
        <!-- Outer decorative ring -->
        <circle cx="150" cy="150" r="140" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>
        <!-- Background dim arc — full 270 range -->
        <circle cx="150" cy="150" r="120"
          stroke="rgba(255,255,255,0.07)" stroke-width="10" fill="none"
          stroke-linecap="round"
          transform="rotate(-135,150,150)"
          stroke-dasharray="565.5 753.98"/>
        <!-- Active temperature arc — color + length driven by JS -->
        <circle id="thermo-arc" cx="150" cy="150" r="120"
          stroke="rgb(220,50,15)" stroke-width="10" fill="none"
          stroke-linecap="round"
          transform="rotate(-135,150,150)"
          stroke-dasharray="509 753.98"/>
        <!-- Tick marks — generated by JS -->
        <g id="thermo-ticks"></g>
      </svg>
      <!-- Temperature text overlay -->
      <div class="thermo-text-wrap">
        <div class="seq-temp-num" id="seq-temp-num">
          <span id="temp-digits">95</span><span class="seq-temp-sup">&deg;</span><span class="seq-temp-unit">F</span>
        </div>
        <div class="seq-temp-label" id="seq-temp-label">Inside Temperature</div>
      </div>
    </div>

    <!-- ── AC system schematic (fades in phase 2-3) ── -->
    <div class="ac-schematic-layer" id="ac-schematic">
      <svg class="ac-schematic-svg" viewBox="0 0 760 180" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" xmlns="http://www.w3.org/2000/svg">
        <!-- Outdoor condenser unit -->
        <rect x="20" y="20" width="150" height="150" rx="10" stroke="rgba(56,189,248,0.35)"/>
        <!-- Fan circle -->
        <circle cx="95" cy="75" r="38" stroke="rgba(56,189,248,0.4)"/>
        <!-- Fan blades (4) -->
        <path d="M95 37 C100 52 100 63 95 75 C90 63 90 52 95 37" stroke="rgba(56,189,248,0.5)" fill="none"/>
        <path d="M133 75 C118 70 107 70 95 75 C107 80 118 80 133 75" stroke="rgba(56,189,248,0.5)" fill="none"/>
        <path d="M95 113 C90 98 90 87 95 75 C100 87 100 98 95 113" stroke="rgba(56,189,248,0.5)" fill="none"/>
        <path d="M57 75 C72 80 83 80 95 75 C83 70 72 70 57 75" stroke="rgba(56,189,248,0.5)" fill="none"/>
        <!-- Fan hub -->
        <circle cx="95" cy="75" r="6" stroke="rgba(56,189,248,0.6)" fill="rgba(56,189,248,0.1)"/>
        <!-- Compressor (bottom of outdoor unit) -->
        <rect x="60" y="128" width="70" height="32" rx="6" stroke="rgba(56,189,248,0.3)"/>
        <text x="95" y="148" text-anchor="middle" font-size="10" stroke="none" fill="rgba(56,189,248,0.5)" font-family="'Barlow Condensed',sans-serif" font-weight="700" letter-spacing="0.1em">COMP</text>
        <!-- Label -->
        <text x="95" y="15" text-anchor="middle" font-size="9" stroke="none" fill="rgba(56,189,248,0.3)" font-family="'Barlow Condensed',sans-serif" font-weight="700" letter-spacing="0.16em">CONDENSER</text>

        <!-- Refrigerant lines (hot line top, cold line bottom) -->
        <path class="refrig-hot"  d="M 170 55  C 240 55  280 55  380 55  C 480 55  520 55  590 55"/>
        <path class="refrig-cold" d="M 170 125 C 240 125 280 125 380 125 C 480 125 520 125 590 125"/>
        <!-- Flow direction arrows -->
        <polyline points="310,48 322,55 310,62" stroke="rgba(220,90,20,0.5)" stroke-width="1.5"/>
        <polyline points="450,118 438,125 450,132" stroke="rgba(56,189,248,0.5)" stroke-width="1.5"/>

        <!-- Indoor air handler unit -->
        <rect x="590" y="20" width="150" height="150" rx="10" stroke="rgba(56,189,248,0.35)"/>

    </div>

    <!-- Cool air particles (phase 3+) — generated by JS -->
    <div class="cool-streams" id="cool-streams"></div>

    <!-- Bottom-left: PSI + Load -->
    <div class="hud-panel hud-bl" id="hud-bl">

        <div class="hud-val" id="readout-target">68&deg;F</div>

    <!-- Phase label -->
    <div class="seq-phase-lbl" id="seq-phase-lbl">Indoor Temperature Critical</div>

    <!-- Scrub bar -->

    <!-- Scroll hint -->

      <span>Scroll</span>
      <div class="seq-hint-arrow"></div>
    </div>

  </div>

<script>
/* ══════════════════════════════════════════════════════════════
   THERMOSTAT COOLDOWN — Scroll-Driven Parallax Animation
   ══════════════════════════════════════════════════════════════ */
(function() {
  const seq = document.getElementById('hvac-seq');
  if (!seq) return;

  // ── DOM refs ─────────────────────────────────────────────────
  const scene        = document.getElementById('hvac-scene');
  const tempDigits   = document.getElementById('temp-digits');
  const tempGhost    = document.getElementById('temp-ghost');
  const thermoArc    = document.getElementById('thermo-arc');
  const heatShimmer  = document.getElementById('heat-shimmer');
  const coolStreams   = document.getElementById('cool-streams');
  const acSchematic  = document.getElementById('ac-schematic');
  const scrubFill    = document.getElementById('seq-scrub-fill');
  const phaseLbl     = document.getElementById('seq-phase-lbl');
  const hintArrow    = document.querySelector('.seq-hint-arrow');
  const thermoSvg    = document.querySelector('.thermo-svg');
  const ringWrap     = document.getElementById('thermo-ring-wrap');
  const ambField     = document.getElementById('ambient-field');
  const dataStream   = document.getElementById('data-stream');
  const frostLayer   = document.getElementById('frost-layer');
  const scanLine     = document.getElementById('scan-line');
  const orbit1       = document.getElementById('orbit-1');
  const orbit2       = document.getElementById('orbit-2');
  const orbit3       = document.getElementById('orbit-3');
  const halo1        = document.getElementById('halo-1');
  const halo2        = document.getElementById('halo-2');
  const halo3        = document.getElementById('halo-3');
  const pulseA       = document.getElementById('pulse-ring-a');
  const pulseB       = document.getElementById('pulse-ring-b');
  const pulseC       = document.getElementById('pulse-ring-c');
  const readoutOD    = document.getElementById('readout-outdoor');
  const readoutSt    = document.getElementById('readout-status');
  const readoutHum   = document.getElementById('readout-humidity');
  const readoutEff   = document.getElementById('readout-efficiency');
  const readoutPsi   = document.getElementById('readout-psi');
  const readoutLoad  = document.getElementById('readout-load');
  const readoutRun   = document.getElementById('readout-runtime');
  const humBar       = document.getElementById('humidity-bar');
  const effBar       = document.getElementById('efficiency-bar');
  const loadBar      = document.getElementById('load-bar');
  // Weather system
  const steamLayer   = document.getElementById('steam-layer');
  const dropletLayer = document.getElementById('droplet-layer');
  const snowLayer    = document.getElementById('snowflake-layer');

  // ── Constants ────────────────────────────────────────────────
  const CIRC = 753.98, SPAN = 565.5;
  const TEMP_HOT = 95, TEMP_COOL = 68;
  function tempToArc(t) { return Math.max(0, ((t - 50) / 50) * SPAN); }

  // ── Helpers ──────────────────────────────────────────────────
  function lerp(a, b, t) { return a + (b - a) * t; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function lerpRGB(c1, c2, t) {
    t = clamp(t, 0, 1);
    return [Math.round(lerp(c1[0],c2[0],t)), Math.round(lerp(c1[1],c2[1],t)), Math.round(lerp(c1[2],c2[2],t))];
  }
  function multiStop(stops, p) {
    let i = 0;
    while (i < stops.length - 2 && p >= stops[i+1].p) i++;
    const a = stops[i], b = stops[i+1];
    const t = (p - a.p) / (b.p - a.p);
    return lerpRGB(a.c, b.c, t);
  }

  // ── Color tables ─────────────────────────────────────────────
  const bgStops = [
    {p:0.00,c:[28,3,0]}, {p:0.25,c:[18,4,0]},
    {p:0.45,c:[6,11,22]}, {p:0.70,c:[5,12,24]}, {p:1.00,c:[4,10,28]}
  ];
  const arcStops = [
    {p:0.00,c:[220,50,15]}, {p:0.30,c:[240,130,20]},
    {p:0.60,c:[200,200,40]}, {p:0.85,c:[56,189,248]}
  ];
  function bgColor(p)  { const [r,g,b]=multiStop(bgStops,p);  return `rgb(${r},${g},${b})`; }
  function arcColor(p) { const [r,g,b]=multiStop(arcStops,p); return `rgb(${r},${g},${b})`; }
  function arcArr(p)   { return multiStop(arcStops, p); }

  // ── Build: heat shimmer lines ─────────────────────────────────
  for (let i = 0; i < 18; i++) {
    const el = document.createElement('div');
    el.className = 'heat-line';
    const top = 15 + Math.random() * 70;
    const delay = Math.random() * 3;
    const dur   = 1.6 + Math.random() * 1.6;
    el.style.cssText = `top:${top}%; animation:heatRise ${dur}s ${delay}s ease-out infinite;`;
    heatShimmer.appendChild(el);
  }

  // ── Build: ambient particle field ────────────────────────────
  const ambDots = [];
  for (let i = 0; i < 90; i++) {
    const el = document.createElement('div');
    el.className = 'amb-dot';
    const size  = 2 + Math.random() * 3;
    const left  = Math.random() * 100;
    const top   = Math.random() * 100;
    const dur   = 4 + Math.random() * 5;
    const delay = Math.random() * 6;
    const adx   = (-8 + Math.random() * 16).toFixed(1);
    const aop   = (0.15 + Math.random() * 0.35).toFixed(2);
    el.style.cssText = `width:${size}px;height:${size}px;left:${left}%;top:${top}%;
      --aop:${aop};--adx:${adx}px;
      background:rgba(220,80,20,0.6);
      animation:ambFloat ${dur}s ${delay}s ease-in-out infinite;`;
    ambField.appendChild(el);
    ambDots.push(el);
  }

  // ── Build: cool-air particles ─────────────────────────────────
  for (let i = 0; i < 30; i++) {
    const el = document.createElement('div');
    el.className = 'cool-dot';
    const angle = (i / 30) * 360 + Math.random() * 12;
    const dist  = 160 + Math.random() * 180;
    const rad   = angle * Math.PI / 180;
    const tx    = Math.round(Math.cos(rad) * dist);
    const ty    = Math.round(Math.sin(rad) * dist);
    const delay = (i / 30) * 2.2;
    const dur   = 1.6 + Math.random() * 1.0;
    const size  = 4 + Math.random() * 5;
    el.style.cssText = `--tx:${tx}px;--ty:${ty}px;
      position:absolute;top:50%;left:50%;
      width:${size}px;height:${size}px;border-radius:50%;
      background:rgba(56,189,248,0.8);
      transform:translate(-50%,-50%);
      animation:coolSpread ${dur}s ${delay}s ease-out infinite;
      pointer-events:none;`;
    coolStreams.appendChild(el);
  }

  // ── Build: thermostat tick marks ──────────────────────────────
  (function() {
    const ns='http://www.w3.org/2000/svg', CX=150, CY=150;
    for (let i = 0; i <= 10; i++) {
      const deg = 225 + (270/10)*i;
      const rad = deg*Math.PI/180;
      const isMajor = i%2===0;
      const r1 = isMajor ? 122 : 124, r2 = isMajor ? 136 : 132;
      const line = document.createElementNS(ns,'line');
      line.setAttribute('x1',(CX+Math.cos(rad)*r1).toFixed(2));
      line.setAttribute('y1',(CY+Math.sin(rad)*r1).toFixed(2));
      line.setAttribute('x2',(CX+Math.cos(rad)*r2).toFixed(2));
      line.setAttribute('y2',(CY+Math.sin(rad)*r2).toFixed(2));
      line.setAttribute('stroke', isMajor ? 'rgba(255,255,255,0.35)' : 'rgba(255,255,255,0.14)');
      line.setAttribute('stroke-width', isMajor ? '2' : '1');
      thermoSvg.appendChild(line);
    }
  })();

  // ── Build: steam wisps — tall narrow columns, NOT blobs ───────
  for (let i = 0; i < 24; i++) {
    const el = document.createElement('div');
    el.className = 'steam-v2';
    const lp  = 2 + Math.random() * 96;
    const w   = 5 + Math.random() * 8;
    const h   = 90 + Math.random() * 120;
    const dur = 2.2 + Math.random() * 2.8;
    const del = Math.random() * 5;
    const sx  = (-18 + Math.random() * 36).toFixed(1);
    const sop = (0.35 + Math.random() * 0.40).toFixed(2);
    el.style.cssText = `left:${lp}%;bottom:0;width:${w}px;height:${h}px;
      --sx:${sx}px;--sop:${sop};
      animation:steamWisp ${dur}s ${del}s ease-out infinite;`;
    steamLayer.appendChild(el);
  }

  // ── Build: condensation drops that SLIDE DOWN the screen ──────
  (function() {
    const ns2 = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < 38; i++) {
      const svg2 = document.createElementNS(ns2,'svg');
      const bodyR  = 3 + Math.random() * 5;
      const trailH = bodyR * 3 + Math.random() * bodyR * 4;
      const totalH = bodyR * 2 + trailH + 4;
      const w      = bodyR * 2 + 4;
      svg2.setAttribute('viewBox', `0 0 ${w} ${totalH}`);
      svg2.setAttribute('width',  w);
      svg2.setAttribute('height', totalH);

      const cx = w / 2;
      const streak = document.createElementNS(ns2,'line');
      streak.setAttribute('x1', cx); streak.setAttribute('y1', 0);
      streak.setAttribute('x2', cx); streak.setAttribute('y2', trailH);
      streak.setAttribute('stroke','rgba(100,185,240,0.35)');
      streak.setAttribute('stroke-width', (bodyR * 0.5).toFixed(1));
      streak.setAttribute('stroke-linecap','round');
      svg2.appendChild(streak);
      const circle = document.createElementNS(ns2,'circle');
      circle.setAttribute('cx', cx);
      circle.setAttribute('cy', trailH + bodyR + 2);
      circle.setAttribute('r',  bodyR);
      circle.setAttribute('fill','rgba(56,165,225,0.65)');
      svg2.appendChild(circle);
      const hl = document.createElementNS(ns2,'circle');
      hl.setAttribute('cx', cx - bodyR*0.3);
      hl.setAttribute('cy', trailH + bodyR + 2 - bodyR*0.25);
      hl.setAttribute('r',  bodyR * 0.38);
      hl.setAttribute('fill','rgba(255,255,255,0.42)');
      svg2.appendChild(hl);

      const lp     = 2  + Math.random() * 96;
      const dyStart= -(10 + Math.random() * 60);
      const ddx    = (-30 + Math.random() * 60).toFixed(0);
      const dur    = 3.5 + Math.random() * 5;
      const del    = Math.random() * 7;
      const dop    = (0.55 + Math.random() * 0.38).toFixed(2);
      svg2.style.cssText = `position:absolute;left:${lp}%;top:${5+Math.random()*55}%;
        --dy-start:${dyStart}px;--ddx:${ddx}px;--dop:${dop};
        filter:drop-shadow(0 1px 3px rgba(56,189,248,0.25));
        animation:dropSlide ${dur}s ${del}s ease-in infinite;`;
      dropletLayer.appendChild(svg2);
    }
  })();

  // ── Build: snowflakes (drift top -> bottom) ────────────────────
  (function() {
    const ns2 = 'http://www.w3.org/2000/svg';
    for (let i = 0; i < 32; i++) {
      const svg2 = document.createElementNS(ns2,'svg');
      const sz   = 14 + Math.random() * 22;
      const lp   = Math.random() * 98;
      const dur  = 6  + Math.random() * 8;
      const del  = Math.random() * 8;
      const sfdx = (-80 + Math.random() * 160).toFixed(0);
      const sfrot= (180 + Math.random() * 360).toFixed(0);
      const sfop = (0.45 + Math.random() * 0.45).toFixed(2);
      svg2.setAttribute('viewBox','-14 -14 28 28');
      svg2.setAttribute('width', sz); svg2.setAttribute('height', sz);
      svg2.style.cssText = `position:absolute;left:${lp}%;top:-50px;
        --sfop:${sfop};--sfdx:${sfdx}px;--sfrot:${sfrot}deg;
        animation:snowDrift ${dur}s ${del}s linear infinite;`;
      for (let a = 0; a < 6; a++) {
        const ang = (a/6)*Math.PI*2;
        const x2=(Math.cos(ang)*12).toFixed(2), y2=(Math.sin(ang)*12).toFixed(2);
        const ln=document.createElementNS(ns2,'line');
        ln.setAttribute('x1','0'); ln.setAttribute('y1','0');
        ln.setAttribute('x2',x2); ln.setAttribute('y2',y2);
        ln.setAttribute('stroke','rgba(180,225,255,0.85)'); ln.setAttribute('stroke-width','1.4');
        svg2.appendChild(ln);
        [0.5, 0.82].forEach(frac => {
          const mx=(Math.cos(ang)*12*frac).toFixed(2);
          const my=(Math.sin(ang)*12*frac).toFixed(2);
          const len = frac === 0.5 ? 4 : 2.5;
          const px=(-Math.sin(ang)*len).toFixed(2);
          const py=(Math.cos(ang)*len).toFixed(2);
          const bar=document.createElementNS(ns2,'line');
          bar.setAttribute('x1',(+mx-+px).toFixed(2)); bar.setAttribute('y1',(+my-+py).toFixed(2));
          bar.setAttribute('x2',(+mx+ +px).toFixed(2)); bar.setAttribute('y2',(+my+ +py).toFixed(2));
          bar.setAttribute('stroke','rgba(180,225,255,0.55)'); bar.setAttribute('stroke-width','1');
          svg2.appendChild(bar);
        });
      }
      const ctr=document.createElementNS(ns2,'circle');
      ctr.setAttribute('cx','0'); ctr.setAttribute('cy','0'); ctr.setAttribute('r','2.2');
      ctr.setAttribute('fill','rgba(220,242,255,0.95)');
      svg2.appendChild(ctr);
      snowLayer.appendChild(svg2);
    }
  })();

  // ── Build: arc needle dot ─────────────────────────────────────
  const needleDot = document.createElement('div');
  needleDot.className = 'arc-needle-dot';
  ringWrap.appendChild(needleDot);

  // ── Build: data stream numbers ────────────────────────────────
  const dataLabels = ['95\u00B0F','PSI:310','RH:82%','BTU:48K','HT:CRIT','LOAD:98%','92\u00B0F','PSI:305','87\u00B0F','RH:79%','84\u00B0F'];
  dataLabels.forEach((lbl, i) => {
    const el = document.createElement('div');
    el.className = 'data-num';
    const left  = 5 + Math.random() * 90;
    const delay = Math.random() * 4;
    const dur   = 2.5 + Math.random() * 2;
    const col   = `rgba(${220-i*8},${40+i*4},${10},${0.25+Math.random()*0.2})`;
    el.textContent = lbl;
    el.style.cssText = `left:${left}%;bottom:0;color:${col};
      animation:dataRise ${dur}s ${delay}s ease-out infinite;`;
    dataStream.appendChild(el);
  });

  // ── Build: frost crystals ─────────────────────────────────────
  (function() {
    const ns='http://www.w3.org/2000/svg';
    const positions = [
      [6,8],[92,6],[4,82],[94,85],[20,5],[80,4],[3,45],[97,50],
      [50,3],[14,92],[86,90],[35,96],[65,95]
    ];
    positions.forEach(([lp,tp], idx) => {
      const svg = document.createElementNS(ns,'svg');
      svg.setAttribute('viewBox','-20 -20 40 40');
      svg.setAttribute('width','28'); svg.setAttribute('height','28');
      svg.style.cssText = `position:absolute;left:${lp}%;top:${tp}%;
        animation:crystallize ${1.2+Math.random()*0.8}s ${idx*0.15}s ease-out both;`;
      for (let a=0; a<6; a++) {
        const angle = (a/6)*Math.PI*2;
        const x2=(Math.cos(angle)*16).toFixed(2), y2=(Math.sin(angle)*16).toFixed(2);
        const ln=document.createElementNS(ns,'line');
        ln.setAttribute('x1','0');ln.setAttribute('y1','0');
        ln.setAttribute('x2',x2);ln.setAttribute('y2',y2);
        ln.setAttribute('stroke','rgba(147,210,255,0.6)');ln.setAttribute('stroke-width','1.2');
        svg.appendChild(ln);
        const mx=(Math.cos(angle)*9).toFixed(2), my=(Math.sin(angle)*9).toFixed(2);
        const px=(-Math.sin(angle)*5).toFixed(2), py=(Math.cos(angle)*5).toFixed(2);
        const bar=document.createElementNS(ns,'line');
        bar.setAttribute('x1',(+mx-+px).toFixed(2));bar.setAttribute('y1',(+my-+py).toFixed(2));
        bar.setAttribute('x2',(+mx+ +px).toFixed(2));bar.setAttribute('y2',(+my+ +py).toFixed(2));
        bar.setAttribute('stroke','rgba(147,210,255,0.4)');bar.setAttribute('stroke-width','0.8');
        svg.appendChild(bar);
      }
      const circ=document.createElementNS(ns,'circle');
      circ.setAttribute('cx','0');circ.setAttribute('cy','0');circ.setAttribute('r','2');
      circ.setAttribute('fill','rgba(147,210,255,0.7)');
      svg.appendChild(circ);
      frostLayer.appendChild(svg);
    });
  })();

  // ── Needle position helper ────────────────────────────────────
  function updateNeedle(temp, col) {
    const fraction = clamp((temp - 50) / 50, 0, 1);
    const angleDeg = 225 + fraction * 270;
    const rad = angleDeg * Math.PI / 180;
    const R = 120;
    const scale = 340 / 300;
    const cx = 170, cy = 170;
    const nx = cx + Math.cos(rad) * R * scale - 5;
    const ny = cy + Math.sin(rad) * R * scale - 5;
    needleDot.style.left = nx.toFixed(1) + 'px';
    needleDot.style.top  = ny.toFixed(1) + 'px';
    needleDot.style.background = col;
    needleDot.style.boxShadow  = `0 0 10px 3px ${col.replace('rgb','rgba').replace(')',',0.5)')}`;
  }

  // ── Scroll update ─────────────────────────────────────────────
  let ticking = false;
  let lastP = -1;

  function update() {
    ticking = false;
    const rect  = seq.getBoundingClientRect();
    const seqH  = seq.offsetHeight;
    const p     = clamp(-rect.top / (seqH - window.innerHeight), 0, 1);
    if (Math.abs(p - lastP) < 0.0005 && lastP >= 0) return;
    lastP = p;

    const temp     = Math.round(lerp(TEMP_HOT, TEMP_COOL, clamp(p / 0.92, 0, 1)));
    const arcC     = arcColor(p);
    const arcRGB   = arcArr(p);

    // ── Temperature display
    tempDigits.textContent = temp;
    tempGhost.textContent  = temp;

    // ── Arc
    const arcFill = tempToArc(temp);
    thermoArc.setAttribute('stroke-dasharray', `${arcFill.toFixed(1)} ${CIRC}`);
    thermoArc.setAttribute('stroke', arcC);

    // ── Arc needle
    updateNeedle(temp, arcC);

    // ── SVG drop-shadow glow
    const glowA = lerp(0.45, 0.08, clamp((p-0.55)/0.35, 0, 1));
    thermoSvg.style.filter = `drop-shadow(0 0 52px rgba(${arcRGB[0]},${arcRGB[1]},${arcRGB[2]},${glowA.toFixed(2)}))`;

    // ── Scene background
    scene.style.background = bgColor(p);

    // ── Halos color shift
    const h1c=arcRGB, h2c=arcRGB, h3c=arcRGB;
    halo1.style.background = `radial-gradient(circle,rgba(${h1c[0]},${h1c[1]},${h1c[2]},0.22) 0%,transparent 70%)`;
    halo2.style.background = `radial-gradient(circle,rgba(${h2c[0]},${h2c[1]},${h2c[2]},0.10) 0%,transparent 70%)`;
    halo3.style.background = `radial-gradient(circle,rgba(${h3c[0]},${h3c[1]},${h3c[2]},0.04) 0%,transparent 70%)`;

    // ── Orbital rings color shift
    const orbAlpha1 = lerp(0.20, 0.35, clamp(p/0.5,0,1));
    const orbAlpha2 = lerp(0.10, 0.20, clamp(p/0.5,0,1));
    [orbit1,orbit2,orbit3].forEach((el,i) => {
      const a = [orbAlpha1*0.9, orbAlpha2, orbAlpha2*0.5][i];
      el.style.borderColor = `rgba(${arcRGB[0]},${arcRGB[1]},${arcRGB[2]},${a.toFixed(2)})`;
    });

    // ── Pulse rings color
    [pulseA,pulseB,pulseC].forEach(el => {
      el.style.borderColor = `rgba(${arcRGB[0]},${arcRGB[1]},${arcRGB[2]},0.45)`;
    });

    // ── Ambient dots color shift
    const dotWarmness = clamp(1 - p / 0.6, 0, 1);
    ambDots.forEach((el, i) => {
      const warm = `rgba(${Math.round(lerp(56,220,dotWarmness))},${Math.round(lerp(189,80,dotWarmness))},${Math.round(lerp(248,20,dotWarmness))},0.65)`;
      if (i % 8 === 0) el.style.background = warm;
    });

    // ── Heat shimmer opacity
    heatShimmer.style.opacity = clamp(1 - p / 0.42, 0, 1);

    // ── Data stream (hot phase only)
    dataStream.style.opacity = clamp(1 - p / 0.38, 0, 1);

    // ── Scan line color + phase visibility
    const scanActive = clamp((p - 0.28) / 0.12, 0, 1);
    scanLine.style.opacity = scanActive;
    scanLine.style.background = `linear-gradient(90deg,transparent,rgba(${arcRGB[0]},${arcRGB[1]},${arcRGB[2]},0.4),transparent)`;

    // ── AC schematic
    acSchematic.style.opacity = clamp((p - 0.32) / 0.28, 0, 1);

    // ── Cool streams
    coolStreams.style.opacity = clamp((p - 0.58) / 0.18, 0, 1);

    // ── Frost crystals
    const frostP = clamp((p - 0.62) / 0.18, 0, 1);
    frostLayer.style.opacity = frostP;

    // ── HUD: outdoor temp
    readoutOD.textContent = `${temp}\u00B0F`;
    readoutOD.style.color = arcC;

    // ── HUD: status
    if (p < 0.30) {
      readoutSt.textContent = 'STANDBY'; readoutSt.style.color = 'rgba(255,255,255,0.4)';
    } else if (p < 0.62) {
      readoutSt.textContent = 'COOLING'; readoutSt.style.color = arcC;
    } else {
      readoutSt.textContent = 'SET POINT'; readoutSt.style.color = 'rgb(56,189,248)';
    }

    // ── HUD: humidity (82% -> 55% as cooling kicks in)
    const hum = Math.round(lerp(82, 55, clamp((p-0.3)/0.55, 0, 1)));
    readoutHum.textContent = `${hum}%`;
    readoutHum.style.color = arcC;
    humBar.style.width = hum + '%';
    humBar.style.background = arcC;

    // ── HUD: efficiency (-- -> 98 SEER as system runs)
    const effP = clamp((p-0.30)/0.35, 0, 1);
    if (effP > 0.05) {
      const eff = Math.round(lerp(0, 98, effP));
      readoutEff.textContent = eff + ' SEER';
      readoutEff.style.color = arcC;
      effBar.style.width = eff + '%';
      effBar.style.background = arcC;
    } else {
      readoutEff.textContent = '\u2014';
    }

    // ── HUD: PSI (-- -> 310 -> 285 as system pressurizes then normalizes)
    const psiP = clamp((p-0.30)/0.20, 0, 1);
    if (psiP > 0.05) {
      const psi = psiP < 0.6
        ? Math.round(lerp(280, 315, psiP/0.6))
        : Math.round(lerp(315, 285, (psiP-0.6)/0.4));
      readoutPsi.textContent = psi + ' PSI';
      readoutPsi.style.color = arcC;
    } else {
      readoutPsi.textContent = '\u2014';
    }

    // ── HUD: compressor load (-- -> 95% -> 72%)
    const loadP = clamp((p-0.30)/0.20, 0, 1);
    if (loadP > 0.05) {
      const ld = loadP < 0.5
        ? Math.round(lerp(60, 96, loadP/0.5))
        : Math.round(lerp(96, 72, (loadP-0.5)/0.5));
      readoutLoad.textContent = ld + '%';
      readoutLoad.style.color = arcC;
      loadBar.style.width = ld + '%';
      loadBar.style.background = arcC;
    } else {
      readoutLoad.textContent = '\u2014';
    }

    // ── HUD: runtime counter
    const runP = clamp((p-0.30)/0.65, 0, 1);
    if (runP > 0.02) {
      const secs = Math.round(runP * 847);
      const mm = String(Math.floor(secs/60)).padStart(2,'0');
      const ss = String(secs%60).padStart(2,'0');
      readoutRun.textContent = `${mm}:${ss}`;
      readoutRun.style.color = arcC;
    } else {
      readoutRun.textContent = '\u2014';
    }

    // ── Weather: steam -> droplets -> snowflakes ───────────────────
    steamLayer.style.opacity    = clamp(1 - (p - 0.18) / 0.30, 0, 1);
    const dropIn  = clamp((p - 0.15) / 0.22, 0, 1);
    const dropOut = clamp(1 - (p - 0.52) / 0.20, 0, 1);
    dropletLayer.style.opacity  = Math.min(dropIn, dropOut);
    snowLayer.style.opacity     = clamp((p - 0.58) / 0.18, 0, 1);

    // ── Phase label
    if (p < 0.28) {
      phaseLbl.textContent = 'Indoor Temperature Critical';
    } else if (p < 0.60) {
      phaseLbl.textContent = 'Cooling Cycle Active';
    } else {
      phaseLbl.textContent = 'Optimal Comfort Achieved \u2014 Target: 68\u00B0F';
    }

    // ── Scrub bar
    scrubFill.style.width = `${(p*100).toFixed(1)}%`;
    scrubFill.style.background = arcC;

    // ── Scroll hint
    if (hintArrow) hintArrow.style.opacity = clamp(1 - p/0.08, 0, 1);

    // ── Thermostat ring + orbits + pulses: keep visible through end (no fade-out to hero CTA)
    // In the standalone version we let everything stay visible at 100% scroll
  }

  window.addEventListener('scroll', () => {
    if (!ticking) { ticking = true; requestAnimationFrame(update); }
  }, { passive: true });

  // Batch color all ambient dots once on load
  ambDots.forEach(el => { el.style.background = 'rgba(220,80,20,0.6)'; });

  update();
})();
</script>
</body>
</html>
