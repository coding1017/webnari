<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#06080F"/>
      <stop offset="55%"  stop-color="#0A1020"/>
      <stop offset="100%" stop-color="#0D1628"/>
    </linearGradient>
    <radialGradient id="glow-main" cx="310" cy="295" r="340" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0EA5E9" stop-opacity="0.18"/>
      <stop offset="50%"  stop-color="#0EA5E9" stop-opacity="0.06"/>
      <stop offset="100%" stop-color="#0EA5E9" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-right" cx="1050" cy="200" r="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bar-bg" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#0A1828"/>
      <stop offset="50%"  stop-color="#0D1E35"/>
      <stop offset="100%" stop-color="#0A1828"/>
    </linearGradient>
    <linearGradient id="pipe-sheen-h" x1="0" y1="0" x2="0" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="pipe-sheen-v" x1="0" y1="0" x2="1" y2="0" gradientUnits="objectBoundingBox">
      <stop offset="0%"   stop-color="#38BDF8" stop-opacity="0.20"/>
      <stop offset="100%" stop-color="#38BDF8" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="canvas">
      <rect width="1200" height="630"/>
    </clipPath>
    <filter id="orb-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="text-glow" x="-10%" y="-40%" width="120%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <g clip-path="url(#canvas)">
    <!-- Background -->
    <rect width="1200" height="630" fill="url(#bg)"/>
    <rect width="1200" height="630" fill="url(#glow-main)"/>
    <rect width="1200" height="630" fill="url(#glow-right)"/>

    <!-- Grid lines -->
    <line x1="240"  y1="0" x2="240"  y2="560" stroke="#1A3050" stroke-width="0.5" opacity="0.4"/>
    <line x1="480"  y1="0" x2="480"  y2="560" stroke="#1A3050" stroke-width="0.5" opacity="0.3"/>
    <line x1="720"  y1="0" x2="720"  y2="560" stroke="#1A3050" stroke-width="0.5" opacity="0.3"/>
    <line x1="960"  y1="0" x2="960"  y2="560" stroke="#1A3050" stroke-width="0.5" opacity="0.4"/>
    <line x1="0" y1="160" x2="1200" y2="160" stroke="#1A3050" stroke-width="0.5" opacity="0.3"/>
    <line x1="0" y1="360" x2="1200" y2="360" stroke="#1A3050" stroke-width="0.5" opacity="0.25"/>

    <!-- Left accent stripe -->
    <rect x="0" y="0" width="5" height="560" fill="#0EA5E9" opacity="0.7"/>

    <!-- Orbit rings -->
    <circle cx="310" cy="295" r="190" stroke="#1A3050" stroke-width="1" fill="none" opacity="0.55"/>
    <circle cx="310" cy="295" r="155" stroke="#1A3050" stroke-width="1" fill="none" opacity="0.40"/>
    <circle cx="310" cy="295" r="115" stroke="#0EA5E9" stroke-width="0.8" fill="none" opacity="0.18"/>

    <!-- Horizontal pipe -->
    <rect x="90"  y="271" width="440" height="48" rx="2" fill="#0D1628" stroke="#1A3050" stroke-width="1.5"/>
    <rect x="90"  y="271" width="440" height="9"  rx="2" fill="url(#pipe-sheen-h)"/>
    <rect x="90"  y="311" width="440" height="8"  rx="1" fill="rgba(0,0,0,0.40)"/>

    <!-- Vertical pipe -->
    <rect x="286" y="75"  width="48" height="440" rx="2" fill="#0D1628" stroke="#1A3050" stroke-width="1.5"/>
    <rect x="286" y="75"  width="9"  height="440" rx="2" fill="url(#pipe-sheen-v)"/>
    <rect x="325" y="75"  width="9"  height="440" rx="1" fill="rgba(0,0,0,0.40)"/>

    <!-- Cross fitting center -->
    <rect x="282" y="267" width="56" height="56" rx="1" fill="#132034" stroke="#1F3D62" stroke-width="2"/>
    <rect x="288" y="273" width="44" height="44" fill="#0A1020"/>
    <circle cx="292" cy="277" r="3.5" fill="#1A3050"/>
    <circle cx="328" cy="277" r="3.5" fill="#1A3050"/>
    <circle cx="292" cy="313" r="3.5" fill="#1A3050"/>
    <circle cx="328" cy="313" r="3.5" fill="#1A3050"/>
    <circle cx="310" cy="295" r="14" fill="rgba(14,165,233,0.15)" filter="url(#orb-glow)"/>
    <circle cx="310" cy="295" r="8"  fill="#0EA5E9" opacity="0.80"/>
    <circle cx="310" cy="295" r="4"  fill="#38BDF8"/>
    <circle cx="310" cy="295" r="1.8" fill="#EEF7FF"/>

    <!-- Pipe flanges -->
    <rect x="84"  y="263" width="16" height="64" rx="1" fill="#132034" stroke="#1F3D62" stroke-width="1.5"/>
    <rect x="520" y="263" width="16" height="64" rx="1" fill="#132034" stroke="#1F3D62" stroke-width="1.5"/>
    <rect x="278" y="69"  width="64" height="16" rx="1" fill="#132034" stroke="#1F3D62" stroke-width="1.5"/>
    <rect x="278" y="505" width="64" height="16" rx="1" fill="#132034" stroke="#1F3D62" stroke-width="1.5"/>

    <!-- Flow arrows -->
    <path d="M107 295 L82 283 M107 295 L82 307"   stroke="rgba(14,165,233,0.60)" stroke-width="2" stroke-linecap="round"/>
    <path d="M513 295 L536 283 M513 295 L536 307"  stroke="rgba(14,165,233,0.35)" stroke-width="2" stroke-linecap="round"/>
    <path d="M310 90 L298 68 M310 90 L322 68"      stroke="rgba(14,165,233,0.60)" stroke-width="2" stroke-linecap="round"/>
    <path d="M310 500 L298 520 M310 500 L322 520"  stroke="rgba(14,165,233,0.35)" stroke-width="2" stroke-linecap="round"/>

    <!-- Pressure gauge -->
    <circle cx="450" cy="180" r="34" fill="#0D1628" stroke="#1F3D62" stroke-width="1.5"/>
    <circle cx="450" cy="180" r="27" fill="#0A1020" stroke="#1A3050" stroke-width="1"/>
    <circle cx="450" cy="180" r="3.5" fill="#0EA5E9"/>
    <line   x1="450" y1="180" x2="450" y2="162" stroke="#38BDF8" stroke-width="2" stroke-linecap="round"/>
    <text x="450" y="197" text-anchor="middle" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="9" font-weight="700" fill="#4A6A88" letter-spacing="1">PSI</text>

    <!-- Water drop accent -->
    <path d="M175 148 C175 138,166 130,166 122 C166 114,175 106,175 106 C175 106,184 114,184 122 C184 130,175 138,175 148Z" fill="rgba(14,165,233,0.22)" stroke="rgba(56,189,248,0.45)" stroke-width="1.2"/>

    <!-- Column divider -->
    <line x1="595" y1="80" x2="595" y2="540" stroke="#1A3050" stroke-width="1" opacity="0.8"/>
    <line x1="596" y1="80" x2="596" y2="540" stroke="#0EA5E9" stroke-width="0.5" opacity="0.20"/>

    <!-- Eyebrow -->
    <rect x="638" y="95" width="28" height="2" fill="#0EA5E9" rx="1"/>
    <text x="676" y="107" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="15" font-weight="700" fill="#0EA5E9" letter-spacing="0.18em">SOUTH FLORIDA  —  LICENSED &amp; INSURED</text>

    <!-- FLOWPRO heading -->
    <text x="634" y="238" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="142" font-weight="900" fill="#EEF7FF" letter-spacing="-0.02em" filter="url(#text-glow)">FLOWPRO</text>

    <!-- PLUMBING accent -->
    <text x="642" y="294" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="52" font-weight="700" fill="#0EA5E9" letter-spacing="0.18em">PLUMBING</text>

    <!-- Tagline -->
    <text x="642" y="355" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="26" font-weight="400" fill="#8AAEC8" letter-spacing="0.04em">South Florida's Most Trusted Plumber</text>

    <!-- Rule -->
    <line x1="638" y1="378" x2="1140" y2="378" stroke="#1A3050" stroke-width="1"/>

    <!-- Badge 1: Licensed -->
    <rect x="638" y="400" width="154" height="36" rx="1" fill="rgba(14,165,233,0.07)" stroke="#1F3D62" stroke-width="1"/>
    <path d="M653 418 L653 410 L661 406 L669 410 L669 418 C669 422 661 425 661 425 C661 425 653 422 653 418Z" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="674" y="423" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="13" font-weight="700" fill="#8AAEC8" letter-spacing="0.08em">LICENSED &amp; INSURED</text>

    <!-- Badge 2: 24/7 -->
    <rect x="802" y="400" width="138" height="36" rx="1" fill="rgba(14,165,233,0.07)" stroke="#1F3D62" stroke-width="1"/>
    <circle cx="817" cy="418" r="7" fill="none" stroke="#0EA5E9" stroke-width="1.5"/>
    <line x1="817" y1="418" x2="817" y2="413" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="817" y1="418" x2="821" y2="421" stroke="#38BDF8" stroke-width="1.5" stroke-linecap="round"/>
    <text x="830" y="423" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="13" font-weight="700" fill="#8AAEC8" letter-spacing="0.08em">24/7 EMERGENCY</text>

    <!-- Badge 3: 20+ Years -->
    <rect x="950" y="400" width="116" height="36" rx="1" fill="rgba(14,165,233,0.07)" stroke="#1F3D62" stroke-width="1"/>
    <path d="M966 418 L968.4 412.8 L974 411.8 L969.8 416 L970.8 422 L966 419.4 L961.2 422 L962.2 416 L958 411.8 L963.6 412.8 Z" fill="none" stroke="#0EA5E9" stroke-width="1.3" stroke-linejoin="round"/>
    <text x="979" y="423" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="13" font-weight="700" fill="#8AAEC8" letter-spacing="0.08em">20+ YEARS</text>

    <!-- Bottom bar -->
    <line x1="0" y1="560" x2="1200" y2="560" stroke="#1A3050" stroke-width="1"/>
    <line x1="0" y1="561" x2="1200" y2="561" stroke="#0EA5E9" stroke-width="0.6" opacity="0.30"/>
    <rect x="0" y="562" width="1200" height="68" fill="url(#bar-bg)"/>

    <!-- License -->
    <path d="M56 601 L56 593 L64 589 L72 593 L72 601 C72 605 64 608 64 608 C64 608 56 605 56 601Z" fill="none" stroke="#0EA5E9" stroke-width="1.5" stroke-linejoin="round"/>
    <text x="82" y="602" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="11" font-weight="700" fill="#4A6A88" letter-spacing="0.14em">PLUMBING LICENSE</text>
    <text x="82" y="618" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="14" font-weight="700" fill="#8AAEC8" letter-spacing="0.10em">#CFC1430009</text>

    <line x1="340" y1="574" x2="340" y2="616" stroke="#1A3050" stroke-width="1"/>

    <!-- Brand center -->
    <text x="600" y="600" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="15" font-weight="900" fill="#EEF7FF" text-anchor="middle" letter-spacing="0.20em">FLOWPRO PLUMBING</text>
    <text x="600" y="619" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="11" font-weight="400" fill="#4A6A88" text-anchor="middle" letter-spacing="0.14em">WEBNARI.IO/FLOWPRO</text>

    <line x1="860" y1="574" x2="860" y2="616" stroke="#1A3050" stroke-width="1"/>

    <!-- Phone -->
    <text x="932" y="602" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="11" font-weight="700" fill="#4A6A88" letter-spacing="0.14em">CALL ANYTIME 24/7</text>
    <text x="932" y="618" font-family="'Barlow Condensed','Arial Narrow',sans-serif" font-size="14" font-weight="700" fill="#8AAEC8" letter-spacing="0.10em">(786) 555-0200</text>

    <!-- Right edge accent -->
    <rect x="1195" y="0" width="5" height="560" fill="#0EA5E9" opacity="0.25"/>
  </g>
</svg>
