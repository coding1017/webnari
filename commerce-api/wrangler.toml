name = "webnari-commerce"
main = "worker.js"
compatibility_date = "2024-12-01"
workers_dev = true

routes = [
  { pattern = "webnari.io/commerce/*", zone_name = "webnari.io" }
]

[triggers]
crons = ["0 * * * *", "0 3 1 * *", "*/5 * * * *"]  # Hourly: abandoned cart | Monthly: tax audit | Every 5min: webhook retries

[vars]
ALLOWED_ORIGINS = "https://webnari.io,https://wookwearshop.com,http://localhost:3000,https://webnari-store-admin.webnari.workers.dev,https://wook-wear.webnari.workers.dev"
QUICKBOOKS_SANDBOX = "true"
