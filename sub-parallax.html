<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SubCraft | Sub Sandwich Build</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&family=Pacifico&display=swap" rel="stylesheet">
<style>
:root {
  --black: #140E06; --dark: #1C1408; --surface: #241A0E;
  --surface2: #2E2214; --border: #3A2E1E;
  --amber: #D4942A; --amber2: #E8B04A; --amber3: #F0CC7A;
  --white: #FFF8F0; --muted: #8A7A60; --text: #C8B898;
  --font-head: 'Barlow Condensed', sans-serif;
  --font-body: 'Barlow', sans-serif;
  --radius: 8px; --radius-lg: 16px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;overflow-x:hidden}
body{font-family:var(--font-body);background:var(--black);color:var(--text);overflow-x:hidden;line-height:1.6}

/* ── SCROLL SEQUENCE ── */
.scroll-sequence{height:700vh;position:relative}
.sequence-sticky{position:absolute;top:0;left:0;right:0;height:100vh;overflow:hidden;background:var(--black)}
.seq-bg{position:absolute;inset:0;z-index:1;transition:background 0.1s}
.scene-glow{position:absolute;inset:0;z-index:2;background:radial-gradient(ellipse 70% 70% at 50% 55%,rgba(212,148,42,0.18),rgba(212,148,42,0.06) 50%,transparent 75%);opacity:0}
.scene-container{position:absolute;inset:0;z-index:3;display:flex;align-items:center;justify-content:center}
.scene-svg{width:100%;height:auto;max-height:100vh}
.scene-energize{position:absolute;inset:0;z-index:4;background:linear-gradient(90deg,transparent,rgba(212,148,42,0.08),rgba(232,176,74,0.06),transparent);clip-path:inset(0 100% 0 0);pointer-events:none}
.scene-powered{position:absolute;inset:0;z-index:6;display:flex;align-items:center;justify-content:center;pointer-events:none;opacity:0}
.scene-powered-text{font-family:'Pacifico',cursive;font-weight:400;font-size:clamp(58px,12vw,140px);letter-spacing:0.02em;color:#fff;text-shadow:0 0 40px rgba(212,148,42,1),0 0 80px rgba(212,148,42,0.95),0 0 140px rgba(212,148,42,0.8),0 0 250px rgba(212,148,42,0.6),0 0 400px rgba(212,148,42,0.4),0 0 600px rgba(212,148,42,0.25),0 2px 4px rgba(0,0,0,0.5);transition:text-shadow 0.3s}
.scene-powered-text span{color:var(--amber2);text-shadow:0 0 40px rgba(232,176,74,1),0 0 80px rgba(232,176,74,0.95),0 0 140px rgba(232,176,74,0.8),0 0 250px rgba(232,176,74,0.6),0 0 400px rgba(232,176,74,0.4),0 0 600px rgba(232,176,74,0.25)}
.seq-intro{position:absolute;inset:0;z-index:7;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;pointer-events:none}
.seq-intro-logo{font-family:var(--font-head);font-weight:900;font-size:clamp(52px,9vw,100px);letter-spacing:0.02em;color:var(--white)}
.seq-intro-logo span{color:var(--amber)}
.seq-intro-sub{font-family:var(--font-head);font-size:clamp(14px,2.2vw,22px);font-weight:600;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted)}
.seq-scroll-hint{display:flex;flex-direction:column;align-items:center;gap:8px;margin-top:40px;animation:hintBounce 2s infinite}
.seq-scroll-hint span{font-size:11px;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;color:var(--muted)}
.seq-scroll-line{width:1px;height:32px;background:linear-gradient(to bottom,var(--amber),transparent)}
@keyframes hintBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(8px)}}
.seq-phase{position:absolute;bottom:120px;right:32px;z-index:7;font-family:var(--font-head);font-size:clamp(20px,4vw,32px);font-weight:900;letter-spacing:0.2em;text-transform:uppercase;color:var(--amber);opacity:0;transition:opacity 0.2s;white-space:nowrap;text-align:right}
.seq-scrub{position:absolute;bottom:0;left:0;right:0;height:3px;background:var(--border);z-index:7}
.seq-scrub-fill{height:100%;width:0;background:var(--amber);transition:width 0.05s linear}
.power-light{position:absolute;width:6px;height:6px;border-radius:50%;background:var(--amber);opacity:0;z-index:5;box-shadow:0 0 8px var(--amber)}
.pl-1{top:15%;left:12%}.pl-2{top:20%;right:15%}.pl-3{top:70%;left:8%}
.pl-4{top:75%;right:10%}.pl-5{top:45%;left:5%}.pl-6{top:50%;right:7%}
</style>
</head>
<body>

<div class="scroll-sequence" id="hero">
  <div class="sequence-sticky" id="seqSticky">
    <div class="seq-bg" id="seqBg"></div>
    <div class="scene-glow" id="sceneGlow"></div>
    <div class="scene-container" id="sceneContainer">
      <svg id="sceneSvg" class="scene-svg" viewBox="0 0 1050 600" preserveAspectRatio="xMidYMid meet"></svg>
    </div>
    <div class="scene-energize" id="sceneEnergize"></div>
    <div class="scene-powered" id="scenePowered"><span class="scene-powered-text">Gastro<span>subs</span></span></div>
    <div class="power-light pl-1" id="pl1"></div><div class="power-light pl-2" id="pl2"></div>
    <div class="power-light pl-3" id="pl3"></div><div class="power-light pl-4" id="pl4"></div>
    <div class="power-light pl-5" id="pl5"></div><div class="power-light pl-6" id="pl6"></div>
    <div class="seq-intro" id="seqIntro">
      <div class="seq-intro-logo">GASTRO<span>SUBS</span></div>
      <div class="seq-intro-sub">Artisan Deli Subs &bull; Handcrafted Daily</div>
      <div class="seq-scroll-hint"><span>Scroll</span><div class="seq-scroll-line"></div></div>
    </div>
    <div class="seq-phase" id="seqPhase"></div>
    <div class="seq-scrub"><div class="seq-scrub-fill" id="seqScrubFill"></div></div>
  </div>
</div>

<script>
(function(){
  var seqEl=document.getElementById('hero'),stickyEl=document.getElementById('seqSticky');
  if(!seqEl||!stickyEl)return;

  var bg=document.getElementById('seqBg');
  var sceneGlow=document.getElementById('sceneGlow');
  var sceneEnergize=document.getElementById('sceneEnergize');
  var scenePowered=document.getElementById('scenePowered');
  var intro=document.getElementById('seqIntro');
  var phaseEl=document.getElementById('seqPhase');
  var scrubFill=document.getElementById('seqScrubFill');
  var svg=document.getElementById('sceneSvg');
  var ns='http://www.w3.org/2000/svg';

  function clamp(v,a,b){return v<a?a:v>b?b:v}
  function lerp(a,b,t){return a+(b-a)*t}
  function ease3(t){return 1-Math.pow(1-t,3)}
  function easeIn3(t){return t*t*t}
  function getProgress(){var s=-seqEl.getBoundingClientRect().top;var t=seqEl.offsetHeight-stickyEl.offsetHeight;return clamp(s/t,0,1)}

  var lastPhase='';
  function setPhase(t){if(t===lastPhase)return;lastPhase=t;phaseEl.style.opacity='0';phaseEl.style.transform='translateY(7px)';setTimeout(function(){phaseEl.textContent=t;phaseEl.style.opacity='1';phaseEl.style.transform='translateY(0)'},190)}

  function svgEl(tag,attrs){var e=document.createElementNS(ns,tag);for(var k in attrs){if(attrs.hasOwnProperty(k))e.setAttribute(k,String(attrs[k]))}return e}

  // === DEFS ===
  var defs=svgEl('defs',{});

  // Cutting board wood gradient
  var gWood=svgEl('linearGradient',{id:'woodGrad',x1:'0',y1:'0',x2:'0.1',y2:'1'});
  gWood.appendChild(svgEl('stop',{offset:'0%','stop-color':'#8B6914'}));
  gWood.appendChild(svgEl('stop',{offset:'25%','stop-color':'#A0793A'}));
  gWood.appendChild(svgEl('stop',{offset:'50%','stop-color':'#7A5C1A'}));
  gWood.appendChild(svgEl('stop',{offset:'75%','stop-color':'#96702E'}));
  gWood.appendChild(svgEl('stop',{offset:'100%','stop-color':'#6E500F'}));
  defs.appendChild(gWood);

  // Bread crust gradient
  var gCrust=svgEl('linearGradient',{id:'crustGrad',x1:'0',y1:'0',x2:'0',y2:'1'});
  gCrust.appendChild(svgEl('stop',{offset:'0%','stop-color':'#D4942A'}));
  gCrust.appendChild(svgEl('stop',{offset:'30%','stop-color':'#C8852A'}));
  gCrust.appendChild(svgEl('stop',{offset:'100%','stop-color':'#A06820'}));
  defs.appendChild(gCrust);

  // Bread interior gradient
  var gBreadInner=svgEl('linearGradient',{id:'breadInner',x1:'0',y1:'0',x2:'0',y2:'1'});
  gBreadInner.appendChild(svgEl('stop',{offset:'0%','stop-color':'#F5E6C8'}));
  gBreadInner.appendChild(svgEl('stop',{offset:'100%','stop-color':'#ECD8B0'}));
  defs.appendChild(gBreadInner);

  // Salami gradient
  var gSalami=svgEl('radialGradient',{id:'salamiGrad',cx:'50%',cy:'50%',r:'50%'});
  gSalami.appendChild(svgEl('stop',{offset:'0%','stop-color':'#CC4444'}));
  gSalami.appendChild(svgEl('stop',{offset:'60%','stop-color':'#B03030'}));
  gSalami.appendChild(svgEl('stop',{offset:'100%','stop-color':'#8A2020'}));
  defs.appendChild(gSalami);

  // Ham gradient
  var gHam=svgEl('linearGradient',{id:'hamGrad',x1:'0',y1:'0',x2:'1',y2:'1'});
  gHam.appendChild(svgEl('stop',{offset:'0%','stop-color':'#F0A0A0'}));
  gHam.appendChild(svgEl('stop',{offset:'100%','stop-color':'#D88080'}));
  defs.appendChild(gHam);

  // Capicola gradient
  var gCap=svgEl('linearGradient',{id:'capGrad',x1:'0',y1:'0',x2:'1',y2:'0.5'});
  gCap.appendChild(svgEl('stop',{offset:'0%','stop-color':'#C85A3A'}));
  gCap.appendChild(svgEl('stop',{offset:'50%','stop-color':'#E07050'}));
  gCap.appendChild(svgEl('stop',{offset:'100%','stop-color':'#B84A2A'}));
  defs.appendChild(gCap);

  // Provolone gradient
  var gCheese=svgEl('linearGradient',{id:'cheeseGrad',x1:'0',y1:'0',x2:'0',y2:'1'});
  gCheese.appendChild(svgEl('stop',{offset:'0%','stop-color':'#F8E8A0'}));
  gCheese.appendChild(svgEl('stop',{offset:'100%','stop-color':'#E8D070'}));
  defs.appendChild(gCheese);

  // Checkerboard pattern for wrapping paper
  var pat=svgEl('pattern',{id:'checker',x:'0',y:'0',width:'16',height:'16',patternUnits:'userSpaceOnUse'});
  pat.appendChild(svgEl('rect',{x:'0',y:'0',width:'16',height:'16',fill:'#FFFFFF'}));
  pat.appendChild(svgEl('rect',{x:'0',y:'0',width:'8',height:'8',fill:'#1A1A1A'}));
  pat.appendChild(svgEl('rect',{x:'8',y:'8',width:'8',height:'8',fill:'#1A1A1A'}));
  defs.appendChild(pat);

  // Red basket gradient
  var gBasket=svgEl('linearGradient',{id:'basketGrad',x1:'0',y1:'0',x2:'0',y2:'1'});
  gBasket.appendChild(svgEl('stop',{offset:'0%','stop-color':'#C62828'}));
  gBasket.appendChild(svgEl('stop',{offset:'100%','stop-color':'#B71C1C'}));
  defs.appendChild(gBasket);

  // Cup gradient
  var gCup=svgEl('linearGradient',{id:'cupGrad',x1:'0',y1:'0',x2:'1',y2:'1'});
  gCup.appendChild(svgEl('stop',{offset:'0%','stop-color':'#FFFFFF'}));
  gCup.appendChild(svgEl('stop',{offset:'40%','stop-color':'#F8F6F2'}));
  gCup.appendChild(svgEl('stop',{offset:'100%','stop-color':'#EDE8E0'}));
  defs.appendChild(gCup);

  // Cup lid gradient
  var gLid=svgEl('linearGradient',{id:'lidGrad',x1:'0',y1:'0',x2:'0',y2:'1'});
  gLid.appendChild(svgEl('stop',{offset:'0%','stop-color':'#F0F0F0'}));
  gLid.appendChild(svgEl('stop',{offset:'50%','stop-color':'#E8E8E8'}));
  gLid.appendChild(svgEl('stop',{offset:'100%','stop-color':'#D0D0D0'}));
  defs.appendChild(gLid);

  // Glow filter
  var fGlow=svgEl('filter',{id:'glow',x:'-50%',y:'-50%',width:'200%',height:'200%'});
  fGlow.appendChild(svgEl('feGaussianBlur',{in:'SourceGraphic',stdDeviation:'3',result:'blur'}));
  var feMergeG=svgEl('feMerge',{});
  feMergeG.appendChild(svgEl('feMergeNode',{in:'blur'}));
  feMergeG.appendChild(svgEl('feMergeNode',{in:'SourceGraphic'}));
  fGlow.appendChild(feMergeG);
  defs.appendChild(fGlow);

  svg.appendChild(defs);

  // === SCENE LAYOUT ===
  var cx=525, cy=300;
  var isMobile=window.innerWidth<768;
  var boardW=isMobile?950:650, boardH=isMobile?320:350;
  var boardX=cx-boardW/2, boardY=cy-boardH/2+30;

  // Sub dimensions
  var subW=isMobile?800:520, subH=70;
  var subX=cx-subW/2, subY=cy+10;

  // V-opening geometry
  var vOpenH=130;
  var interiorW=subW-20;
  var interiorX=cx-interiorW/2;
  var bottomBreadTop=subY+10;
  var bottomBreadBot=subY+45;

  // 1. CUTTING BOARD
  var gBoard=svgEl('g',{opacity:0});
  gBoard.appendChild(svgEl('rect',{x:boardX+6,y:boardY+6,width:boardW,height:boardH,rx:12,fill:'#000',opacity:0.2}));
  gBoard.appendChild(svgEl('rect',{x:boardX,y:boardY,width:boardW,height:boardH,rx:12,fill:'url(#woodGrad)',stroke:'#5A4010','stroke-width':2}));
  for(var wi=0;wi<15;wi++){
    var wy=boardY+10+wi*(boardH-20)/15;
    gBoard.appendChild(svgEl('line',{x1:boardX+8,y1:wy+Math.sin(wi)*3,x2:boardX+boardW-8,y2:wy+Math.cos(wi)*2,stroke:'#6E5020','stroke-width':0.6,opacity:0.25}));
  }
  gBoard.appendChild(svgEl('rect',{x:boardX+3,y:boardY+3,width:boardW-6,height:4,rx:2,fill:'#B8902A',opacity:0.2}));
  gBoard.appendChild(svgEl('rect',{x:boardX+20,y:boardY+20,width:boardW-40,height:boardH-40,rx:8,fill:'none',stroke:'#5A4010','stroke-width':1,opacity:0.3}));
  svg.appendChild(gBoard);

  // 2. WHOLE BREAD ROLL
  var gBread=svgEl('g',{opacity:0});
  gBread.appendChild(svgEl('ellipse',{cx:cx,cy:subY+subH/2+12,rx:subW/2-20,ry:8,fill:'#000',opacity:0.15}));
  gBread.appendChild(svgEl('rect',{x:subX,y:subY-subH/2,width:subW,height:subH,rx:subH/2,fill:'url(#crustGrad)',stroke:'#906018','stroke-width':1.5}));
  for(var si=0;si<5;si++){
    var sx=subX+subW*0.1+si*(subW*0.8/4);
    gBread.appendChild(svgEl('line',{x1:sx,y1:subY-subH/2+8,x2:sx+40,y2:subY-subH/2+20,stroke:'#B87A1E','stroke-width':1.5,'stroke-linecap':'round',opacity:0.5}));
  }
  gBread.appendChild(svgEl('rect',{x:subX+40,y:subY-subH/2+3,width:subW-80,height:8,rx:4,fill:'#E8B050',opacity:0.25}));
  for(var fi=0;fi<8;fi++){
    var fx=subX+subW*0.08+fi*(subW*0.78/7);
    gBread.appendChild(svgEl('circle',{cx:fx,cy:subY-subH/2+10+Math.random()*15,r:2+Math.random()*3,fill:'#F5E8D0',opacity:0.2}));
  }
  svg.appendChild(gBread);

  // 3. V-SHAPE BREAD OPENING
  var gVBread=svgEl('g',{opacity:0});

  var interiorPanel=svgEl('path',{
    d:'M'+(subX+5)+' '+(bottomBreadTop+40)+
      ' L'+(subX+5)+' '+(bottomBreadTop-vOpenH-10)+
      ' L'+(subX+subW-5)+' '+(bottomBreadTop-vOpenH-10)+
      ' L'+(subX+subW-5)+' '+(bottomBreadTop+40)+' Z',
    fill:'url(#breadInner)',stroke:'#DDD0B0','stroke-width':0.5,opacity:0
  });
  gVBread.appendChild(interiorPanel);

  var bottomBread=svgEl('g',{});
  bottomBread.appendChild(svgEl('path',{
    d:'M'+(subX+subH/4)+' '+bottomBreadTop+
      ' L'+subX+' '+bottomBreadTop+
      ' Q'+(subX-5)+' '+((bottomBreadTop+bottomBreadBot)/2)+' '+(subX+subH/4)+' '+bottomBreadBot+
      ' L'+(subX+subW-subH/4)+' '+bottomBreadBot+
      ' Q'+(subX+subW+5)+' '+((bottomBreadTop+bottomBreadBot)/2)+' '+(subX+subW)+' '+bottomBreadTop+
      ' L'+(subX+subW-subH/4)+' '+bottomBreadTop+' Z',
    fill:'url(#crustGrad)',stroke:'#906018','stroke-width':1
  }));
  bottomBread.appendChild(svgEl('rect',{x:subX+5,y:bottomBreadTop-3,width:subW-10,height:6,rx:2,fill:'#F5E6C8'}));
  gVBread.appendChild(bottomBread);

  // 4. OIL & VINEGAR
  var gOil=svgEl('g',{opacity:0});
  var oilY=bottomBreadTop-4;
  var oilLine=svgEl('line',{x1:subX+30,y1:oilY,x2:subX+30,y2:oilY,stroke:'#C8A830','stroke-width':2.5,'stroke-linecap':'round',opacity:0.7});
  gOil.appendChild(oilLine);
  var vinegarLine=svgEl('line',{x1:subX+30,y1:oilY+4,x2:subX+30,y2:oilY+4,stroke:'#8B4513','stroke-width':2,'stroke-linecap':'round',opacity:0.5});
  gOil.appendChild(vinegarLine);
  var oilDrops=[];
  var oilCount=isMobile?10:6;
  for(var oi=0;oi<oilCount;oi++){
    var od=svgEl('circle',{cx:subX+subW*0.08+oi*(subW*0.78/(oilCount-1)),cy:oilY+1+Math.random()*3,r:2+Math.random()*2,fill:'#D4A830',opacity:0});
    gOil.appendChild(od);
    oilDrops.push(od);
  }
  gVBread.appendChild(gOil);

  // 5. LETTUCE LEAVES
  var gLettuce=svgEl('g',{opacity:0});
  var lettuceLeaves=[];
  var lettuceCount=isMobile?10:7;
  for(var li=0;li<lettuceCount;li++){
    var lx=subX+subW*0.02+li*(subW*0.82/(lettuceCount-1));
    var ly=bottomBreadTop-8;
    var leafPath='M'+lx+' '+ly+' Q'+(lx+10)+' '+(ly-18)+' '+(lx+25)+' '+(ly-12)+' Q'+(lx+35)+' '+(ly-22)+' '+(lx+50)+' '+(ly-10)+' Q'+(lx+60)+' '+(ly-18)+' '+(lx+70)+' '+(ly-6)+' Q'+(lx+55)+' '+(ly+4)+' '+(lx+35)+' '+(ly+2)+' Q'+(lx+15)+' '+(ly+6)+' '+lx+' '+ly;
    var leaf=svgEl('path',{d:leafPath,fill:li%2===0?'#4CAF50':'#66BB6A',stroke:'#2E7D32','stroke-width':0.5,opacity:0});
    var vein=svgEl('line',{x1:lx+10,y1:ly,x2:lx+55,y2:ly-8,stroke:'#388E3C','stroke-width':0.5,opacity:0});
    gLettuce.appendChild(leaf);
    gLettuce.appendChild(vein);
    lettuceLeaves.push({leaf:leaf,vein:vein});
  }
  gVBread.appendChild(gLettuce);

  // 6. DELI MEATS
  var gMeats=svgEl('g',{opacity:0});
  var meatSlices=[];
  var meatTypes=['salami','ham','cap','salami','ham','cap','salami','ham'];
  var meatFills={'salami':'url(#salamiGrad)','ham':'url(#hamGrad)','cap':'url(#capGrad)'};
  var meatCount=isMobile?11:8;
  for(var mi=0;mi<meatCount;mi++){
    var mx=subX+subW*0.08+mi*(subW*0.78/(meatCount-1));
    var my=bottomBreadTop-22;
    var mType=meatTypes[mi%meatTypes.length];
    var mFill=meatFills[mType];
    var meatG=svgEl('g',{opacity:0});

    if(mType==='salami'){
      for(var sl=0;sl<3;sl++){
        var sliceX=mx+sl*14;
        meatG.appendChild(svgEl('ellipse',{cx:sliceX+15,cy:my,rx:15,ry:12,fill:mFill,stroke:'#7A1818','stroke-width':0.8}));
        for(var sp=0;sp<5;sp++){
          var spAngle=sp*Math.PI*2/5+mi*0.3;
          var spR=4+Math.random()*6;
          meatG.appendChild(svgEl('circle',{cx:sliceX+15+Math.cos(spAngle)*spR,cy:my+Math.sin(spAngle)*spR,r:1+Math.random()*1.2,fill:'#F8E0E0',opacity:0.7}));
        }
      }
    } else if(mType==='ham'){
      var hamW=48, hamH=20;
      meatG.appendChild(svgEl('path',{
        d:'M'+mx+' '+(my+2)+' L'+(mx+hamW)+' '+(my+2)+' L'+(mx+hamW-2)+' '+(my+hamH/2+4)+' Q'+(mx+hamW/2)+' '+(my+hamH/2+7)+' '+(mx+2)+' '+(my+hamH/2+4)+' Z',
        fill:'#D88080',stroke:'#B06060','stroke-width':0.8
      }));
      meatG.appendChild(svgEl('path',{
        d:'M'+(mx+2)+' '+(my+2)+' L'+(mx+hamW-2)+' '+(my+2)+' Q'+(mx+hamW-4)+' '+(my-6)+' '+(mx+hamW/2+8)+' '+(my-10)+' Q'+(mx+hamW/2-5)+' '+(my-12)+' '+(mx+hamW/2-12)+' '+(my-8)+' Q'+(mx+6)+' '+(my-5)+' '+(mx+2)+' '+(my+2)+' Z',
        fill:mFill,stroke:'#B06060','stroke-width':0.8
      }));
    } else {
      var capW=48, capH=20;
      meatG.appendChild(svgEl('path',{
        d:'M'+mx+' '+(my+2)+' L'+(mx+capW)+' '+(my+2)+' L'+(mx+capW-2)+' '+(my+capH/2+3)+' Q'+(mx+capW/2)+' '+(my+capH/2+6)+' '+(mx+2)+' '+(my+capH/2+3)+' Z',
        fill:'#B84A2A',stroke:'#904030','stroke-width':0.8
      }));
      meatG.appendChild(svgEl('path',{

  // === ANIMATION UPDATE ===
  function update(){
    var p=getProgress();

    gTomato.setAttribute('opacity','0');
    for(var rti=0;rti<tomatoSlices.length;rti++) tomatoSlices[rti].setAttribute('opacity','0');
    gOnion.setAttribute('opacity','0');
    for(var rni=0;rni<onionRings.length;rni++) onionRings[rni].setAttribute('opacity','0');
    gToppings.setAttribute('opacity','0');
    for(var rpi=0;rpi<pepperPieces.length;rpi++) pepperPieces[rpi].setAttribute('opacity','0');
    for(var rdi=0;rdi<oreganoDots.length;rdi++) oreganoDots[rdi].setAttribute('opacity','0');
    gClosed.setAttribute('opacity','0');gClosed.setAttribute('transform','');
    gKnife.setAttribute('opacity','0');gKnife.setAttribute('transform','');
    gWrapped.setAttribute('opacity','0');

    var pls2=[document.getElementById('pl1'),document.getElementById('pl2'),document.getElementById('pl3'),document.getElementById('pl4'),document.getElementById('pl5'),document.getElementById('pl6')];
    for(var li2=0;li2<pls2.length;li2++) pls2[li2].style.opacity='0';

    // Helper functions
    function showVOpen(){
      gVBread.setAttribute('opacity','1');
      interiorPanel.setAttribute('opacity','1');
      topBread.setAttribute('transform','translate(0,'+(-(vOpenH-subH/2))+')');
      bottomBread.setAttribute('transform','translate(0,20)');
    }
    function showOilFull(){
      gOil.setAttribute('opacity','1');
      oilLine.setAttribute('x2',String(subX+subW-30));

    }
    function showAllLeaves(){

      for(var i=0;i<lettuceLeaves.length;i++){lettuceLeaves[i].leaf.setAttribute('opacity','1');lettuceLeaves[i].vein.setAttribute('opacity','0.5');}
    }

    }
    function showAllTomatoes(){

      for(var i=0;i<tomatoSlices.length;i++){tomatoSlices[i].setAttribute('opacity','1');}
    }
    function showAllOnions(){

      for(var i=0;i<oreganoDots.length;i++){oreganoDots[i].setAttribute('opacity','0.6');}
    }

    // 1. CUTTING BOARD (5-9%, stays visible through 85%)
    if(p>=0.05&&p<0.85){
      var boardP=clamp((p-0.05)/0.04,0,1);
      gBoard.setAttribute('opacity',String(ease3(boardP)));
      gBoard.setAttribute('transform','scale('+(0.92+ease3(boardP)*0.08)+')');
      if(p<0.09) setPhase('THE BOARD');
    }

    // 2. BREAD ROLL APPEARS (9-15%)
    if(p>=0.09&&p<0.15){
      var breadP=clamp((p-0.09)/0.06,0,1);
      gBread.setAttribute('opacity',String(ease3(breadP)));
      gBread.setAttribute('transform','translateY('+(1-ease3(breadP))*-40+')');
      setPhase('FRESH BAKED ROLL');
    }

    // 3. V-SHAPE BREAD OPENING with KNIFE (15-22%)
    if(p>=0.15&&p<0.57){
      var sliceP=clamp((p-0.15)/0.07,0,1);

      if(sliceP<0.5){
        gKnife.setAttribute('opacity',String(ease3(clamp(sliceP/0.15,0,1))));
        var kSlideP=ease3(clamp(sliceP/0.45,0,1));
        var kStartX=subX-knifeX-40;
        var kEndX=subX+subW-knifeX+40;
        var kSlideX=kStartX+(kEndX-kStartX)*kSlideP;
        gKnife.setAttribute('transform','translate('+kSlideX+',0) rotate(90,'+knifeX+','+knifeBaseY+')');
      } else {
        var knifeFade=1-ease3(clamp((sliceP-0.5)/0.2,0,1));
        gKnife.setAttribute('opacity',String(knifeFade));
        gKnife.setAttribute('transform','translate('+(subX+subW-knifeX+40)+',0) rotate(90,'+knifeX+','+knifeBaseY+')');
      }

      if(sliceP<0.5){
        gBread.setAttribute('opacity','1');
        gVBread.setAttribute('opacity','0');
      } else {
        gBread.setAttribute('opacity',String(1-ease3(clamp((sliceP-0.5)/0.15,0,1))));
        gVBread.setAttribute('opacity',String(ease3(clamp((sliceP-0.5)/0.15,0,1))));
      }

      var panelOpacity=ease3(clamp((sliceP-0.5)/0.4,0,1));
      interiorPanel.setAttribute('opacity',String(panelOpacity));

      var openAmount=ease3(clamp((sliceP-0.5)/0.5,0,1));
      var topLift=-(vOpenH-subH/2)*openAmount;
      topBread.setAttribute('transform','translate(0,'+topLift+')');

      var bottomDrop=20*openAmount;
      bottomBread.setAttribute('transform','translate(0,'+bottomDrop+')');

      if(p<0.22) setPhase('SLICING OPEN');
    }

    // 4. OIL & VINEGAR (22-27%)

      if(p>=0.22&&p<0.27) setPhase('OIL & VINEGAR');
    }

    // 5. LETTUCE (27-33%)
    if(p>=0.27&&p<0.57){

    // 6. DELI MEATS (33-40%)
    if(p>=0.33&&p<0.57){

      for(var mmi=0;mmi<meatSlices.length;mmi++){

    // 7. PROVOLONE CHEESE (40-46%)
    if(p>=0.40&&p<0.57){

      gCheese_g.setAttribute('opacity','1');
      for(var cci=0;cci<cheeseSlices.length;cci++){

    // 9. PEPPERS + OREGANO (52-57%)
    if(p>=0.52&&p<0.57){
      var pepP=clamp((p-0.52)/0.03,0,1);
      gToppings.setAttribute('opacity','1');
      for(var ppi=0;ppi<pepperPieces.length;ppi++){
        var ppP=ease3(clamp((pepP-ppi*0.03)/0.25,0,1));
        pepperPieces[ppi].setAttribute('opacity',String(ppP));
      }
      var oregP=clamp((p-0.54)/0.03,0,1);

      showVOpen();
      showOilFull();
      showAllLeaves();showAllMeats();showAllCheese();showAllTomatoes();showAllOnions();

    // 10. CLOSE THE V (57-63%)
    if(p>=0.57&&p<0.63){

      for(var mmi5=0;mmi5<meatSlices.length;mmi5++){meatSlices[mmi5].setAttribute('opacity',String(ingredFade));}

    if(p>=0.63&&p<0.70){
      var cutP=clamp((p-0.63)/0.07,0,1);
      gClosed.setAttribute('opacity','1');
      gClosed.setAttribute('transform','');
      gKnife.setAttribute('opacity','1');

      var chopDown=ease3(clamp(cutP/0.4,0,1));
      var chopUp=ease3(clamp((cutP-0.55)/0.2,0,1));
      var knifeY=-120+chopDown*120-chopUp*80;

        gWrapped.setAttribute('opacity',String(sepP));
        wrappedLeft.setAttribute('transform','translateX('+(-sepP*220)+')');
        wrappedRight.setAttribute('transform','translateX('+(sepP*220)+')');
      }
      setPhase('CUT IN HALF');

    if(p>=0.70&&p<0.78){

      gKnife.setAttribute('opacity',String(1-ease3(clamp(wrapP/0.2,0,1))));

      gWrapped.setAttribute('opacity','1');
      var sepExtra=ease3(clamp(wrapP/0.5,0,1));
      wrappedLeft.setAttribute('transform','translateX('+(-220-sepExtra*10)+')');
      wrappedRight.setAttribute('transform','translateX('+(220+sepExtra*10)+')');

      var spinAngle=ease3(clamp((wrapP-0.2)/0.5,0,1))*8;
      var spinBack=ease3(clamp((wrapP-0.7)/0.3,0,1))*8;
      var netSpin=spinAngle-spinBack;
      if(wrapP>0.2){
        wrappedLeft.setAttribute('transform','translateX('+(-220-sepExtra*10)+') rotate('+netSpin+','+(subX+subW/4)+','+subY+')');
        wrappedRight.setAttribute('transform','translateX('+(220+sepExtra*10)+') rotate('+(-netSpin)+','+(cx+subW/4)+','+subY+')');
      }

      gBoard.setAttribute('opacity',String(Math.max(0,1-ease3(wrapP))));
      setPhase('WRAPPING UP');
    }

    // 13. BASKET PRESENTATION (78-85%)
    if(p>=0.78&&p<0.85){
      var basketP=clamp((p-0.78)/0.07,0,1);

      var wrapFade=1-ease3(clamp(basketP/0.3,0,1));
      gWrapped.setAttribute('opacity',String(wrapFade));

      var basketIn=ease3(clamp((basketP-0.1)/0.5,0,1));
      gBasketScene.setAttribute('opacity',String(basketIn));
      gBasketScene.setAttribute('transform','translateY('+(1-basketIn)*40+')');

      gBoard.setAttribute('opacity',String(Math.max(0,wrapFade*0.3)));
      setPhase('SERVED FRESH');
    }

    // 14. BRAND GLOW FINALE (85-100%) -- ends at brand name glow, no CTA
    if(p>=0.85){
      var finaleP=clamp((p-0.85)/0.15,0,1);
      sceneGlow.style.opacity=String(ease3(finaleP)*1.0);
      sceneEnergize.style.clipPath='inset(0 '+(100-ease3(finaleP)*100)+'% 0 0)';

      var pls=[document.getElementById('pl1'),document.getElementById('pl2'),document.getElementById('pl3'),document.getElementById('pl4'),document.getElementById('pl5'),document.getElementById('pl6')];
      for(var pli=0;pli<pls.length;pli++){
        var lightP=clamp((finaleP-pli*0.05)/0.25,0,1);
        pls[pli].style.opacity=String(ease3(lightP));
      }

      var brandP=clamp((finaleP-0.1)/0.4,0,1);
      scenePowered.style.opacity=String(ease3(brandP));
      scenePowered.style.transform='scale('+(0.85+ease3(brandP)*0.2)+')';

      if(finaleP>0.1){
        var sceneFade=1-ease3((finaleP-0.1)/0.4);
        gBasketScene.setAttribute('opacity',String(Math.max(0,sceneFade)));
        gBoard.setAttribute('opacity','0');
      }

      setPhase('GASTROSUBS');

      var r=Math.round(20+finaleP*30);
      var g=Math.round(14+finaleP*12);
      var b=Math.round(6+finaleP*6);
      bg.style.background='rgb('+r+','+g+','+b+')';
    }

    // Phase label visibility
    if(p<0.05){
      phaseEl.style.opacity='0';
    }
  }

  function updateSticky(){
    var r=seqEl.getBoundingClientRect(),sH=stickyEl.offsetHeight;
    if(r.top>0){stickyEl.style.position='absolute';stickyEl.style.top='0';stickyEl.style.bottom='auto';}
    else if(r.bottom<=sH){stickyEl.style.position='absolute';stickyEl.style.top='auto';stickyEl.style.bottom='0';}
    else{stickyEl.style.position='fixed';stickyEl.style.top='0';stickyEl.style.bottom='auto';}
  }

  (function loop(){requestAnimationFrame(loop);updateSticky();try{update()}catch(e){}})();
})();
</script>
