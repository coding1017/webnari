<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Website Proposal — Webnari</title>
<meta name="description" content="Your custom website proposal from Webnari. Professional, hand-coded websites that work while you work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#FAFAF8;--white:#FFFFFF;--surface:#F5F4F0;--surface2:#EDECEA;--surface3:#E5E4E0;
  --border:#E0DFDB;--border2:#D0CFC8;
  --gold:#C9A96E;--gold2:#B8944F;--gold-light:#E8D5A8;--gold-bg:rgba(201,169,110,.08);--gold-bg2:rgba(201,169,110,.12);
  --dark:#1A1A1A;--heading:#0F0F0F;--text:#4A4A4A;--muted:#8A8A8A;--light-muted:#B0B0A8;
  --green:#2D8B5F;--green-bg:rgba(45,139,95,.08);
  --red:#C0392B;
  --radius:12px;--radius-lg:16px;
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Instrument Sans',sans-serif;
  --shadow-sm:0 1px 3px rgba(0,0,0,.04),0 1px 2px rgba(0,0,0,.02);
  --shadow:0 4px 16px rgba(0,0,0,.06),0 1px 4px rgba(0,0,0,.04);
  --shadow-lg:0 12px 40px rgba(0,0,0,.08),0 4px 12px rgba(0,0,0,.04);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;overflow-x:hidden}

/* TOP NAV */
.proposal-nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 40px;height:60px;
  background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);box-shadow:0 1px 8px rgba(0,0,0,.03)}
.proposal-nav::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.nav-logo{font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--heading);text-decoration:none;letter-spacing:-.02em}
.nav-center{font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.nav-phone{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--text);text-decoration:none;font-weight:500;transition:color .2s}
.nav-phone:hover{color:var(--gold2)}
.nav-phone svg{width:16px;height:16px;stroke:var(--gold);stroke-width:2;fill:none}

/* HERO HEADER */
.proposal-header{padding:120px 40px 80px;text-align:center;position:relative;overflow:hidden}
.proposal-header::before{content:'';position:absolute;top:-40px;left:50%;transform:translateX(-50%);width:800px;height:600px;
  background:radial-gradient(ellipse,rgba(201,169,110,.1) 0%,rgba(201,169,110,.04) 40%,transparent 70%);pointer-events:none}
.header-eyebrow{font-family:var(--font-body);font-size:12px;font-weight:700;letter-spacing:.18em;color:var(--gold);text-transform:uppercase;margin-bottom:20px}
.header-biz{font-family:var(--font-head);font-size:48px;font-weight:700;color:var(--heading);letter-spacing:-.03em;line-height:1.1;margin-bottom:12px}
.header-meta{font-size:15px;color:var(--muted);line-height:1.6}
.header-meta span{color:var(--text);font-weight:500}
.header-contact{margin-top:12px;font-size:15px;color:var(--text)}
.header-divider{width:48px;height:2px;background:var(--gold);margin:32px auto 0;border-radius:2px;opacity:.5}

/* SECTION SHARED */
.proposal-section{padding:80px 40px;max-width:1000px;margin:0 auto}
.section-eyebrow{font-family:var(--font-body);font-size:11px;font-weight:700;letter-spacing:.16em;color:var(--gold);text-transform:uppercase;text-align:center;margin-bottom:12px}
.section-title{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--heading);letter-spacing:-.02em;text-align:center;margin-bottom:16px}
.section-desc{font-size:15px;color:var(--muted);text-align:center;max-width:520px;margin:0 auto 48px;line-height:1.7}
.section-divider{border:none;height:1px;background:var(--border);margin:0 auto;max-width:1000px}

/* TEMPLATE PREVIEW */
.preview-section{padding:60px 40px;max-width:1000px;margin:0 auto}
.preview-wrap{position:relative;border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-lg);border:1px solid var(--border);height:420px;background:var(--white)}
.preview-wrap iframe{width:250%;height:250%;transform:scale(0.4);transform-origin:0 0;pointer-events:none;border:none;display:block}
.preview-label{position:absolute;bottom:0;left:0;right:0;padding:16px 24px;
  background:linear-gradient(to top,rgba(255,255,255,.95),rgba(255,255,255,.7),transparent);
  font-size:13px;color:var(--muted);font-weight:500}

/* WHY WEBNARI */
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.why-card{padding:32px 28px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);text-align:center;
  transition:border-color .3s,transform .3s,box-shadow .3s}
.why-card:hover{border-color:var(--gold);transform:translateY(-3px);box-shadow:var(--shadow)}
.why-icon{width:52px;height:52px;border-radius:14px;background:var(--gold-bg);border:1px solid var(--gold-bg2);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.why-icon svg{width:24px;height:24px;stroke:var(--gold);stroke-width:1.8;fill:none}
.why-title{font-family:var(--font-head);font-size:16px;font-weight:700;color:var(--heading);margin-bottom:8px}
.why-desc{font-size:14px;color:var(--text);line-height:1.7}

/* ROI CALCULATOR */
.roi-section{padding:80px 40px;background:var(--white);border-top:1px solid var(--border);border-bottom:1px solid var(--border)}
.roi-inner{max-width:800px;margin:0 auto}
.roi-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:40px}
.roi-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.roi-field input{width:100%;padding:14px 16px;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius);
  font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--heading);text-align:center;transition:border-color .2s}
.roi-field input:focus{outline:none;border-color:var(--gold)}
.roi-result{text-align:center;padding:32px;background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border)}
.roi-revenue{font-family:var(--font-head);font-size:40px;font-weight:700;color:var(--heading);margin-bottom:8px}
.roi-revenue span{color:var(--gold)}
.roi-sub{font-size:15px;color:var(--muted);line-height:1.6}
.roi-highlight{display:inline-block;margin-top:12px;padding:8px 20px;background:linear-gradient(135deg,rgba(201,169,110,.12),rgba(201,169,110,.06));
  border:1px solid rgba(201,169,110,.2);border-radius:30px;font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--gold2)}

/* PLAN SECTION */
.plan-detail{max-width:800px;margin:0 auto}
.plan-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.plan-name-block .plan-label{font-family:var(--font-head);font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--gold);text-transform:uppercase;margin-bottom:6px}
.plan-name-block .plan-name{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--heading);letter-spacing:-.02em}
.plan-name-block .plan-count{font-size:13px;color:var(--muted);margin-top:4px}
.plan-price-block{text-align:right}
.plan-price-block .plan-price{font-family:var(--font-head);font-size:48px;font-weight:700;color:var(--heading);letter-spacing:-.03em}
.plan-price-block .plan-price span{font-size:18px;color:var(--muted);font-weight:500}
.plan-price-block .plan-setup{font-size:13px;color:var(--muted);margin-top:4px}
.features-list{columns:2;column-gap:24px}
.feature-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;break-inside:avoid;border-bottom:1px solid var(--surface2)}
.feature-check{flex-shrink:0;width:20px;height:20px;border-radius:50%;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin-top:1px}
.feature-check svg{width:12px;height:12px;stroke:var(--green);stroke-width:2.5;fill:none}
.feature-text{font-size:14px;color:var(--text);line-height:1.5}

/* PLAN COMPARISON */
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:0 auto}
.compare-card{padding:28px 24px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);text-align:center;
  position:relative;transition:border-color .3s,transform .3s,box-shadow .3s}
.compare-card:hover{transform:translateY(-2px);box-shadow:var(--shadow)}
.compare-card.active{border:2px solid var(--gold);box-shadow:0 8px 30px rgba(201,169,110,.12)}
.compare-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-size:9px;padding:4px 14px;
  background:var(--gold);color:var(--white);border-radius:0 0 8px 8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.compare-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--heading);margin-bottom:4px;margin-top:8px}
.compare-price{font-family:var(--font-head);font-size:32px;font-weight:700;margin:12px 0 8px}
.compare-card.active .compare-price{color:var(--gold2)}
.compare-price span{font-size:14px;color:var(--muted);font-weight:500}
.compare-feat-count{font-size:13px;color:var(--muted);margin-bottom:16px}
.compare-features{text-align:left;font-size:13px;color:var(--text);line-height:2}
.compare-features div{display:flex;align-items:center;gap:8px}
.compare-features svg{width:14px;height:14px;stroke:var(--green);stroke-width:2;fill:none;flex-shrink:0}

/* INCLUDED GRID */
.included-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto}
.included-card{padding:28px 24px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg);text-align:center;
  transition:border-color .3s,transform .3s}
.included-card:hover{border-color:var(--gold);transform:translateY(-2px)}
.included-icon{width:52px;height:52px;border-radius:14px;background:var(--gold-bg);border:1px solid var(--gold-bg2);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.included-icon svg{width:24px;height:24px;stroke:var(--gold);stroke-width:1.8;fill:none}
.included-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--heading);margin-bottom:6px}
.included-desc{font-size:13px;color:var(--muted);line-height:1.6}

/* TIMELINE */
.timeline-track{display:flex;max-width:800px;margin:0 auto;position:relative}
.timeline-track::before{content:'';position:absolute;top:20px;left:10%;right:10%;height:2px;background:var(--gold);opacity:.3}
.timeline-step{flex:1;text-align:center;position:relative}
.timeline-num{width:40px;height:40px;border-radius:50%;background:var(--white);border:2px solid var(--gold);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--gold);
  box-shadow:0 2px 12px rgba(201,169,110,.15);position:relative;z-index:2}
.timeline-week{font-size:11px;font-weight:700;color:var(--gold);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.timeline-task{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--heading);margin-bottom:4px}
.timeline-desc{font-size:12px;color:var(--muted);line-height:1.5;max-width:160px;margin:0 auto}

/* TESTIMONIALS */
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto 48px}
.testimonial-card{padding:28px 24px;background:var(--white);border:1px solid var(--border);border-radius:var(--radius-lg)}
.testimonial-stars{display:flex;gap:2px;margin-bottom:14px}
.testimonial-stars svg{width:16px;height:16px;fill:var(--gold);stroke:none}
.testimonial-quote{font-size:14px;color:var(--text);line-height:1.7;font-style:italic;margin-bottom:16px}
.testimonial-author{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--heading)}
.testimonial-role{font-size:12px;color:var(--muted);margin-top:2px}
.trust-bar{display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.trust-item{text-align:center}
.trust-num{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--heading);letter-spacing:-.02em}
.trust-label{font-size:12px;color:var(--muted);margin-top:4px}

/* NOTES */
.notes-box{max-width:700px;margin:0 auto;padding:24px 28px;background:var(--white);border:1px solid var(--border);border-left:3px solid var(--gold);
  border-radius:0 var(--radius) var(--radius) 0}
.notes-label{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--heading);margin-bottom:8px}
.notes-text{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap}

/* ACCEPTANCE */
.accept-section{padding:80px 40px;text-align:center;position:relative;overflow:hidden}
.accept-section::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:800px;height:600px;
  background:radial-gradient(ellipse,rgba(201,169,110,.06) 0%,transparent 60%);pointer-events:none}
.accept-expiry{font-size:14px;color:var(--muted);margin-bottom:32px}
.accept-expiry strong{color:var(--text);font-weight:600}
.accept-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:10px;padding:16px 48px;background:var(--gold);color:var(--white);
  font-family:var(--font-body);font-size:16px;font-weight:600;border:none;border-radius:var(--radius);cursor:pointer;
  transition:all .3s;box-shadow:0 4px 20px rgba(201,169,110,.25)}
.btn-gold:hover{background:var(--gold2);transform:translateY(-2px);box-shadow:0 8px 30px rgba(201,169,110,.35)}
.btn-gold svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;background:transparent;color:var(--gold2);
  font-family:var(--font-body);font-size:15px;font-weight:600;border:1px solid var(--gold);border-radius:var(--radius);
  cursor:pointer;transition:all .3s;text-decoration:none}
.btn-outline:hover{background:var(--gold-bg);transform:translateY(-1px)}
.btn-outline svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.btn-ghost-sm{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:transparent;color:var(--muted);
  font-family:var(--font-body);font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .2s;text-decoration:none}
.btn-ghost-sm:hover{color:var(--text);border-color:var(--border2)}
.btn-ghost-sm svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}

/* ACCEPTED CONFIRMATION */
.accepted-state{display:none;text-align:center;padding:32px;background:var(--green-bg);border:1px solid rgba(45,139,95,.2);border-radius:var(--radius-lg);max-width:500px;margin:0 auto}
.accepted-state.visible{display:block}
.accepted-icon{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.accepted-icon svg{width:32px;height:32px;stroke:white;stroke-width:2.5;fill:none}
.accepted-title{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--heading);margin-bottom:8px}
.accepted-desc{font-size:14px;color:var(--text)}

/* FOOTER */
.proposal-footer{padding:40px;text-align:center;border-top:1px solid var(--border);background:var(--white)}
.footer-tagline{font-family:var(--font-head);font-size:15px;color:var(--muted);margin-bottom:8px}
.footer-tagline span{color:var(--gold)}
.footer-links{font-size:13px;color:var(--muted);margin-bottom:8px}
.footer-links a{color:var(--gold2);text-decoration:none}
.footer-links a:hover{text-decoration:underline}
.footer-copy{font-size:12px;color:var(--light-muted)}

/* ERROR STATE */
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px}
.error-logo{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--heading);margin-bottom:40px}
.error-title{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--heading);margin-bottom:12px}
.error-desc{font-size:15px;color:var(--muted);margin-bottom:32px;max-width:400px;line-height:1.7}

/* RESPONSIVE */
@media(max-width:900px){
  .why-grid,.included-grid,.testimonials-grid{grid-template-columns:repeat(2,1fr)}
  .compare-grid{grid-template-columns:1fr}
  .compare-card{max-width:360px;margin:0 auto}
  .roi-inputs{grid-template-columns:1fr}
  .features-list{columns:1}
  .timeline-track{flex-direction:column;gap:32px;padding-left:40px}
  .timeline-track::before{left:19px;top:0;bottom:0;width:2px;height:auto;right:auto}
  .timeline-step{text-align:left;display:flex;gap:16px;align-items:flex-start}
  .timeline-num{margin:0;flex-shrink:0;position:absolute;left:-40px}
  .timeline-step{position:relative;padding-left:0}
  .timeline-desc{margin:0;max-width:none}
}
@media(max-width:768px){
  .proposal-nav{padding:0 20px;height:56px}
  .nav-center{display:none}
  .proposal-header{padding:100px 20px 60px}
  .header-biz{font-size:36px}
  .proposal-section{padding:60px 20px}
  .section-title{font-size:26px}
  .preview-section{padding:40px 20px}
  .preview-wrap{height:280px}
  .roi-section{padding:60px 20px}
  .roi-revenue{font-size:28px}
  .why-grid,.included-grid,.testimonials-grid{grid-template-columns:1fr}
  .plan-header-row{flex-direction:column;gap:16px;text-align:center}
  .plan-price-block{text-align:center}
  .plan-price-block .plan-price{font-size:36px}
  .trust-bar{gap:24px}
  .trust-num{font-size:24px}
  .accept-buttons{flex-direction:column;align-items:center}
}

/* PRINT */
@media print{
  .proposal-nav,.accept-buttons,.roi-field input,.roi-highlight{display:none!important}
  body{background:white!important}
  *{-webkit-print-color-adjust:exact!important;print-color-adjust:exact!important}
  .proposal-header{padding-top:40px}
  .proposal-section{padding:40px 20px}
  .preview-wrap{height:300px;box-shadow:none;border:1px solid #ddd}
  .roi-section{background:white!important;border:none!important}
  .accept-section{padding:40px 20px}
  .accepted-state{display:none!important}
  .why-card,.included-card,.testimonial-card,.compare-card{box-shadow:none!important;break-inside:avoid}
}

/* ANIMATIONS */
.fade-up{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease}
.fade-up.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>

<div id="proposal-app"></div>

<script>
(function(){

const KEY = 'waas_os_v1';
const params = new URLSearchParams(window.location.search);
const proposalId = params.get('id') || window.location.hash.replace('#','') || null;

const NICHE_MAP = {
  'home-construction':'Home & Construction','landscaping':'Landscaping','food-dining':'Food & Dining',
  'health-wellness':'Health & Wellness','professional-services':'Professional Services','automotive':'Automotive',
  'real-estate':'Real Estate','retail-ecommerce':'Retail & E-commerce','education':'Education',
  'cleaning-services':'Cleaning Services','pet-services':'Pet Services','beauty-personal':'Beauty & Personal Care',
  'technology':'Technology','events-entertainment':'Events & Entertainment','fitness':'Fitness & Sports',
  'nonprofit':'Nonprofit & Community','travel-hospitality':'Travel & Hospitality','legal':'Legal Services',
  'financial':'Financial Services','media-creative':'Media & Creative'
};

const TEMPLATE_MAP = {
  'home-construction':'voltpro.html'
};

function getProposalPrice(plan, pricing) {
  const p = pricing || {};
  return plan === 'starter' ? (p.starter||158) : plan === 'standard' ? (p.standard||258) : (p.premium||378);
}

function getProposalFeatures(plan, pricing) {
  const p = pricing || {};
  const raw = p[plan + 'Features'];
  if (raw) return Array.isArray(raw) ? raw : String(raw).split('\n').filter(f => f.trim());
  const defaults = {
    starter:['1 professionally built website','Up to 5 pages','Mobile-responsive design','Search-ranked page structure','SSL certificate & hosting','Google Business integration','Monthly performance snapshot','Email support'],
    standard:['1 professionally built website','Up to 12 pages','Scroll-driven parallax effects','Advanced search ranking strategy','Blog with monthly content','Contact & lead capture forms','Google Analytics dashboard','Schema markup for local search','Priority support','Monthly growth report'],
    premium:['1 professionally built website','Unlimited pages','Custom parallax animations','Full search ranking management','Weekly blog content','E-commerce or booking integration','Conversion-optimized landing pages','Reputation & review management','Dedicated account manager','Bi-weekly strategy reports','Priority 24-hour support']
  };
  return defaults[plan] || defaults.standard;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}
