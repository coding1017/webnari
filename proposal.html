<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Website Proposal — Webnari</title>
<meta name="description" content="Your custom website proposal from Webnari. Professional, hand-coded websites that work while you work.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
/* ── Tokens (matched to index.html) ── */
:root{
  --bg:#08080E;--surface:#14151F;--surface2:#1C1D2A;--surface3:#252636;
  --border:#32334A;--border2:#42436A;
  --accent:#C9A96E;--accent2:#E8D5A8;--accent-glow:rgba(201,169,110,.35);
  --warm:#D4956B;
  --white:#F2EDE6;--muted:#7A7A92;--text:#A0A0B8;
  --green:#5EBD8A;--red:#E85D75;
  --radius:12px;
  --font-head:'Space Grotesk',sans-serif;
  --font-body:'Instrument Sans',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;cursor:default}
body{background:var(--bg);color:var(--white);font-family:var(--font-body);overflow-x:hidden;-webkit-font-smoothing:antialiased}
button{font-family:var(--font-body);cursor:pointer}
input,select,textarea{font-family:var(--font-body)}
a{color:inherit;text-decoration:none}
h1,h2,h3{font-family:var(--font-head);letter-spacing:-.02em}

/* ── Film Grain ── */
.grain-overlay{position:fixed;inset:0;pointer-events:none;z-index:9999;opacity:.035;background:#fff;mix-blend-mode:overlay}

/* ── Custom Cursor ── */
.cursor-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10001;display:none}
@media(hover:hover){.cursor-canvas{display:block}}

/* ── Section Line Glow ── */
.section-line-glow{width:100%;height:2px;background:linear-gradient(90deg,transparent 5%,var(--accent) 50%,transparent 95%);opacity:.2}

/* ── 3D Camera Animations ── */
.cam-barrel{perspective:1200px;overflow:hidden}
.cam-barrel-inner{transform-origin:center center;transform:perspective(1200px) rotateZ(-12deg) rotateX(8deg) scale(.82);opacity:0;transition:all 1.1s cubic-bezier(.16,1,.3,1)}
.cam-barrel-inner.revealed{transform:perspective(1200px) rotateZ(0) rotateX(0) scale(1);opacity:1}
.cam-dolly{perspective:600px;overflow:hidden}
.cam-dolly-inner{transform-origin:center bottom;transform:perspective(600px) translateZ(-150px) rotateX(-8deg);opacity:0;transition:all 1.1s cubic-bezier(.16,1,.3,1)}
.cam-dolly-inner.revealed{transform:perspective(600px) translateZ(0) rotateX(0);opacity:1}
.cam-flip{perspective:800px;overflow:hidden}
.cam-flip-inner{transform-origin:top center;transform:perspective(800px) rotateX(-55deg) translateY(-50px);opacity:0;transition:all 1s cubic-bezier(.16,1,.3,1)}
.cam-flip-inner.revealed{transform:perspective(800px) rotateX(0) translateY(0);opacity:1}

/* ── Staggered reveal ── */
.reveal-stagger{opacity:0;transform:translateY(28px);transition:opacity .7s ease,transform .7s ease}
.reveal-stagger.revealed{opacity:1;transform:translateY(0)}
.stagger-1{transition-delay:.05s}.stagger-2{transition-delay:.1s}.stagger-3{transition-delay:.15s}
.stagger-4{transition-delay:.2s}.stagger-5{transition-delay:.25s}.stagger-6{transition-delay:.3s}

/* ── Nav ── */
nav{position:fixed;top:0;left:0;right:0;z-index:200;height:64px;display:flex;align-items:center;justify-content:space-between;padding:0 48px;
  background:transparent;transition:background .4s,border-color .4s;border-bottom:1px solid transparent}
nav.scrolled{background:rgba(6,6,10,.8);backdrop-filter:blur(20px) saturate(150%);border-bottom-color:rgba(201,169,110,.08)}
nav::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:.3}
.nav-logo{font-family:var(--font-head);font-size:20px;font-weight:700;letter-spacing:-.02em;color:var(--white);text-decoration:none}
.nav-center{font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);position:absolute;left:50%;transform:translateX(-50%)}
.nav-phone{display:inline-flex;align-items:center;gap:8px;font-size:14px;color:var(--text);text-decoration:none;font-weight:500;transition:color .2s}
.nav-phone:hover{color:var(--accent)}
.nav-phone svg{width:16px;height:16px;stroke:var(--accent);stroke-width:2;fill:none}

/* ── Hero ── */
.proposal-hero{min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;padding:140px 40px 100px;text-align:center}
.proposal-hero::before{content:'';position:absolute;top:-100px;left:50%;transform:translateX(-50%);width:1000px;height:800px;
  background:radial-gradient(ellipse,rgba(201,169,110,.08) 0%,rgba(201,169,110,.02) 40%,transparent 70%);pointer-events:none}
.hero-inner{position:relative;z-index:2;max-width:720px}
.hero-eyebrow{font-family:var(--font-body);font-size:13px;font-weight:600;letter-spacing:.08em;color:var(--accent);margin-bottom:24px;opacity:0;animation:heroFadeUp .8s .2s forwards}
.hero-biz{font-family:var(--font-head);font-size:clamp(40px,7vw,68px);font-weight:700;line-height:1.05;letter-spacing:-.04em;
  background:linear-gradient(135deg,var(--accent2),var(--accent),var(--warm));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:20px;opacity:0;animation:heroFadeUp .8s .4s forwards}
.hero-meta{font-size:15px;color:var(--text);opacity:0;animation:heroFadeUp .8s .55s forwards}
.hero-meta span{color:var(--white);font-weight:500}
.hero-contact{margin-top:12px;font-size:15px;color:var(--text);opacity:0;animation:heroFadeUp .8s .65s forwards}
.hero-contact strong{color:var(--white)}
.hero-divider{width:64px;height:2px;margin:40px auto 0;border-radius:2px;position:relative;overflow:hidden;background:var(--border);opacity:0;animation:heroFadeUp .8s .75s forwards}
.hero-divider::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,var(--accent),var(--accent2),var(--accent));
  animation:shimmer 3s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}50%{transform:translateX(0)}100%{transform:translateX(100%)}}
@keyframes heroFadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.hero-scroll{position:absolute;bottom:40px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:8px;opacity:.4}
.hero-scroll span{font-size:11px;font-weight:500;letter-spacing:.08em;color:var(--muted)}
.hero-scroll-line{width:1px;height:40px;background:linear-gradient(to bottom,var(--accent),transparent);animation:scrollLine 2s ease infinite}
@keyframes scrollLine{0%{opacity:1;transform:scaleY(1)}50%{opacity:.3}100%{opacity:1;transform:scaleY(1)}}

/* ── Section commons ── */
.p-section{padding:100px 48px;position:relative;max-width:1100px;margin:0 auto}
.section-eyebrow{font-family:var(--font-body);font-size:12px;font-weight:600;letter-spacing:.08em;color:var(--accent);margin-bottom:16px;text-align:center}
.section-title{font-family:var(--font-head);font-size:clamp(28px,4vw,44px);font-weight:700;letter-spacing:-.03em;line-height:1.1;color:var(--white);text-align:center;margin-bottom:16px}
.section-desc{font-size:16px;color:var(--text);text-align:center;max-width:520px;margin:0 auto 48px;line-height:1.7}

/* ── Template Preview ── */
.preview-wrap{position:relative;border-radius:16px;overflow:hidden;max-width:960px;margin:0 auto;
  box-shadow:0 20px 60px rgba(0,0,0,.5),0 0 40px rgba(201,169,110,.06);
  border:1px solid rgba(201,169,110,.2);height:420px;background:var(--surface)}
.preview-wrap iframe{width:250%;height:250%;transform:scale(0.4);transform-origin:0 0;pointer-events:none;border:none;display:block}
.preview-label{position:absolute;bottom:0;left:0;right:0;padding:20px 24px;
  background:linear-gradient(to top,rgba(8,8,14,.95),rgba(8,8,14,.6),transparent);
  font-size:14px;color:var(--muted);font-weight:500}

/* ── Why Webnari ── */
.why-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
.why-card{padding:32px 28px;text-align:center;position:relative;overflow:hidden;
  background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:all .35s ease}
.why-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent);opacity:0;transition:opacity .3s}
.why-card:hover::before{opacity:1}
.why-card:hover{transform:translateY(-8px);box-shadow:0 20px 60px rgba(201,169,110,.15);border-color:rgba(201,169,110,.3)}
.why-icon{width:52px;height:52px;border-radius:14px;background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.2);
  display:flex;align-items:center;justify-content:center;margin:0 auto 20px}
.why-icon svg{width:24px;height:24px;stroke:var(--accent);stroke-width:1.8;fill:none}
.why-title{font-family:var(--font-head);font-size:17px;font-weight:700;color:var(--white);margin-bottom:8px}
.why-desc{font-size:14px;color:var(--text);line-height:1.7}

/* ── ROI ── */
.roi-section{padding:100px 48px;position:relative;overflow:hidden}
.roi-section::before{content:'';position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:800px;height:600px;
  background:radial-gradient(ellipse,rgba(201,169,110,.06) 0%,transparent 60%);pointer-events:none}
.roi-inner{max-width:800px;margin:0 auto;position:relative}
.roi-panel{padding:48px;border-radius:16px;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden}
.roi-panel::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--accent),transparent)}
.roi-inputs{display:grid;grid-template-columns:repeat(3,1fr);gap:24px;margin-bottom:40px}
.roi-field label{display:block;font-size:12px;font-weight:600;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;margin-bottom:8px}
.roi-field input{width:100%;padding:14px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius);
  font-family:var(--font-head);font-size:20px;font-weight:700;color:var(--white);text-align:center;transition:all .2s;outline:none}
.roi-field input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(201,169,110,.15)}
.roi-result{text-align:center;padding:32px;background:var(--surface2);border-radius:16px;border:1px solid var(--border)}
.roi-revenue{font-family:var(--font-head);font-size:42px;font-weight:700;color:var(--white);margin-bottom:8px}
.roi-revenue span{background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(201,169,110,.3))}
.roi-sub{font-size:15px;color:var(--text);line-height:1.6}
.roi-sub strong{color:var(--white)}
.roi-highlight{display:inline-block;margin-top:16px;padding:10px 24px;
  background:linear-gradient(135deg,rgba(201,169,110,.15),rgba(201,169,110,.05));
  border:1px solid rgba(201,169,110,.25);border-radius:30px;
  font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--accent2)}

/* ── Plan Detail ── */
.plan-detail{max-width:800px;margin:0 auto}
.plan-card{padding:40px;border-radius:16px;background:var(--surface);border:1px solid var(--border);position:relative;overflow:hidden}
.plan-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--accent) 0%,var(--accent2) 50%,var(--accent) 100%)}
.plan-header-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;padding-bottom:24px;border-bottom:1px solid var(--border)}
.plan-name-block .plan-label{font-size:11px;font-weight:700;letter-spacing:.14em;color:var(--accent);text-transform:uppercase;margin-bottom:6px}
.plan-name-block .plan-name{font-family:var(--font-head);font-size:28px;font-weight:700;color:var(--white);letter-spacing:-.02em}
.plan-name-block .plan-count{font-size:13px;color:var(--muted);margin-top:4px}
.plan-price-block{text-align:right}
.plan-price-block .plan-price{font-family:var(--font-head);font-size:48px;font-weight:700;color:var(--white);letter-spacing:-.03em}
.plan-price-block .plan-price span{font-size:18px;color:var(--muted);font-weight:500}
.plan-price-block .plan-setup{font-size:13px;color:var(--muted);margin-top:4px}
.features-list{columns:2;column-gap:24px}
.feature-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;break-inside:avoid;border-bottom:1px solid rgba(50,51,74,.4)}
.feature-check{flex-shrink:0;width:22px;height:22px;border-radius:50%;background:rgba(201,169,110,.1);border:1px solid rgba(201,169,110,.25);
  display:flex;align-items:center;justify-content:center;margin-top:1px}
.feature-check svg{width:12px;height:12px;stroke:var(--accent);stroke-width:2.5;fill:none}
.feature-text{font-size:14px;color:var(--text);line-height:1.5}

/* ── Compare ── */
.compare-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;max-width:900px;margin:0 auto}
.compare-card{padding:28px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-align:center;
  position:relative;transition:all .35s ease;opacity:.6}
.compare-card:hover{transform:translateY(-3px);box-shadow:0 12px 30px rgba(0,0,0,.3);opacity:.8}
.compare-card.active{opacity:1;border:2px solid var(--accent);box-shadow:0 8px 40px rgba(201,169,110,.12);background:var(--surface2)}
.compare-badge{position:absolute;top:-1px;left:50%;transform:translateX(-50%);font-size:9px;padding:4px 14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);border-radius:0 0 8px 8px;font-weight:700;letter-spacing:.1em;text-transform:uppercase}
.compare-name{font-family:var(--font-head);font-size:18px;font-weight:700;color:var(--white);margin-bottom:4px;margin-top:8px}
.compare-price{font-family:var(--font-head);font-size:32px;font-weight:700;margin:12px 0 8px;color:var(--text)}
.compare-card.active .compare-price{background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.compare-price span{font-size:14px;color:var(--muted);font-weight:500;-webkit-text-fill-color:var(--muted)}
.compare-feat-count{font-size:13px;color:var(--muted);margin-bottom:16px}
.compare-features{text-align:left;font-size:13px;color:var(--text);line-height:2}
.compare-features div{display:flex;align-items:center;gap:8px}
.compare-features svg{width:14px;height:14px;stroke:var(--accent);stroke-width:2;fill:none;flex-shrink:0}

/* ── Included ── */
.included-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto}
.included-card{padding:28px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;text-align:center;transition:all .35s ease}
.included-card:hover{border-color:rgba(201,169,110,.3);transform:translateY(-4px);box-shadow:0 12px 30px rgba(0,0,0,.3),0 0 20px rgba(201,169,110,.06)}
.included-icon{width:52px;height:52px;border-radius:14px;background:rgba(201,169,110,.08);border:1px solid rgba(201,169,110,.2);
  display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.included-icon svg{width:24px;height:24px;stroke:var(--accent);stroke-width:1.8;fill:none}
.included-title{font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--white);margin-bottom:6px}
.included-desc{font-size:13px;color:var(--text);line-height:1.6}

/* ── Timeline ── */
.timeline-track{display:flex;max-width:800px;margin:0 auto;position:relative}
.timeline-track::before{content:'';position:absolute;top:20px;left:10%;right:10%;height:2px;
  background:linear-gradient(90deg,transparent,var(--accent),var(--accent),transparent);opacity:.3}
.timeline-step{flex:1;text-align:center;position:relative}
.timeline-num{width:42px;height:42px;border-radius:50%;background:var(--surface);border:2px solid var(--accent);
  display:flex;align-items:center;justify-content:center;margin:0 auto 14px;
  font-family:var(--font-head);font-size:15px;font-weight:700;color:var(--accent);
  box-shadow:0 0 20px rgba(201,169,110,.15);position:relative;z-index:2}
.timeline-week{font-size:11px;font-weight:700;color:var(--accent);letter-spacing:.06em;text-transform:uppercase;margin-bottom:4px}
.timeline-task{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--white);margin-bottom:4px}
.timeline-desc{font-size:12px;color:var(--text);line-height:1.5;max-width:160px;margin:0 auto}

/* ── Testimonials ── */
.testimonials-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;max-width:900px;margin:0 auto 48px}
.testimonial-card{padding:28px 24px;background:var(--surface);border:1px solid var(--border);border-radius:16px;transition:all .3s}
.testimonial-card:hover{border-color:rgba(201,169,110,.3)}
.testimonial-stars{display:flex;gap:2px;margin-bottom:14px}
.testimonial-stars svg{width:16px;height:16px;fill:var(--accent);stroke:none}
.testimonial-quote{font-size:14px;color:var(--text);line-height:1.7;font-style:italic;margin-bottom:16px}
.testimonial-author{display:flex;align-items:center;gap:12px}
.testimonial-avatar{width:36px;height:36px;border-radius:50%;background:var(--surface2);border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;
  font-family:var(--font-head);font-size:14px;font-weight:700;color:var(--accent);flex-shrink:0}
.testimonial-name{font-family:var(--font-head);font-size:14px;font-weight:600;color:var(--white)}
.testimonial-role{font-size:12px;color:var(--muted);margin-top:2px}
.trust-metrics{display:flex;justify-content:center;gap:48px;flex-wrap:wrap}
.trust-item{text-align:center}
.trust-num{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--accent);letter-spacing:-.02em}
.trust-label-text{font-size:12px;color:var(--muted);margin-top:4px}

/* ── Notes ── */
.notes-box{max-width:700px;margin:0 auto;padding:24px 28px;background:var(--surface);border:1px solid var(--border);border-left:3px solid var(--accent);
  border-radius:0 var(--radius) var(--radius) 0}
.notes-label{font-family:var(--font-head);font-size:13px;font-weight:700;color:var(--white);margin-bottom:8px}
.notes-text{font-size:14px;color:var(--text);line-height:1.7;white-space:pre-wrap}

/* ── Accept ── */
.accept-section{padding:100px 48px;text-align:center;position:relative;overflow:hidden}
.accept-section::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:1000px;height:700px;
  background:radial-gradient(ellipse,rgba(201,169,110,.08) 0%,transparent 55%);pointer-events:none}
.accept-expiry{font-size:14px;color:var(--muted);margin-bottom:32px}
.accept-expiry strong{color:var(--white);font-weight:600}
.accept-buttons{display:flex;gap:16px;justify-content:center;flex-wrap:wrap}
.btn-gold{display:inline-flex;align-items:center;gap:10px;padding:18px 52px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));color:var(--bg);
  font-family:var(--font-body);font-size:16px;font-weight:700;border:none;border-radius:var(--radius);cursor:pointer;
  transition:all .3s;box-shadow:0 4px 20px rgba(201,169,110,.25);position:relative;overflow:hidden}
.btn-gold::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.2),transparent);
  transform:translateX(-100%);transition:transform .5s}
.btn-gold:hover::before{transform:translateX(100%)}
.btn-gold:hover{transform:translateY(-2px);box-shadow:0 8px 40px rgba(201,169,110,.4)}
.btn-gold svg{width:18px;height:18px;stroke:currentColor;stroke-width:2;fill:none}
.btn-outline{display:inline-flex;align-items:center;gap:8px;padding:16px 36px;background:transparent;color:var(--accent);
  font-family:var(--font-body);font-size:15px;font-weight:600;border:1px solid rgba(201,169,110,.25);border-radius:var(--radius);
  cursor:pointer;transition:all .3s;text-decoration:none}
.btn-outline:hover{background:rgba(201,169,110,.08);border-color:var(--accent);transform:translateY(-1px)}
.btn-outline svg{width:16px;height:16px;stroke:currentColor;stroke-width:2;fill:none}
.btn-ghost-sm{display:inline-flex;align-items:center;gap:6px;padding:12px 24px;background:transparent;color:var(--muted);
  font-family:var(--font-body);font-size:14px;font-weight:500;border:1px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .2s;text-decoration:none}
.btn-ghost-sm:hover{color:var(--white);border-color:var(--border2)}
.btn-ghost-sm svg{width:14px;height:14px;stroke:currentColor;stroke-width:2;fill:none}

/* ── Accepted ── */
.accepted-state{display:none;text-align:center;padding:40px;background:rgba(94,189,138,.08);border:1px solid rgba(94,189,138,.2);
  border-radius:16px;max-width:500px;margin:0 auto}
.accepted-state.visible{display:block}
.accepted-icon{width:64px;height:64px;border-radius:50%;background:var(--green);display:flex;align-items:center;justify-content:center;margin:0 auto 16px;
  box-shadow:0 0 40px rgba(94,189,138,.3)}
.accepted-icon svg{width:32px;height:32px;stroke:white;stroke-width:2.5;fill:none}
.accepted-title{font-family:var(--font-head);font-size:22px;font-weight:700;color:var(--white);margin-bottom:8px}
.accepted-desc{font-size:14px;color:var(--text)}

/* ── Footer ── */
.proposal-footer{padding:48px 40px;text-align:center;position:relative}
.proposal-footer::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent 5%,var(--accent) 50%,transparent 95%);opacity:.15}
.footer-brand{font-family:var(--font-head);font-size:18px;font-weight:700;margin-bottom:12px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.footer-tagline{font-size:14px;color:var(--muted);margin-bottom:16px}
.footer-links{font-size:13px;color:var(--muted);margin-bottom:12px}
.footer-links a{color:var(--accent);text-decoration:none;transition:color .2s}
.footer-links a:hover{color:var(--accent2)}
.footer-copy{font-size:12px;color:var(--muted);opacity:.5}

/* ── Error ── */
.error-state{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:40px}
.error-logo{font-family:var(--font-head);font-size:28px;font-weight:700;margin-bottom:40px;
  background:linear-gradient(135deg,var(--accent2),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.error-title{font-family:var(--font-head);font-size:32px;font-weight:700;color:var(--white);margin-bottom:12px}
.error-desc{font-size:15px;color:var(--muted);margin-bottom:32px;max-width:400px;line-height:1.7}

/* ── Responsive ── */
@media(max-width:900px){
  .why-grid,.included-grid,.testimonials-grid{grid-template-columns:repeat(2,1fr)}
  .compare-grid{grid-template-columns:1fr}
  .compare-card{max-width:360px;margin:0 auto}
  .roi-inputs{grid-template-columns:1fr}
  .features-list{columns:1}
  .timeline-track{flex-direction:column;gap:32px;padding-left:40px}
  .timeline-track::before{left:19px;top:0;bottom:0;width:2px;height:auto;right:auto}
  .timeline-step{text-align:left;display:flex;gap:16px;align-items:flex-start;position:relative;padding-left:0}
  .timeline-num{margin:0;flex-shrink:0;position:absolute;left:-40px}
  .timeline-desc{margin:0;max-width:none}
}
@media(max-width:768px){
  nav{padding:0 20px;height:56px}
  .nav-center{display:none}
  .proposal-hero{padding:100px 20px 80px;min-height:auto}
  .hero-biz{font-size:clamp(32px,8vw,48px)}
  .p-section{padding:60px 20px}
  .section-title{font-size:clamp(24px,5vw,32px)}
  .roi-section{padding:60px 20px}
  .roi-panel{padding:28px 20px}
  .roi-revenue{font-size:28px}
  .why-grid,.included-grid,.testimonials-grid{grid-template-columns:1fr}
  .plan-card{padding:28px 20px}
  .plan-header-row{flex-direction:column;gap:16px;text-align:center}
  .plan-price-block{text-align:center}
  .plan-price-block .plan-price{font-size:36px}
  .trust-metrics{gap:24px}
  .trust-num{font-size:24px}
  .accept-section{padding:60px 20px}
  .accept-buttons{flex-direction:column;align-items:center}
  .preview-wrap{height:280px}
  .cursor-canvas{display:none!important}
}

/* ── Print ── */
@media print{
  body{background:#fff!important;color:#1a1a1a!important}
  *{-webkit-print-color-adjust:exact;print-color-adjust:exact}
  nav,.grain-overlay,.cursor-canvas,.hero-scroll{display:none!important}
  .section-title,.hero-biz,.plan-name,.compare-name,.included-title,.why-title,.timeline-task,.testimonial-name,.accepted-title,.notes-label{color:#1a1a1a!important;-webkit-text-fill-color:#1a1a1a!important}
  .plan-card,.compare-card,.testimonial-card,.included-card,.why-card{background:#fff!important;border:1px solid #ddd!important;box-shadow:none!important}
  .cam-barrel-inner,.cam-dolly-inner,.cam-flip-inner,.reveal-stagger{opacity:1!important;transform:none!important}
  .accepted-state{display:none!important}
}

<body>

<div class="grain-overlay"></div>
<canvas class="cursor-canvas" id="cursor-canvas"></canvas>
<div id="proposal-app"></div>

<script>
(function(){

const KEY = 'waas_os_v1';
const params = new URLSearchParams(window.location.search);
const proposalId = params.get('id') || window.location.hash.replace('#','') || null;

const NICHE_MAP = {
  'home-construction':'Home & Construction','landscaping':'Landscaping','food-dining':'Food & Dining',
  'health-wellness':'Health & Wellness','professional-services':'Professional Services','automotive':'Automotive',
  'real-estate':'Real Estate','retail-ecommerce':'Retail & E-commerce','education':'Education',
  'cleaning-services':'Cleaning Services','pet-services':'Pet Services','beauty-personal':'Beauty & Personal Care',
  'technology':'Technology','events-entertainment':'Events & Entertainment','fitness':'Fitness & Sports',
  'nonprofit':'Nonprofit & Community','travel-hospitality':'Travel & Hospitality','legal':'Legal Services',
  'financial':'Financial Services','media-creative':'Media & Creative'
};

const TEMPLATE_MAP = {
  'home-construction':'voltpro.html'
};

const INDUSTRY_DEFAULTS = {
  'home-construction':{revPerCustomer:350,newCustomers:8,label:'Avg. Job Value'},
  'landscaping':{revPerCustomer:200,newCustomers:12,label:'Avg. Contract'},
  'food-dining':{revPerCustomer:35,newCustomers:150,label:'Avg. Check Size'},
  'retail-ecommerce':{revPerCustomer:75,newCustomers:40,label:'Avg. Transaction'},
  'health-wellness':{revPerCustomer:250,newCustomers:10,label:'Avg. Patient Visit'},
  'fitness':{revPerCustomer:50,newCustomers:20,label:'Avg. Monthly Membership'},
  'automotive':{revPerCustomer:400,newCustomers:8,label:'Avg. Repair Job'},
  'professional-services':{revPerCustomer:500,newCustomers:5,label:'Avg. Engagement'},
  'beauty-personal':{revPerCustomer:80,newCustomers:25,label:'Avg. Service'},
  'cleaning-services':{revPerCustomer:150,newCustomers:15,label:'Avg. Job'},
  'pet-services':{revPerCustomer:60,newCustomers:20,label:'Avg. Visit'},
  'real-estate':{revPerCustomer:8000,newCustomers:2,label:'Avg. Commission'},
  'technology':{revPerCustomer:1000,newCustomers:4,label:'Avg. Project'},
  'events-entertainment':{revPerCustomer:300,newCustomers:10,label:'Avg. Booking'},
  'travel-hospitality':{revPerCustomer:200,newCustomers:15,label:'Avg. Booking'},
  'legal':{revPerCustomer:1500,newCustomers:3,label:'Avg. Case Fee'},
  'financial':{revPerCustomer:800,newCustomers:4,label:'Avg. Client Fee'},
  'education':{revPerCustomer:100,newCustomers:20,label:'Avg. Enrollment'},
  'nonprofit':{revPerCustomer:50,newCustomers:30,label:'Avg. Donation'},
  'media-creative':{revPerCustomer:600,newCustomers:5,label:'Avg. Project'}
};

function getProposalPrice(plan, pricing) {
  const p = pricing || {};
  return plan === 'starter' ? (p.starter||158) : plan === 'standard' ? (p.standard||258) : (p.premium||378);
}

function getProposalFeatures(plan, pricing) {
  const p = pricing || {};
  const raw = p[plan + 'Features'];
  if (raw) return Array.isArray(raw) ? raw : String(raw).split('\n').filter(f => f.trim());
  const defaults = {
    starter:['1 professionally built website','Up to 5 pages','Mobile-responsive design','Search-ranked page structure','SSL certificate & hosting','Google Business integration','Monthly performance snapshot','Email support'],
    standard:['1 professionally built website','Up to 12 pages','Scroll-driven parallax effects','Advanced search ranking strategy','Blog with monthly content','Contact & lead capture forms','Google Analytics dashboard','Schema markup for local search','Priority support','Monthly growth report'],
    premium:['1 professionally built website','Unlimited pages','Custom parallax animations','Full search ranking management','Weekly blog content','E-commerce or booking integration','Conversion-optimized landing pages','Reputation & review management','Dedicated account manager','Bi-weekly strategy reports','Priority 24-hour support']
  };
  return defaults[plan] || defaults.standard;
}

function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
}

function formatCurrency(n) {
  return '$' + Number(n).toLocaleString('en-US');
}

function animateCounter(el, target) {
  const duration = 800;
  const start = performance.now();
  const from = 0;
  function tick(now) {
    const t = Math.min((now - start) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3);
    const val = Math.round(from + (target - from) * ease);
    el.textContent = '$' + val.toLocaleString('en-US');
    if (t < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

const star = '<svg viewBox="0 0 24 24"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01z"/></svg>';
const checkSvg = '<svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"/></svg>';

      <div class="error-title">Proposal Not Found</div>

        Contact Us

function renderProposal() {
  if (!proposalId) { showNotFound(); return; }

  const db = JSON.parse(localStorage.getItem(KEY) || '{}');
  const proposal = (db.proposals || []).find(p => p.id === proposalId);
  if (!proposal) { showNotFound(); return; }

  // Mark as viewed
  if (proposal.status === 'sent') {

  const pricing = db.pricing || {starter:158, standard:258, premium:378, setup:1000};
  const plan = proposal.plan || 'standard';
  const planLabel = plan.charAt(0).toUpperCase() + plan.slice(1);
  const price = getProposalPrice(plan, pricing);
  const setup = pricing.setup || 1000;
  const features = getProposalFeatures(plan, pricing);
  const nicheLabel = NICHE_MAP[proposal.niche] || 'Custom Website';
  const templatePath = TEMPLATE_MAP[proposal.niche] || null;
  const isAccepted = proposal.status === 'accepted';

  const ind = INDUSTRY_DEFAULTS[proposal.niche] || {revPerCustomer:500,newCustomers:5,label:'Avg. Revenue Per Customer'};

  // Expiration

  const expires = new Date(created);

  const keyFeatures = {
    starter:['Up to 5 pages','Mobile-responsive','SSL & hosting','Email support'],

    premium:['Unlimited pages','E-commerce ready','Reputation mgmt','Dedicated manager']

  const divider = '<div style="max-width:1000px;margin:0 auto;padding:0 40px;"><div class="section-line-glow"></div></div>';

  let html = '';

  // NAV
  html += `

    <a href="index.html" class="nav-logo">Webnari</a>
    <span class="nav-center">Proposal</span>
    <a href="tel:+17864493800" class="nav-phone">
      <svg viewBox="0 0 24 24"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      Questions? Call us
    </a>
  </nav>`;

  // HERO
  html += `
  <section class="proposal-hero">
    <div class="hero-inner">
      <div class="hero-eyebrow">WEBSITE PROPOSAL</div>
      <h1 class="hero-biz">${proposal.bizName}</h1>
      <div class="hero-meta">
        <span>${nicheLabel}</span> &middot; Prepared ${formatDate(proposal.createdAt)}
      </div>
      ${proposal.contactName ? `<div class="hero-contact">Prepared for: <strong>${proposal.contactName}</strong>${proposal.contactEmail ? ' ('+proposal.contactEmail+')' : ''}</div>` : ''}
      <div class="hero-divider"></div>
    </div>
    <div class="hero-scroll">
      <span>SCROLL</span>
      <div class="hero-scroll-line"></div>
    </div>
  </section>`;

  html += divider;

  // TEMPLATE PREVIEW (cam-barrel)
  if (templatePath) {
    html += `
    <div class="cam-barrel">
      <div class="cam-barrel-inner" style="padding:60px 48px;max-width:1100px;margin:0 auto;">

          <iframe src="${templatePath}" scrolling="no" loading="lazy" tabindex="-1"></iframe>
          <div class="preview-label">Your website will look like this</div>
        </div>
      </div>
    </div>`;
    html += divider;
  }

  // WHY WEBNARI (cam-dolly)
  html += `
  <div class="cam-dolly">
    <div class="cam-dolly-inner p-section">
      <div class="section-eyebrow">Why Webnari</div>

  html += divider;

  // YOUR PLAN (cam-barrel)
  html += `
  <div class="cam-barrel">
    <div class="cam-barrel-inner p-section">

        `).join('')}
      </div>
    </div>
  </div>`;
  html += divider;

  // WHAT'S INCLUDED (staggered reveal)
  html += `
  <section class="p-section">
    <div class="section-eyebrow reveal-stagger">Deliverables</div>
    <div class="section-title reveal-stagger stagger-1">What you will receive</div>
    <div class="section-desc reveal-stagger stagger-2">Tangible assets delivered to you, managed and maintained.</div>
    <div class="included-grid">
      <div class="included-card reveal-stagger stagger-1">
        <div class="included-icon"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg></div>
        <div class="included-title">Professional Website</div>
        <div class="included-desc">Hand-coded, pixel-perfect, built for conversions</div>

  // TIMELINE (cam-flip)

// ── Custom Cursor (from index.html) ──
function initCursor(){
  if(!window.matchMedia('(hover:hover)').matches)return;
  const canvas=document.getElementById('cursor-canvas');if(!canvas)return;
  const ctx=canvas.getContext('2d');
  let W,H;
  function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight}
  resize();window.addEventListener('resize',resize);

  let mx=W/2,my=H/2;
  document.addEventListener('mousemove',e=>{mx=e.clientX;my=e.clientY});

  const sparks=[];

  function spawnSparks(){
    const count=3+Math.floor(Math.random()*3);
    for(let i=0;i<count;i++){
      const angle=Math.random()*Math.PI*2;
      const speed=.6+Math.random()*1.2;
      const zSpeed=1.5+Math.random()*2.5;
      sparks.push({
        x:mx,y:my,z:0,
        vx:Math.cos(angle)*speed,
        vy:Math.sin(angle)*speed,
        vz:zSpeed,
        life:1,
        maxLife:1,
        trail:[{x:mx,y:my,z:0}]
      });
    }
  }

  function project(x,y,z){
    const fov=400;
    const scale=fov/(fov+z);
    const px=mx+(x-mx)*scale;
    const py=my+(y-my)*scale;
    return{x:px,y:py,scale};
  }

  function draw(){
    ctx.clearRect(0,0,W,H);

    if(Math.random()>.3)spawnSparks();

    for(let i=sparks.length-1;i>=0;i--){
      const s=sparks[i];
      s.x+=s.vx;s.y+=s.vy;s.z+=s.vz;
      s.life-=.03;
      if(s.life<=0||s.z>600){sparks.splice(i,1);continue}

      s.trail.push({x:s.x,y:s.y,z:s.z});
      if(s.trail.length>8)s.trail.shift();

      const alpha=s.life*.07;

      if(s.trail.length>1){
        ctx.beginPath();
        const p0=project(s.trail[0].x,s.trail[0].y,s.trail[0].z);
        ctx.moveTo(p0.x,p0.y);
        for(let j=1;j<s.trail.length;j++){
          const tp=s.trail[j];
          const jx=(Math.random()-.5)*4*s.life;
          const jy=(Math.random()-.5)*4*s.life;
          const pp=project(tp.x+jx,tp.y+jy,tp.z);
          ctx.lineTo(pp.x,pp.y);
        }
        const endScale=project(s.x,s.y,s.z).scale;
        ctx.strokeStyle=`rgba(100,180,255,${alpha})`;
        ctx.lineWidth=Math.max(.3,1.5*endScale);
        ctx.stroke();

        ctx.strokeStyle=`rgba(60,140,255,${alpha*.25})`;
        ctx.lineWidth=Math.max(.5,4*endScale);
        ctx.stroke();
      }

      const tip=project(s.x,s.y,s.z);
      const dotSize=Math.max(.5,2.5*tip.scale);
      ctx.beginPath();ctx.arc(tip.x,tip.y,dotSize,0,Math.PI*2);
      ctx.fillStyle=`rgba(150,210,255,${alpha*.8})`;ctx.fill();

      if(s.trail.length>3&&Math.random()>.92){
        const bi=Math.floor(Math.random()*s.trail.length);
        const bp=s.trail[bi];
        const bProj=project(bp.x,bp.y,bp.z);
        const bAngle=Math.random()*Math.PI*2;
        const bLen=6+Math.random()*10;
        ctx.beginPath();
        ctx.moveTo(bProj.x,bProj.y);
        ctx.lineTo(bProj.x+Math.cos(bAngle)*bLen*bProj.scale,bProj.y+Math.sin(bAngle)*bLen*bProj.scale);
        ctx.strokeStyle=`rgba(140,200,255,${alpha*.4})`;
        ctx.lineWidth=.5;
        ctx.stroke();
      }
    }

    const grd=ctx.createRadialGradient(mx,my,0,mx,my,20);
    grd.addColorStop(0,'rgba(80,160,255,.03)');
    grd.addColorStop(1,'rgba(80,160,255,0)');
    ctx.beginPath();ctx.arc(mx,my,20,0,Math.PI*2);
    ctx.fillStyle=grd;ctx.fill();

    if(sparks.length>100)sparks.splice(0,sparks.length-100);
    requestAnimationFrame(draw);
  }
  draw();
}
initCursor();
