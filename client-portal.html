<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Webnari — Client Portal</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Instrument+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
/* ── TOKENS ──────────────────────────────────────────── */
:root {
  --bg:           #08080E;
  --surface:      #12121C;
  --surface2:     #1A1A28;
  --surface3:     #222234;
  --surface4:     #2A2A40;
  --border:       #262636;
  --border2:      #333348;
  --border3:      #44445A;
  --indigo:       #C9A96E;
  --indigo2:      #E8D5A8;
  --indigo-bg:    rgba(201,169,110,0.09);
  --indigo-border:rgba(201,169,110,0.22);
  --indigo-glow:  rgba(201,169,110,0.40);
  --gold:         #C9A96E;
  --gold2:        #E8D5A8;
  --gold-bg:      rgba(201,169,110,0.1);
  --gold-border:  rgba(201,169,110,0.25);
  --gold-glow:    rgba(201,169,110,0.4);
  --teal:         #5EBD8A;
  --teal-bg:      rgba(94,189,138,0.09);
  --purple:       #B07CFF;
  --rose:         #E85D75;
  --white:        #F2EDE6;
  --muted:        #6B6B82;
  --text:         #9A9AB0;
  --green:        #5EBD8A;
  --green-bg:     rgba(94,189,138,0.1);
  --amber:        #D4956B;
  --amber-bg:     rgba(212,149,107,0.1);
  --red:          #E85D75;
  --red-bg:       rgba(232,93,117,0.1);
  --blue:         #6BA3D4;
  --font:         'Instrument Sans', 'Inter', sans-serif;
  --font-head:    'Space Grotesk', 'Inter', sans-serif;
  --radius:       10px;
  --radius-lg:    14px;
  --radius-xl:    18px;
  --sidebar:      250px;
  --topbar:       62px;
}

/* ── CURSOR CANVAS ──────────────────────────────────── */
.cursor-canvas{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:10001;display:none}
@media(hover:hover){.cursor-canvas{display:block}}
@media(max-width:768px){.cursor-canvas{display:none!important}}

/* ── RESET ───────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  font-size: 14px;
  line-height: 1.5;
  overflow-x: hidden;
  background-image:
    radial-gradient(ellipse 80% 50% at 20% 0%, rgba(201,169,110,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 100%, rgba(201,169,110,0.03) 0%, transparent 60%);
}
body::before {
  content: ''; position: fixed; inset: 0; z-index: 9999; pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity: 0.03; mix-blend-mode: overlay;
}
button { font-family: var(--font); cursor: pointer; }
input, select, textarea { font-family: var(--font); }
a { color: inherit; text-decoration: none; }
h1, h2, h3, .page-header h1, .stat-number, .logo-text { font-family: var(--font-head); letter-spacing: -0.02em; }

/* ── PAGE TRANSITIONS ── */
.page { animation: pageIn 0.4s ease-out; }
@keyframes pageIn { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }

/* ── CARD 3D HOVER ── */
.card-3d { transition: transform 0.35s ease, box-shadow 0.35s ease; }
.card-3d:hover { transform: perspective(800px) rotateX(-1.5deg) rotateY(2deg) translateY(-4px); box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 30px rgba(201,169,110,0.08); }

/* ── SIDEBAR ─────────────────────────────────────────── */
.sidebar {
  width: var(--sidebar);
  height: 100vh;
  position: fixed;
  top: 0; left: 0;
  background: linear-gradient(180deg, #141420 0%, #0C0C16 100%);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  z-index: 50;
  box-shadow: 4px 0 32px rgba(0,0,0,0.4);
}
.sidebar::after {
  content: '';
  position: absolute;
  top: 0; right: -1px;
  width: 1px; height: 100%;
  background: linear-gradient(180deg, rgba(201,169,110,0.30) 0%, rgba(201,169,110,0.06) 40%, transparent 100%);
  pointer-events: none;
}
.sidebar-logo {
  padding: 22px 20px 22px;
  display: flex;
  align-items: center;
  gap: 11px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  margin-bottom: 10px;
}
.logo-mark {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, #C9A96E 0%, #E8D5A8 50%, #D4956B 100%);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 17px; font-weight: 900; color: #0A0A12;
  flex-shrink: 0;
  box-shadow: 0 4px 16px rgba(201,169,110,0.5), 0 0 0 1px rgba(255,255,255,0.15) inset;
}
.logo-text { font-size: 15px; font-weight: 800; color: var(--white); letter-spacing: -0.03em; }
.logo-text span {
  background: linear-gradient(90deg, #C9A96E, #E8D5A8);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.sidebar-nav {
  flex: 1;
  overflow-y: auto;
  padding: 0 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.nav-section-label {
  font-size: 9.5px; font-weight: 700; letter-spacing: 0.13em;
  text-transform: uppercase; color: var(--muted);
  padding: 10px 10px 4px;
  opacity: 0.7;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 9px 12px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.18s;
  color: var(--muted);
  font-size: 13.5px; font-weight: 500;
  border: 1px solid transparent; background: none;
  width: 100%; text-align: left;
}
.nav-item:hover {
  background: rgba(201,169,110,0.07);
  color: var(--white);
  border-color: rgba(201,169,110,0.12);
}
.nav-item.active {
  background: linear-gradient(90deg, rgba(201,169,110,0.15) 0%, rgba(201,169,110,0.06) 100%);
  color: var(--indigo2);
  border-color: var(--indigo-border);
  box-shadow: inset 3px 0 0 var(--indigo), 0 1px 8px rgba(201,169,110,0.12);
}
.nav-icon { width: 18px; height: 18px; flex-shrink: 0; color: currentColor; }
.nav-icon svg { width: 100%; height: 100%; }
.nav-badge {
  margin-left: auto;
  background: linear-gradient(135deg, #C9A96E, #D4956B);
  color: #0A0A12;
  font-size: 10px; font-weight: 700;
  padding: 2px 7px;
  border-radius: 20px;
  min-width: 20px; text-align: center;
  box-shadow: 0 2px 8px rgba(201,169,110,0.4);
}
.nav-divider { height: 1px; background: linear-gradient(90deg, transparent, var(--border), transparent); margin: 8px 8px; }
.sidebar-footer {
  padding: 14px 16px;
  border-top: 1px solid rgba(255,255,255,0.04);
  display: flex; align-items: center; gap: 10px;
  background: rgba(0,0,0,0.2);
}
.agency-avatar {
  width: 34px; height: 34px;
  border-radius: 9px;
  background: linear-gradient(135deg, rgba(201,169,110,0.2), rgba(212,149,107,0.15));
  border: 1px solid var(--indigo-border);
  display: flex; align-items: center; justify-content: center;
  font-size: 13px; font-weight: 800; color: var(--indigo2);
  flex-shrink: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.3);
}
.agency-info { flex: 1; min-width: 0; }
.agency-name {
  font-size: 12.5px; font-weight: 700; color: var(--white);
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.agency-sub { font-size: 10.5px; color: var(--muted); }
.logout-btn {
  background: none; border: none; color: var(--muted); cursor: pointer;
  padding: 4px; border-radius: 6px; display: flex; align-items: center;
  transition: color 0.15s;
}
.logout-btn:hover { color: var(--red); }

/* ── MAIN ────────────────────────────────────────────── */
.main { margin-left: var(--sidebar); flex: 1; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }

/* ── TOPBAR ──────────────────────────────────────────── */
.topbar {
  height: var(--topbar);
  background: rgba(12,12,20,0.85);
  backdrop-filter: blur(20px) saturate(180%);
  -webkit-backdrop-filter: blur(20px) saturate(180%);
  border-bottom: 1px solid rgba(255,255,255,0.05);
  box-shadow: 0 1px 0 rgba(201,169,110,0.1), 0 4px 24px rgba(0,0,0,0.3);
  display: flex; align-items: center;
  padding: 0 32px; gap: 14px;
  position: sticky; top: 0; z-index: 40;
}
.topbar-title { font-family: var(--font-head); font-size: 16px; font-weight: 700; color: var(--white); flex: 1; letter-spacing: -0.02em; }
.topbar-actions { display: flex; align-items: center; gap: 8px; }

/* ── BUTTONS ─────────────────────────────────────────── */
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 8px 18px;
  border-radius: var(--radius);
  font-size: 13px; font-weight: 600;
  border: none; cursor: pointer;
  transition: all 0.18s; white-space: nowrap; font-family: var(--font);
  letter-spacing: -0.01em;
}
.btn-primary {
  background: linear-gradient(135deg, #C9A96E 0%, #D4B07A 50%, #E8D5A8 100%);
  color: #0A0A12;
  box-shadow: 0 2px 12px rgba(201,169,110,0.35), 0 0 0 1px rgba(255,255,255,0.08) inset;
  font-weight: 700;
}
.btn-primary:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 24px rgba(201,169,110,0.5), 0 0 0 1px rgba(255,255,255,0.12) inset;
  background: linear-gradient(135deg, #D4B07A 0%, #E8D5A8 50%, #F2EDE6 100%);
}
.btn-ghost {
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.08);
  color: var(--text);
}
.btn-ghost:hover {
  border-color: var(--indigo-border);
  color: var(--indigo2);
  background: var(--indigo-bg);
}
.btn-gold {
  background: linear-gradient(135deg, #C9A96E 0%, #D4B07A 50%, #E8D5A8 100%);
  color: #0A0A12;
  box-shadow: 0 2px 12px rgba(201,169,110,0.35);
  font-weight: 700;
}
.btn-gold:hover {
  transform: translateY(-2px) scale(1.02);
  box-shadow: 0 8px 24px rgba(201,169,110,0.5);
}
.btn-danger { background: var(--red-bg); border: 1px solid rgba(255,77,109,0.2); color: var(--red); }
.btn-danger:hover { background: rgba(255,77,109,0.18); border-color: rgba(255,77,109,0.4); }
.btn-sm { padding: 5px 12px; font-size: 12px; }
.btn-icon { width: 32px; height: 32px; padding: 0; justify-content: center; border-radius: 8px; }

/* ── PAGES ───────────────────────────────────────────── */
.page { padding: 32px; flex: 1; display: none; }
.page.active { display: block; }
.page-header {
  display: flex; align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 28px; gap: 16px;
}
.page-header-left h1 {
  font-size: 24px; font-weight: 900; color: var(--white);
  letter-spacing: -0.04em; margin-bottom: 4px;
  text-shadow: 0 0 40px rgba(201,169,110,0.2);
}
.page-header-left p { font-size: 13px; color: var(--muted); }

/* ── KPI CARDS ───────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 18px; margin-bottom: 26px;
}
.kpi-card {
  background: linear-gradient(145deg, var(--surface2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 22px 24px;
  position: relative; overflow: hidden;
  transition: border-color 0.25s, transform 0.25s, box-shadow 0.25s;
}
.kpi-card:hover {
  border-color: var(--border3);
  transform: perspective(800px) rotateX(-1deg) rotateY(1.5deg) translateY(-4px);
  box-shadow: 0 16px 48px rgba(0,0,0,0.4), 0 0 20px rgba(201,169,110,0.06), 0 0 0 1px rgba(255,255,255,0.04) inset;
}
.kpi-card::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0;
  height: 3px;
  background: var(--accent, linear-gradient(90deg, var(--indigo), var(--purple)));
  border-radius: 3px 3px 0 0;
}
.kpi-card::after {
  content: '';
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 60%;
  background: linear-gradient(to top, rgba(0,0,0,0.15), transparent);
  pointer-events: none;
}
.kpi-glow {
  position: absolute;
  top: -30px; right: -30px;
  width: 120px; height: 120px;
  border-radius: 50%;
  background: var(--accent, var(--indigo));
  opacity: 0.08;
  filter: blur(30px);
  pointer-events: none;
}
.kpi-label {
  font-size: 10.5px; font-weight: 700; letter-spacing: 0.09em;
  text-transform: uppercase; color: var(--muted);
  margin-bottom: 14px;
  display: flex; align-items: center; justify-content: space-between;
}
.kpi-icon { font-size: 14px; opacity: 0.7; }
.kpi-value {
  font-family: var(--font-head); font-size: 36px; font-weight: 700; color: var(--white);
  letter-spacing: -0.04em; line-height: 1; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--white) 30%, var(--indigo2));
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.kpi-value sub { font-size: 14px; font-weight: 500; color: var(--muted); vertical-align: baseline; }
.kpi-trend { display: flex; align-items: center; gap: 5px; font-size: 12px; font-weight: 600; }
.kpi-trend.up { color: var(--green); }
.kpi-trend.down { color: var(--red); }
.kpi-trend.neutral { color: var(--muted); }

/* ── PANELS ──────────────────────────────────────────── */
.panel {
  background: linear-gradient(160deg, var(--surface2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(0,0,0,0.25);
  backdrop-filter: blur(8px);
  transition: border-color 0.3s, box-shadow 0.3s;
}
.panel:hover {
  border-color: var(--border2);
  box-shadow: 0 8px 32px rgba(0,0,0,0.35), 0 0 16px rgba(201,169,110,0.05);
}
.panel-header {
  padding: 18px 22px;
  border-bottom: 1px solid rgba(255,255,255,0.04);
  display: flex; align-items: center; justify-content: space-between;
  background: linear-gradient(90deg, rgba(201,169,110,0.03), transparent);
}
.panel-title { font-family: var(--font-head); font-size: 14px; font-weight: 700; color: var(--white); letter-spacing: -0.01em; }
.panel-subtitle { font-size: 12px; color: var(--muted); margin-top: 2px; }
.panel-body { padding: 22px; }
.panel-link {
  font-size: 12.5px; font-weight: 600; color: var(--indigo2);
  cursor: pointer; border: none; background: none; font-family: var(--font);
  transition: color 0.15s;
}
.panel-link:hover { color: var(--gold2); }

/* ── GRID LAYOUTS ────────────────────────────────────── */
.grid-2 { display: grid; grid-template-columns: 1.4fr 1fr; gap: 16px; margin-bottom: 16px; }
.grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.grid-2-equal { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 16px; }

/* ── TABLE ───────────────────────────────────────────── */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead tr { border-bottom: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.02); }
thead th {
  padding: 12px 18px; text-align: left;
  font-size: 10px; font-weight: 700;
  letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid rgba(255,255,255,0.03); transition: background 0.15s; }
tbody tr:last-child { border-bottom: none; }
tbody tr:hover { background: rgba(201,169,110,0.04); }
td { padding: 14px 18px; color: var(--text); vertical-align: middle; }
td.bold { color: var(--white); font-weight: 600; }

/* ── BADGES ──────────────────────────────────────────── */
.badge {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 11px; font-weight: 700; white-space: nowrap;
  letter-spacing: 0.02em;
}
.badge-green  { background: rgba(0,201,141,0.12); color: var(--green); border: 1px solid rgba(0,201,141,0.2); }
.badge-amber  { background: var(--amber-bg); color: var(--amber); border: 1px solid rgba(245,166,35,0.2); }
.badge-red    { background: var(--red-bg);   color: var(--red); border: 1px solid rgba(255,77,109,0.2); }
.badge-indigo { background: var(--indigo-bg); color: var(--indigo2); border: 1px solid var(--indigo-border); }
.badge-gold   { background: var(--gold-bg); color: var(--gold2); border: 1px solid var(--gold-border); }
.badge-muted  { background: rgba(255,255,255,0.04); color: var(--muted); border: 1px solid rgba(255,255,255,0.07); }
.badge-purple { background: rgba(176,124,255,0.1); color: var(--purple); border: 1px solid rgba(176,124,255,0.2); }
.badge-teal   { background: var(--teal-bg); color: var(--teal); border: 1px solid rgba(0,191,166,0.2); }
.badge-dot    { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

/* ── FORM ELEMENTS ──────────────────────────────────── */
.form-group { margin-bottom: 18px; }
.form-label {
  display: block; font-size: 11px; font-weight: 700;
  letter-spacing: 0.08em; text-transform: uppercase;
  color: var(--muted); margin-bottom: 6px;
}
.form-input, .form-select, .form-textarea {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid rgba(255,255,255,0.07);
  border-radius: var(--radius);
  padding: 10px 14px;
  color: var(--white); font-size: 13px;
  outline: none; font-family: var(--font);
  transition: all 0.18s;
}
.form-textarea { min-height: 100px; resize: vertical; }
.form-input:focus, .form-select:focus, .form-textarea:focus {
  border-color: var(--indigo-border);
  background: rgba(201,169,110,0.06);
  box-shadow: 0 0 0 3px rgba(201,169,110,0.1);
}
.form-select { cursor: pointer; }
.form-select option { background: var(--surface); color: var(--text); }

/* ── TOAST ──────────────────────────────────────────── */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 10002; display: flex; flex-direction: column; gap: 8px; }
.toast {
  padding: 12px 20px; border-radius: var(--radius);
  font-size: 13px; font-weight: 600; color: var(--white);
  animation: toastIn 0.3s ease-out;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 8px;
}
.toast-success { background: linear-gradient(135deg, rgba(94,189,138,0.9), rgba(94,189,138,0.7)); color: #0A0A12; }
.toast-error { background: linear-gradient(135deg, rgba(232,93,117,0.9), rgba(232,93,117,0.7)); color: #0A0A12; }
.toast-info { background: linear-gradient(135deg, rgba(201,169,110,0.9), rgba(201,169,110,0.7)); color: #0A0A12; }
@keyframes toastIn { from { opacity: 0; transform: translateX(40px); } to { opacity: 1; transform: translateX(0); } }
@keyframes toastOut { from { opacity: 1; } to { opacity: 0; transform: translateX(40px); } }

/* ── ACTIVITY ITEM ──────────────────────────────────── */
.activity-item {
  display: flex; align-items: flex-start; gap: 12px;
  padding: 12px 0;
  border-bottom: 1px solid rgba(255,255,255,0.03);
}
.activity-item:last-child { border-bottom: none; }
.activity-dot {
  width: 8px; height: 8px; border-radius: 50%;
  margin-top: 6px; flex-shrink: 0;
}
.activity-text { font-size: 13px; color: var(--text); line-height: 1.5; }
.activity-text strong { color: var(--white); font-weight: 600; }
.activity-time { font-size: 11px; color: var(--muted); margin-top: 2px; }

/* ── QUICK ACTIONS ──────────────────────────────────── */
.quick-actions { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px; }
.quick-action {
  background: linear-gradient(145deg, var(--surface2) 0%, var(--surface) 100%);
  border: 1px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 20px;
  cursor: pointer;
  transition: all 0.25s;
  display: flex; flex-direction: column; align-items: center;
  gap: 10px; text-align: center;
}
.quick-action:hover {
  border-color: var(--indigo-border);
  background: var(--indigo-bg);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

    const seed = {clients:SEED_CLIENTS, changeRequests:[], contentItems:[], healthChecks:{}, pagespeedData:{}, pricing:{starter:158,standard:258,premium:378,setup:1000}};

  } catch { return {clients:SEED_CLIENTS, changeRequests:[], contentItems:[], healthChecks:{}, pagespeedData:{}, pricing:{starter:158,standard:258,premium:378,setup:1000}}; }
}

function escHtml(s) { var d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

function formatNum(n) { return (n || 0).toLocaleString(); }

function scoreRing(val, size) {
  var r = (size - 8) / 2;
  var circ = 2 * Math.PI * r;
  var pct = Math.min(val, 100) / 100;
  var color = val >= 90 ? 'var(--green)' : val >= 50 ? 'var(--amber)' : 'var(--red)';
  var fontSize = Math.round(size * 0.28);
  return '<div class="score-ring" style="width:' + size + 'px;height:' + size + 'px">' +
    '<svg width="' + size + '" height="' + size + '" viewBox="0 0 ' + size + ' ' + size + '">' +
    '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="6"/>' +
    '<circle cx="' + size/2 + '" cy="' + size/2 + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="6" ' +
    'stroke-dasharray="' + circ + '" stroke-dashoffset="' + (circ * (1 - pct)) + '" ' +
    'stroke-linecap="round" transform="rotate(-90 ' + size/2 + ' ' + size/2 + ')" style="transition:stroke-dashoffset 0.8s ease"/>' +
    '</svg>' +
    '<div class="score-ring-label" style="font-size:' + fontSize + 'px">' + val + '</div></div>';
}

function trendArrow(cur, prev) {
  if (!prev || prev === 0) return { html: '<span style="color:var(--muted)">--</span>', color: 'var(--muted)' };
  var delta = ((cur - prev) / prev * 100).toFixed(1);
  var up = delta > 0;
  var color = up ? 'var(--green)' : 'var(--red)';
  var arrow = up ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>'
    : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>';
  var cls = up ? 'up' : 'down';
  return { html: '<span class="kpi-trend ' + cls + '">' + arrow + ' ' + Math.abs(delta) + '%</span>', color: color };
}

function timeAgo(dateStr) {
  var now = new Date();
  var d = new Date(dateStr);
  var diff = Math.floor((now - d) / 1000);
  if (diff < 60) return 'just now';
  if (diff < 3600) return Math.floor(diff / 60) + 'm ago';
  if (diff < 86400) return Math.floor(diff / 3600) + 'h ago';
  var days = Math.floor(diff / 86400);
  if (days === 1) return 'yesterday';
  if (days < 30) return days + 'd ago';
  return Math.floor(days / 30) + 'mo ago';
}

function starsHtml(rating) {
  var html = '<span class="stars">';
  for (var i = 1; i <= 5; i++) {
    if (i <= Math.floor(rating)) {
      html += '<svg class="star-filled" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    } else {
      html += '<svg class="star-empty" width="14" height="14" viewBox="0 0 24 24" fill="currentColor" stroke="none"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>';
    }
  }
  html += '</span>';
  return html;
}

function toast(msg, type) {
  type = type || 'info';
  var c = document.getElementById('toast-container');
  var t = document.createElement('div');
  t.className = 'toast toast-' + type;
  t.innerHTML = msg;
  c.appendChild(t);
  setTimeout(function() {
    t.style.animation = 'toastOut 0.3s ease forwards';
    setTimeout(function() { t.remove(); }, 300);
  }, 3000);
}

function getGreeting() {
  var h = new Date().getHours();
  if (h < 12) return 'Good morning';
  if (h < 17) return 'Good afternoon';
  return 'Good evening';
}

}

}

function generateHistory(current, months) {
  var hist = [];
  var analytics = CLIENT.analytics || {};
  if (analytics.history && analytics.history.length >= months) return analytics.history.slice(-months);
  var base = (current || 0) * 0.4;
  var growth = current > 0 ? (current - base) / months : 0;
  for (var i = 0; i < months; i++) {
    var noise = 1 + (Math.random() - 0.5) * 0.2;
    hist.push(Math.round((base + growth * i) * noise));
  }
  return hist;
}

function generatePaymentHistory(months) {
  var payments = [];
  var rate = getMonthlyRate();
  var billingDate = CLIENT.billingDate ? new Date(CLIENT.billingDate) : new Date();
  for (var i = months - 1; i >= 0; i--) {
    var d = new Date(billingDate);
    d.setMonth(d.getMonth() - i);
    payments.push({
      date: d.toISOString().split('T')[0],
      amount: rate,
      status: i === 0 ? 'upcoming' : 'paid'
    });
  }
  return payments;
}

// ════════════════════════════════════════════════════
//  TAB 2: PERFORMANCE
// ════════════════════════════════════════════════════
function renderPerformance() {
  var a = CLIENT.analytics || {};
  var sessions = a.sessions || 0;
  var organic = a.organic || 0;
  var conversions = a.conversions || 0;
  var convRate = a.convRate || 0;
  var bounceRate = a.bounceRate || 0;
  var avgDuration = a.avgDuration || '0:00';
  var sessT = trendArrow(sessions, a.prevSessions || 0);
  var convT = trendArrow(conversions, a.prevConversions || 0);
  var ps = getPagespeed();

  var history = generateHistory(sessions, 12);
  var convHistory = generateHistory(conversions, 12);
  var maxH = Math.max.apply(null, history.concat(convHistory)) || 1;

  // Bounce rate color
  var bounceColor = bounceRate <= 35 ? 'var(--green)' : bounceRate <= 55 ? 'var(--amber)' : 'var(--red)';

  // KPI cards
  var kpiHtml = '<div class="kpi-grid" style="grid-template-columns:repeat(6,1fr)">' +
    '<div class="kpi-card card-3d" style="--accent:var(--indigo)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Sessions <span class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/></svg></span></div>' +
    '<div class="kpi-value">' + formatNum(sessions) + '</div>' + sessT.html + '</div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--green)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Organic Traffic</div>' +
    '<div class="kpi-value">' + formatNum(organic) + '</div>' +
    '<span class="badge badge-green" style="font-size:10px">' + (sessions > 0 ? Math.round(organic / sessions * 100) : 0) + '% of total</span></div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--purple)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Conversions <span class="kpi-icon"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg></span></div>' +
    '<div class="kpi-value">' + formatNum(conversions) + '</div>' + convT.html + '</div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--blue)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Conv. Rate</div>' +
    '<div class="kpi-value">' + convRate + '%</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:' + bounceColor + '"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Bounce Rate</div>' +
    '<div class="kpi-value" style="background:linear-gradient(135deg,' + bounceColor + ',var(--white));-webkit-background-clip:text;-webkit-text-fill-color:transparent">' + bounceRate + '%</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--amber)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Avg Duration</div>' +
    '<div class="kpi-value">' + escHtml(avgDuration) + '</div></div>' +
    '</div>';

  // SVG dual-line chart
  var chartW = 700, chartH = 220, padL = 48, padB = 30, padT = 14;
  var plotW = chartW - padL - 16;
  var plotH = chartH - padB - padT;
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var now = new Date();
  var startMonth = now.getMonth() - 11;

  var sessPoints = [], convPoints = [];
  for (var i = 0; i < 12; i++) {
    var x = padL + (i / 11) * plotW;
    var sy = padT + plotH - (history[i] / maxH) * plotH;
    var cy = padT + plotH - (convHistory[i] / maxH) * plotH;
    sessPoints.push({ x: x, y: sy });
    convPoints.push({ x: x, y: cy });
  }

  var sessLine = sessPoints.map(function(p){ return p.x + ',' + p.y; }).join(' ');
  var sessArea = padL + ',' + (padT + plotH) + ' ' + sessLine + ' ' + (padL + plotW) + ',' + (padT + plotH);
  var convLine = convPoints.map(function(p){ return p.x + ',' + p.y; }).join(' ');

  var gridLines = '';
  for (var j = 0; j <= 4; j++) {
    var yy = padT + plotH - (j / 4) * plotH;
    var yVal = Math.round(maxH * j / 4);
    gridLines += '<text x="' + (padL - 8) + '" y="' + (yy + 4) + '" text-anchor="end" fill="#6B6B82" font-size="10">' + formatNum(yVal) + '</text>';
    gridLines += '<line x1="' + padL + '" y1="' + yy + '" x2="' + (padL + plotW) + '" y2="' + yy + '" stroke="rgba(255,255,255,0.04)" stroke-width="1"/>';
  }
  var xLabels = '';
  for (var k = 0; k < 12; k++) {
    var xPos = padL + (k / 11) * plotW;
    var mIdx = ((startMonth + k) % 12 + 12) % 12;
    xLabels += '<text x="' + xPos + '" y="' + (chartH - 6) + '" text-anchor="middle" fill="#6B6B82" font-size="10">' + monthNames[mIdx] + '</text>';
  }

  var sessDots = sessPoints.map(function(p) {
    return '<circle cx="' + p.x + '" cy="' + p.y + '" r="3.5" fill="var(--surface)" stroke="var(--indigo)" stroke-width="2"/>';
  }).join('');
  var convDots = convPoints.map(function(p) {
    return '<circle cx="' + p.x + '" cy="' + p.y + '" r="3" fill="var(--surface)" stroke="var(--green)" stroke-width="1.5"/>';
  }).join('');

  var chartSvg = '<svg viewBox="0 0 ' + chartW + ' ' + chartH + '" preserveAspectRatio="xMidYMid meet">' +
    '<defs><linearGradient id="perfAreaGrad" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="rgba(201,169,110,0.25)"/><stop offset="100%" stop-color="rgba(201,169,110,0)"/></linearGradient></defs>' +
    gridLines + xLabels +
    '<polygon points="' + sessArea + '" fill="url(#perfAreaGrad)"/>' +
    '<polyline points="' + sessLine + '" fill="none" stroke="var(--indigo)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>' +
    '<polyline points="' + convLine + '" fill="none" stroke="var(--green)" stroke-width="2" stroke-dasharray="6,4" stroke-linejoin="round" stroke-linecap="round"/>' +
    sessDots + convDots +
    '<circle cx="' + (chartW - 120) + '" cy="10" r="4" fill="var(--indigo)"/><text x="' + (chartW - 112) + '" y="14" fill="#9A9AB0" font-size="10">Sessions</text>' +
    '<circle cx="' + (chartW - 52) + '" cy="10" r="4" fill="var(--green)"/><text x="' + (chartW - 44) + '" y="14" fill="#9A9AB0" font-size="10">Conv.</text>' +
    '</svg>';

  // Traffic sources with percentages
  var totalTraffic = (a.organic || 0) + (a.paid || 0) + (a.direct || 0) + (a.social || 0) + (a.referral || 0);
  var sources = [
    { label: 'Organic', val: a.organic || 0, color: 'var(--green)' },
    { label: 'Paid', val: a.paid || 0, color: 'var(--purple)' },
    { label: 'Direct', val: a.direct || 0, color: 'var(--indigo)' },
    { label: 'Social', val: a.social || 0, color: 'var(--blue)' },
    { label: 'Referral', val: a.referral || 0, color: 'var(--amber)' }
  ];
  var maxSource = Math.max.apply(null, sources.map(function(s){ return s.val; })) || 1;
  var sourcesHtml = sources.map(function(s) {
    var pct = Math.round(s.val / maxSource * 100);
    var pctOfTotal = totalTraffic > 0 ? Math.round(s.val / totalTraffic * 100) : 0;
    return '<div class="pipeline-bar"><div class="pipeline-label">' + s.label + ' <span style="color:var(--muted);font-size:10px;font-weight:400">' + pctOfTotal + '%</span></div>' +
      '<div class="pipeline-track"><div class="pipeline-fill" style="width:' + pct + '%;background:' + s.color + '">' + (pct > 15 ? formatNum(s.val) : '') + '</div></div>' +
      '<div class="pipeline-count">' + formatNum(s.val) + '</div></div>';
  }).join('');

  // Top pages with color-coded bounce
  var topPages = (a.topPages || []).slice(0, 5);
  var pagesHtml = '';
  if (topPages.length > 0) {
    pagesHtml = '<div class="table-wrap"><table><thead><tr><th>Path</th><th>Title</th><th>Sessions</th><th>Bounce Rate</th></tr></thead><tbody>';
    topPages.forEach(function(p) {
      var bc = (p.bounce || 0) <= 35 ? 'var(--green)' : (p.bounce || 0) <= 55 ? 'var(--amber)' : 'var(--red)';
      pagesHtml += '<tr><td style="color:var(--indigo2);font-size:12px;font-family:monospace">' + escHtml(p.path || '/') + '</td>' +
        '<td class="bold">' + escHtml(p.title || '--') + '</td>' +
        '<td>' + formatNum(p.sessions) + '</td>' +
        '<td><span style="color:' + bc + ';font-weight:600">' + (p.bounce || 0) + '%</span></td></tr>';
    });
    pagesHtml += '</tbody></table></div>';
  } else {
    pagesHtml = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No page data available yet</div>';
  }

  // Conversion funnel with percentages between stages
  var visitors = sessions;
  var engaged = Math.round(visitors * (1 - (bounceRate || 50) / 100));
  var leadsCount = (CLIENT.leads || []).length;
  var customers = (CLIENT.leads || []).filter(function(l){ return l.stage === 'closed'; }).length;
  var funnelData = [
    { label: 'Visitors', val: visitors, color: 'var(--indigo)' },
    { label: 'Engaged', val: engaged, color: 'var(--blue)' },
    { label: 'Leads', val: leadsCount, color: 'var(--purple)' },
    { label: 'Customers', val: customers, color: 'var(--green)' }
  ];
  var maxFunnel = visitors || 1;
  var funnelHtml = '';
  funnelData.forEach(function(f, idx) {
    var pct = Math.max(Math.round(f.val / maxFunnel * 100), 2);
    funnelHtml += '<div class="funnel-step"><div class="funnel-label">' + f.label + '</div>' +
      '<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + pct + '%;background:' + f.color + '">' + (pct > 15 ? formatNum(f.val) : '') + '</div></div>' +
      '<div class="funnel-val">' + formatNum(f.val) + '</div></div>';
    if (idx < funnelData.length - 1) {
      var nextVal = funnelData[idx + 1].val;
      var dropPct = f.val > 0 ? Math.round(nextVal / f.val * 100) : 0;
      funnelHtml += '<div style="text-align:center;padding:2px 0 2px 100px;font-size:10px;color:var(--muted)">' +
        '<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg> ' +
        dropPct + '% proceed</div>';
    }
  });

  // Device breakdown
  var deviceData = [
    { label: 'Desktop', pct: 34, color: 'var(--indigo)' },
    { label: 'Mobile', pct: 58, color: 'var(--purple)' },
    { label: 'Tablet', pct: 8, color: 'var(--amber)' }
  ];
  var devicesHtml = deviceData.map(function(d) {
    return '<div class="pipeline-bar"><div class="pipeline-label">' + d.label + '</div>' +
      '<div class="pipeline-track"><div class="pipeline-fill" style="width:' + d.pct + '%;background:' + d.color + '">' + d.pct + '%</div></div>' +
      '<div class="pipeline-count">' + d.pct + '%</div></div>';
  }).join('');

  document.getElementById('page-performance').innerHTML =
    '<div class="page-header"><div class="page-header-left"><h1>Performance</h1><p>Website analytics and insights</p></div></div>' +

    kpiHtml +

    // Dual-line chart
    '<div class="panel" style="margin-bottom:16px"><div class="panel-header"><div><div class="panel-title">Traffic Trend (12 Months)</div>' +
    '<div class="panel-subtitle">Sessions and conversions over time</div></div>' +
    '<span class="badge badge-indigo">' + formatNum(sessions) + ' this month</span></div>' +
    '<div class="panel-body"><div class="chart-container">' + chartSvg + '</div></div></div>' +

    '<div class="grid-2">' +
    '<div class="panel"><div class="panel-header"><div class="panel-title">Traffic Sources</div></div>' +
    '<div class="panel-body">' + sourcesHtml + '</div></div>' +

    '<div class="panel"><div class="panel-header"><div class="panel-title">Top Pages</div></div>' +
    '<div class="panel-body" style="padding:0">' + pagesHtml + '</div></div></div>' +

    '<div class="grid-2">' +
    '<div class="panel"><div class="panel-header"><div class="panel-title">Conversion Funnel</div></div>' +
    '<div class="panel-body">' + funnelHtml + '</div></div>' +

    '<div class="panel"><div class="panel-header"><div class="panel-title">Device Breakdown</div></div>' +
    '<div class="panel-body">' + devicesHtml + '</div></div></div>' +

    // PageSpeed gauges
    '<div class="panel" style="margin-top:16px"><div class="panel-header"><div class="panel-title">PageSpeed Insights</div></div>' +
    '<div class="panel-body"><div style="display:flex;justify-content:space-around;flex-wrap:wrap;gap:20px;text-align:center">' +
    '<div>' + scoreRing(ps.performance, 100) + '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted)">PERFORMANCE</div></div>' +
    '<div>' + scoreRing(ps.accessibility, 100) + '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted)">ACCESSIBILITY</div></div>' +
    '<div>' + scoreRing(ps.bestPractices, 100) + '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted)">BEST PRACTICES</div></div>' +
    '<div>' + scoreRing(ps.seo, 100) + '<div style="margin-top:8px;font-size:11px;font-weight:600;color:var(--muted)">SEO</div></div>' +
    '</div></div></div>';
}

// ════════════════════════════════════════════════════
//  TAB 3: REPUTATION
// ════════════════════════════════════════════════════
function renderReputation() {
  var rep = CLIENT.reputation || {};
  var avgR = getAvgRating();
  var reviews = rep.recentReviews || [];
  var totalReviews = 0;
  var respondedCount = 0;
  var positiveCount = 0;
  var needsResponse = 0;
  var platforms = [
    { key: 'google', name: 'Google', color: 'var(--blue)' },
    { key: 'yelp', name: 'Yelp', color: 'var(--red)' },
    { key: 'facebook', name: 'Facebook', color: 'var(--indigo)' },
    { key: 'homeadvisor', name: 'HomeAdvisor', color: 'var(--amber)' }
  ];

  platforms.forEach(function(p) {
    var d = rep[p.key] || { rating: 0, reviews: 0 };
    totalReviews += d.reviews || 0;
  });

  reviews.forEach(function(r) {
    if (r.responded) respondedCount++;
    else needsResponse++;
    if (r.rating >= 4) positiveCount++;
  });
  var responseRate = reviews.length > 0 ? Math.round(respondedCount / reviews.length * 100) : 0;
  var positiveRate = reviews.length > 0 ? Math.round(positiveCount / reviews.length * 100) : 0;

  // KPI cards
  var kpiHtml = '<div class="kpi-grid" style="grid-template-columns:repeat(5,1fr)">' +
    '<div class="kpi-card card-3d" style="--accent:var(--amber)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Overall Rating</div>' +
    '<div class="kpi-value">' + avgR + '</div>' +
    '<div>' + starsHtml(parseFloat(avgR) || 0) + '</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--green)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Response Rate</div>' +
    '<div class="kpi-value">' + responseRate + '%</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--indigo)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Positive %</div>' +
    '<div class="kpi-value">' + positiveRate + '%</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:' + (needsResponse > 0 ? 'var(--red)' : 'var(--green)') + '"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Needs Response</div>' +
    '<div class="kpi-value">' + needsResponse + '</div></div>' +

    '<div class="kpi-card card-3d" style="--accent:var(--purple)"><div class="kpi-glow"></div>' +
    '<div class="kpi-label">Total Reviews</div>' +
    '<div class="kpi-value">' + formatNum(totalReviews) + '</div></div>' +
    '</div>';

  // Platform cards
  var platformCards = platforms.map(function(p) {
    var d = rep[p.key] || { rating: 0, reviews: 0 };
    return '<div class="platform-card">' +
      '<div class="platform-name">' + p.name + '</div>' +
      '<div class="platform-rating">' + (d.rating > 0 ? d.rating.toFixed(1) : '--') + '</div>' +
      '<div>' + starsHtml(d.rating || 0) + '</div>' +
      '<div class="platform-reviews">' + formatNum(d.reviews) + ' reviews</div></div>';
  }).join('');

  // Star distribution
  var starDist = [0, 0, 0, 0, 0];
  reviews.forEach(function(r) {
    if (r.rating >= 1 && r.rating <= 5) starDist[r.rating - 1]++;
  });
  var maxStar = Math.max.apply(null, starDist) || 1;
  var starDistHtml = '';
  for (var s = 5; s >= 1; s--) {
    var count = starDist[s - 1];
    var pct = Math.round(count / maxStar * 100);
    var barColor = s >= 4 ? 'var(--green)' : s === 3 ? 'var(--amber)' : 'var(--red)';
    starDistHtml += '<div class="pipeline-bar"><div class="pipeline-label">' + s + ' star</div>' +
      '<div class="pipeline-track"><div class="pipeline-fill" style="width:' + pct + '%;background:' + barColor + '">' + (pct > 20 ? count : '') + '</div></div>' +
      '<div class="pipeline-count">' + count + '</div></div>';
  }

  // Monthly review count bar chart (6 months)
  var monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  var now = new Date();
  var monthlyReviews = [];
  for (var m = 5; m >= 0; m--) {
    var checkMonth = new Date(now.getFullYear(), now.getMonth() - m, 1);
    var cnt = 0;
    reviews.forEach(function(r) {
      var rd = new Date(r.date);
      if (rd.getFullYear() === checkMonth.getFullYear() && rd.getMonth() === checkMonth.getMonth()) cnt++;
    });
    monthlyReviews.push({ month: monthNames[checkMonth.getMonth()], count: cnt });
  }
  var maxMonthly = Math.max.apply(null, monthlyReviews.map(function(m){ return m.count; })) || 1;
  var chartW = 400, chartH = 140, padL = 32, padB = 24, padT = 10;
  var plotW = chartW - padL - 10;
  var plotH = chartH - padB - padT;
  var barW = plotW / 6 * 0.6;
  var barGap = plotW / 6;
  var barsSvg = '';
  monthlyReviews.forEach(function(m, i) {
    var bh = m.count > 0 ? (m.count / maxMonthly) * plotH : 2;
    var bx = padL + i * barGap + (barGap - barW) / 2;
    var by = padT + plotH - bh;
    barsSvg += '<rect x="' + bx + '" y="' + by + '" width="' + barW + '" height="' + bh + '" rx="3" fill="var(--indigo)" opacity="0.8"/>';
    if (m.count > 0) barsSvg += '<text x="' + (bx + barW / 2) + '" y="' + (by - 4) + '" text-anchor="middle" fill="var(--white)" font-size="10" font-weight="600">' + m.count + '</text>';
    barsSvg += '<text x="' + (bx + barW / 2) + '" y="' + (chartH - 6) + '" text-anchor="middle" fill="#6B6B82" font-size="10">' + m.month + '</text>';
  });
  var monthlyChartSvg = '<svg viewBox="0 0 ' + chartW + ' ' + chartH + '" preserveAspectRatio="xMidYMid meet">' +
    '<line x1="' + padL + '" y1="' + (padT + plotH) + '" x2="' + (padL + plotW) + '" y2="' + (padT + plotH) + '" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>' +
    barsSvg + '</svg>';

  // Recent reviews with avatar, sentiment, responded badge
  var reviewsDisplayed = reviews.slice(0, 10);
  var reviewsHtml = '';
  if (reviewsDisplayed.length === 0) {
    reviewsHtml = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No reviews yet</div>';
  } else {
    reviewsDisplayed.forEach(function(r) {
      var initial = (r.author || '?')[0].toUpperCase();
      var sentimentLabel = r.rating >= 4 ? 'Positive' : r.rating === 3 ? 'Neutral' : 'Negative';
      var sentimentBadge = r.rating >= 4 ? 'badge-green' : r.rating === 3 ? 'badge-amber' : 'badge-red';
      var statusBadge = r.responded
        ? '<span class="badge badge-green" style="font-size:10px"><span class="badge-dot"></span> Responded</span>'
        : '<span class="badge badge-amber" style="font-size:10px"><span class="badge-dot"></span> Pending</span>';
      var platformColors = { google: 'var(--blue)', yelp: 'var(--red)', facebook: 'var(--indigo)', homeadvisor: 'var(--amber)' };
      var pColor = platformColors[r.platform] || 'var(--muted)';
      reviewsHtml += '<div class="review-item" style="display:flex;gap:12px">' +
        '<div style="width:36px;height:36px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;color:var(--indigo2);flex-shrink:0">' + initial + '</div>' +
        '<div style="flex:1">' +
        '<div class="review-header">' +
        '<span class="review-author">' + escHtml(r.author) + '</span>' +
        '<span class="badge badge-muted" style="font-size:9px;color:' + pColor + ';border-color:' + pColor + '">' + escHtml(r.platform) + '</span>' +
        '<span>' + starsHtml(r.rating) + '</span>' +
        '<span class="badge ' + sentimentBadge + '" style="font-size:9px">' + sentimentLabel + '</span>' +
        statusBadge +
        '</div>' +
        '<div class="review-text">' + escHtml(r.text) + '</div>' +
        '<div class="review-date">' + timeAgo(r.date) + '</div></div></div>';
    });
  }

  // Review request link
  var reviewLink = CLIENT.liveUrl ? CLIENT.liveUrl + '/reviews' : 'https://webnari.io/review/' + CLIENT.id;

  document.getElementById('page-reputation').innerHTML =
    '<div class="page-header"><div class="page-header-left"><h1>Reputation</h1><p>Online reviews and ratings</p></div></div>' +

    kpiHtml +

    // Platform cards
    '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:16px">' + platformCards + '</div>' +

    '<div class="grid-2">' +
    // Star distribution
    '<div class="panel"><div class="panel-header"><div class="panel-title">Star Distribution</div></div>' +
    '<div class="panel-body">' + starDistHtml + '</div></div>' +

    // Monthly chart
    '<div class="panel"><div class="panel-header"><div class="panel-title">Monthly Reviews</div>' +
    '<span class="badge badge-muted">Last 6 months</span></div>' +
    '<div class="panel-body"><div class="chart-container">' + monthlyChartSvg + '</div></div></div></div>' +

    // Reviews
    '<div class="panel" style="margin-bottom:16px"><div class="panel-header"><div class="panel-title">Recent Reviews</div>' +
    '<span class="badge badge-muted">' + reviews.length + '</span></div>' +
    '<div class="panel-body">' + reviewsHtml + '</div></div>' +

    // Review link
    '<div class="panel"><div class="panel-header"><div class="panel-title">Review Request Link</div></div>' +
    '<div class="panel-body">' +
    '<p style="font-size:13px;color:var(--text);margin-bottom:14px">Share this link with customers to collect reviews.</p>' +
    '<div class="copy-link-wrap">' +
    '<div class="copy-link-text" id="review-link-text">' + escHtml(reviewLink) + '</div>' +
    '<button class="btn btn-primary btn-sm" onclick="copyReviewLink()">Copy</button></div>' +
    '</div></div>';

  // Fix platform grid on mobile
  var style = document.createElement('style');
  style.textContent = '@media(max-width:768px){#page-reputation .platform-card{min-width:0}[style*="grid-template-columns:repeat(4"]{grid-template-columns:1fr 1fr!important}[style*="grid-template-columns:repeat(5"]{grid-template-columns:1fr 1fr!important}}@media(max-width:480px){[style*="grid-template-columns:repeat(4"]{grid-template-columns:1fr!important}[style*="grid-template-columns:repeat(5"]{grid-template-columns:1fr!important}}';
  document.head.appendChild(style);
}

function copyReviewLink() {
  var text = document.getElementById('review-link-text').textContent;
  navigator.clipboard.writeText(text).then(function() {
    toast('Review link copied to clipboard', 'success');
  }).catch(function() {
    toast('Failed to copy link', 'error');
  });
}

// ════════════════════════════════════════════════════
//  TAB 4: LEADS
// ════════════════════════════════════════════════════
function renderLeads() {
  var leads = CLIENT.leads || [];
  var stages = { 'new': 0, contacted: 0, qualified: 0, closed: 0 };
  leads.forEach(function(l) { if (stages.hasOwnProperty(l.stage)) stages[l.stage]++; });
  var total = leads.length;
  var maxStage = Math.max.apply(null, Object.values(stages)) || 1;

  // New this month
  var now = new Date();
  var newThisMonth = leads.filter(function(l) {
    var ld = new Date(l.date);
    return ld.getFullYear() === now.getFullYear() && ld.getMonth() === now.getMonth();
  }).length;

  var closedLeads = stages.closed;
  var convRate = total > 0 ? (closedLeads / total * 100).toFixed(1) : 0;
  var pipelineValue = leads.reduce(function(s, l) { return s + (l.value || 0); }, 0);

  // KPI cards
  var kpiHtml = '<div class="kpi-grid">' +
    '<div class="kpi-card card-3d" style="--accent:var(--indigo)"><div class="kpi-glow"></div><div class="kpi-label">Total Leads</div><div class="kpi-value">' + total + '</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--blue)"><div class="kpi-glow"></div><div class="kpi-label">New This Month</div><div class="kpi-value">' + newThisMonth + '</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--green)"><div class="kpi-glow"></div><div class="kpi-label">Conversion Rate</div><div class="kpi-value">' + convRate + '%</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--purple)"><div class="kpi-glow"></div><div class="kpi-label">Pipeline Value</div><div class="kpi-value">$' + formatNum(pipelineValue) + '</div></div>' +
    '</div>';

  // Pipeline funnel
  var pipelineColors = { 'new': 'var(--blue)', contacted: 'var(--amber)', qualified: 'var(--purple)', closed: 'var(--green)' };
  var pipelineLabels = { 'new': 'New', contacted: 'Contacted', qualified: 'Qualified', closed: 'Won/Lost' };
  var totalForFunnel = total || 1;
  var pipelineHtml = '';
  ['new', 'contacted', 'qualified', 'closed'].forEach(function(s) {
    var pct = Math.max(Math.round(stages[s] / totalForFunnel * 100), 2);
    pipelineHtml += '<div class="funnel-step"><div class="funnel-label">' + pipelineLabels[s] + '</div>' +
      '<div class="funnel-bar-wrap"><div class="funnel-bar" style="width:' + pct + '%;background:' + pipelineColors[s] + '">' + (pct > 15 ? stages[s] : '') + '</div></div>' +
      '<div class="funnel-val">' + stages[s] + '</div></div>';
  });

  // Source breakdown
  var sourceCounts = {};
  leads.forEach(function(l) {
    var src = l.source || 'Unknown';
    sourceCounts[src] = (sourceCounts[src] || 0) + 1;
  });
  var sourceEntries = Object.keys(sourceCounts).map(function(k) { return { label: k, val: sourceCounts[k] }; });
  sourceEntries.sort(function(a, b) { return b.val - a.val; });
  var maxSrc = sourceEntries.length > 0 ? sourceEntries[0].val : 1;
  var sourceColors = { Google: 'var(--blue)', Website: 'var(--indigo)', Referral: 'var(--green)', Ads: 'var(--purple)', Facebook: 'var(--amber)' };
  var sourcesHtml = sourceEntries.map(function(s) {
    var pct = Math.round(s.val / maxSrc * 100);
    var color = sourceColors[s.label] || 'var(--muted)';
    return '<div class="pipeline-bar"><div class="pipeline-label">' + escHtml(s.label) + '</div>' +
      '<div class="pipeline-track"><div class="pipeline-fill" style="width:' + pct + '%;background:' + color + '">' + (pct > 20 ? s.val : '') + '</div></div>' +
      '<div class="pipeline-count">' + s.val + '</div></div>';
  }).join('');
  if (sourceEntries.length === 0) sourcesHtml = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No source data</div>';

  // Full leads table sorted newest first
  var sortedLeads = leads.slice().sort(function(a, b) { return new Date(b.date) - new Date(a.date); });
  var stageBadge = { 'new': 'badge-indigo', contacted: 'badge-amber', qualified: 'badge-purple', closed: 'badge-green' };
  var tableHtml = '';
  if (sortedLeads.length === 0) {
    tableHtml = '<div style="padding:20px;text-align:center;color:var(--muted)">No leads yet</div>';
  } else {
    tableHtml = '<div class="table-wrap"><table><thead><tr><th>Name</th><th>Phone</th><th>Source</th><th>Stage</th><th>Date</th><th>Value</th></tr></thead><tbody>';
    sortedLeads.forEach(function(l) {
      tableHtml += '<tr><td class="bold">' + escHtml(l.name || '--') + '</td>' +
        '<td>' + escHtml(l.phone || '--') + '</td>' +
        '<td>' + escHtml(l.source || '--') + '</td>' +
        '<td><span class="badge ' + (stageBadge[l.stage] || 'badge-muted') + '"><span class="badge-dot"></span> ' + escHtml(l.stage || '--') + '</span></td>' +
        '<td>' + (l.date ? timeAgo(l.date) : '--') + '</td>' +
        '<td>' + (l.value ? '$' + formatNum(l.value) : '--') + '</td></tr>';
    });
    tableHtml += '</tbody></table></div>';
  }

  // Stale lead alert
  var staleAlertHtml = '';
  var staleLeads = leads.filter(function(l) {
    if (l.stage !== 'new') return false;
    var ld = new Date(l.date);
    var hoursDiff = (now - ld) / (1000 * 60 * 60);
    return hoursDiff > 48;
  });
  if (staleLeads.length > 0) {
    staleAlertHtml = '<div style="background:var(--red-bg);border:1px solid rgba(232,93,117,0.25);border-radius:var(--radius-lg);padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px">' +
      '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--red)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>' +
      '<div><div style="font-size:13px;font-weight:700;color:var(--red);margin-bottom:2px">Stale Leads Alert</div>' +
      '<div style="font-size:12px;color:var(--text)">' + staleLeads.length + ' lead' + (staleLeads.length > 1 ? 's' : '') + ' in "new" stage for over 48 hours: ' +
      staleLeads.map(function(l) { return '<strong style="color:var(--white)">' + escHtml(l.name) + '</strong>'; }).join(', ') +
      '</div></div></div>';
  }

  document.getElementById('page-leads').innerHTML =
    '<div class="page-header"><div class="page-header-left"><h1>Leads</h1><p>Your lead pipeline and contacts</p></div></div>' +

    staleAlertHtml +
    kpiHtml +

    '<div class="grid-2">' +
    // Pipeline funnel
    '<div class="panel"><div class="panel-header"><div class="panel-title">Pipeline Funnel</div></div>' +
    '<div class="panel-body">' + pipelineHtml + '</div></div>' +

    // Source breakdown
    '<div class="panel"><div class="panel-header"><div class="panel-title">Lead Sources</div></div>' +
    '<div class="panel-body">' + sourcesHtml + '</div></div></div>' +

    // Table
    '<div class="panel" style="margin-top:16px"><div class="panel-header"><div class="panel-title">All Leads</div>' +
    '<span class="badge badge-muted">' + total + '</span></div>' +
    '<div class="panel-body" style="padding:0">' + tableHtml + '</div></div>';
}

// ════════════════════════════════════════════════════
//  TAB 5: AD CAMPAIGNS
// ════════════════════════════════════════════════════
function renderAds() {
  var ads = (CLIENT.ads && CLIENT.ads.campaigns) || [];
  var totalSpend = 0, totalClicks = 0, totalConversions = 0, totalBudget = 0;
  ads.forEach(function(c) {
    totalSpend += c.spend || 0;
    totalClicks += c.clicks || 0;
    totalConversions += c.conversions || 0;
    totalBudget += c.budget || 0;
  });
  var roas = totalSpend > 0 ? (totalConversions * 50 / totalSpend).toFixed(2) : '0.00';

  // KPI cards
  var kpiHtml = '<div class="kpi-grid">' +
    '<div class="kpi-card card-3d" style="--accent:var(--red)"><div class="kpi-glow"></div><div class="kpi-label">Total Spend</div><div class="kpi-value">$' + formatNum(totalSpend) + '</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--blue)"><div class="kpi-glow"></div><div class="kpi-label">Clicks</div><div class="kpi-value">' + formatNum(totalClicks) + '</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--green)"><div class="kpi-glow"></div><div class="kpi-label">Conversions</div><div class="kpi-value">' + formatNum(totalConversions) + '</div></div>' +
    '<div class="kpi-card card-3d" style="--accent:var(--purple)"><div class="kpi-glow"></div><div class="kpi-label">ROAS</div><div class="kpi-value">' + roas + 'x</div></div>' +
    '</div>';

  // Campaign table
  var tableHtml = '';
  if (ads.length === 0) {
    tableHtml = '<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">No ad campaigns running</div>';
  } else {
    var platformBadge = { google: 'badge-indigo', facebook: 'badge-purple', instagram: 'badge-amber', bing: 'badge-teal' };
    tableHtml = '<div class="table-wrap"><table><thead><tr><th>Campaign</th><th>Platform</th><th>Budget</th><th>Spend</th><th>Clicks</th><th>Conv.</th><th>CPC</th></tr></thead><tbody>';
    ads.forEach(function(c) {
      var spendPct = c.budget > 0 ? Math.round(c.spend / c.budget * 100) : 0;
      var spendColor = spendPct >= 90 ? 'var(--red)' : spendPct >= 70 ? 'var(--amber)' : 'var(--green)';
      var cpc = c.clicks > 0 ? (c.spend / c.clicks).toFixed(2) : '--';
      tableHtml += '<tr><td class="bold">' + escHtml(c.name) + '</td>' +
        '<td><span class="badge ' + (platformBadge[c.platform] || 'badge-muted') + '">' + escHtml(c.platform || '--') + '</span></td>' +
        '<td>$' + formatNum(c.budget) + '</td>' +
        '<td><div style="display:flex;align-items:center;gap:8px">$' + formatNum(c.spend) +
        '<div style="width:60px;height:6px;background:rgba(255,255,255,0.06);border-radius:3px;overflow:hidden"><div style="width:' + spendPct + '%;height:100%;background:' + spendColor + ';border-radius:3px"></div></div>' +
        '<span style="font-size:10px;color:var(--muted)">' + spendPct + '%</span></div></td>' +
        '<td>' + formatNum(c.clicks) + '</td>' +
        '<td>' + formatNum(c.conversions) + '</td>' +
        '<td>$' + cpc + '</td></tr>';
    });
    tableHtml += '</tbody></table></div>';
  }

  // Platform breakdown
  var platformTotals = {};
  ads.forEach(function(c) {
    var p = c.platform || 'other';
    if (!platformTotals[p]) platformTotals[p] = 0;
    platformTotals[p] += c.spend || 0;
  });
  var platEntries = Object.keys(platformTotals).map(function(k) { return { label: k, val: platformTotals[k] }; });
  platEntries.sort(function(a, b) { return b.val - a.val; });
  var maxPlat = platEntries.length > 0 ? platEntries[0].val : 1;
  var platColors = { google: 'var(--blue)', facebook: 'var(--purple)', instagram: 'var(--amber)', bing: 'var(--teal)' };
  var platHtml = platEntries.map(function(p) {
    var pct = Math.round(p.val / maxPlat * 100);
    var color = platColors[p.label] || 'var(--indigo)';
    return '<div class="pipeline-bar"><div class="pipeline-label" style="text-transform:capitalize">' + escHtml(p.label) + '</div>' +
      '<div class="pipeline-track"><div class="pipeline-fill" style="width:' + pct + '%;background:' + color + '">$' + formatNum(p.val) + '</div></div>' +
      '<div class="pipeline-count">$' + formatNum(p.val) + '</div></div>';
  }).join('');
  if (platEntries.length === 0) platHtml = '<div style="padding:16px;text-align:center;color:var(--muted);font-size:13px">No data</div>';

  // Budget health gauge
  var budgetPct = totalBudget > 0 ? Math.round(totalSpend / totalBudget * 100) : 0;

  document.getElementById('page-ads').innerHTML =
    '<div class="page-header"><div class="page-header-left"><h1>Ad Campaigns</h1><p>Paid advertising performance</p></div></div>' +

    kpiHtml +

    // Campaign table
    '<div class="panel" style="margin-bottom:16px"><div class="panel-header"><div class="panel-title">Campaigns</div>' +
    '<span class="badge badge-muted">' + ads.length + '</span></div>' +
    '<div class="panel-body" style="padding:0">' + tableHtml + '</div></div>' +

    '<div class="grid-2">' +
    // Platform breakdown
    '<div class="panel"><div class="panel-header"><div class="panel-title">Spend by Platform</div></div>' +
    '<div class="panel-body">' + platHtml + '</div></div>' +

    // Budget health
    '<div class="panel"><div class="panel-header"><div class="panel-title">Budget Health</div></div>' +
    '<div class="panel-body" style="text-align:center;padding:28px">' +
    scoreRing(Math.min(budgetPct, 100), 120) +
    '<div style="margin-top:12px;font-size:13px;color:var(--text)">' + budgetPct + '% of total budget spent</div>' +
    '<div style="margin-top:4px;font-size:12px;color:var(--muted)">$' + formatNum(totalSpend) + ' of $' + formatNum(totalBudget) + '</div>' +
    '</div></div></div>';
}

// ════════════════════════════════════════════════════
//  TAB 6: SEO
// ════════════════════════════════════════════════════
function renderSeo() {
  var seo = CLIENT.seo || {};
  var title = seo.title || '';
  var description = seo.description || '';
  var keywords = seo.keywords || '';
  var city = seo.city || '';
  var liveUrl = CLIENT.liveUrl || '';

  // Calculate SEO score
  var seoScore = 0;
  if (title.length > 0) seoScore += 20;
  if (description.length > 0) seoScore += 20;
  if (keywords.length > 0) seoScore += 15;
  if (city.length > 0) seoScore += 15;
  // Simulate h1 and canonical checks
  var hasH1 = title.length > 0; // approximate
  var hasCanonical = liveUrl.length > 0;
  if (hasH1) seoScore += 15;
  if (hasCanonical) seoScore += 15;

  // Keywords as pills
  var keywordsList = keywords ? keywords.split(',').map(function(k) { return k.trim(); }).filter(function(k) { return k.length > 0; }) : [];

    ? keywordsList.map(function(k) {
        return '<span class="badge badge-indigo" style="margin:3px 4px 3px 0;font-size:11px">' + escHtml(k) + '</span>';
      }).join('')

  // Title and description analysis

  var descLen = description.length;
  var titleColor = titleLen >= 30 && titleLen <= 60 ? 'var(--green)' : titleLen > 0 ? 'var(--amber)' : 'var(--red)';
  var descColor = descLen >= 120 && descLen <= 160 ? 'var(--green)' : descLen > 0 ? 'var(--amber)' : 'var(--red)';

  // SERP preview
  var serpTitle = title || CLIENT.bizName + ' | Your City';
  var serpDesc = description || 'No meta description set. Search engines will use page content as a preview.';

    '</div></div>' +

    '<div class="panel-body">' +
    '<div style="margin-bottom:16px"><div class="form-label">Title Tag <span style="color:' + titleColor + ';font-weight:400;text-transform:none;letter-spacing:0">(' + titleLen + ' chars)</span></div>' +
    '<div style="font-size:13px;color:var(--white);padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius)">' + (title ? escHtml(title) : '<span style="color:var(--muted)">Not set</span>') + '</div></div>' +
    '<div style="margin-bottom:16px"><div class="form-label">Meta Description <span style="color:' + descColor + ';font-weight:400;text-transform:none;letter-spacing:0">(' + descLen + ' chars)</span></div>' +
    '<div style="font-size:13px;color:var(--white);padding:10px 14px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.07);border-radius:var(--radius);line-height:1.5">' + (description ? escHtml(description) : '<span style="color:var(--muted)">Not set</span>') + '</div></div>' +
    '<div class="form-label">Keywords</div>' +
    '<div style="padding:4px 0">' + keywordsHtml + '</div>' +
    '</div></div></div>' +

    // Local SEO
    '<div class="grid-2" style="margin-top:16px">' +
    '<div class="panel"><div class="panel-header"><div class="panel-title">Local SEO</div></div>' +
    '<div class="panel-body">' +
    '<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 0;border-bottom:1px solid rgba(255,255,255,0.03)">' +
    '<span style="font-size:13px;color:var(--text)">Target City</span>' +

function renderContent() {
  var items = getContentItems();
  var published = items.filter(function(c) { return c.status === 'published'; }).length;
  var scheduled = items.filter(function(c) { return c.status === 'scheduled'; }).length;
  var drafts = items.filter(function(c) { return c.status === 'draft'; }).length;

  // Stats
  var statsHtml = '<div class="kpi-grid" style="grid-template-columns:repeat(3,1fr)">' +
    '<div class="kpi-card card-3d" style="--accent:var(--green)"><div class="kpi-glow"></div><div class="kpi-label">Published</div><div class="kpi-value">' + published + '</div></div>' +

  var typeBadge = { blog: 'badge-indigo', social: 'badge-purple', update: 'badge-teal' };

    items.sort(function(a, b) { return new Date(b.date || b.createdAt) - new Date(a.date || a.createdAt); });

function submitRequest() {
  var subject = document.getElementById('req-subject').value.trim();
  var category = document.getElementById('req-category').value;
  var priority = document.getElementById('req-priority').value;
  var description = document.getElementById('req-description').value.trim();

  if (!subject) { toast('Please enter a subject', 'error'); return; }
  if (!description) { toast('Please enter a description', 'error'); return; }

  if (!DB.changeRequests) DB.changeRequests = [];
  DB.changeRequests.push({
    id: 'cr-' + Date.now(),
    clientId: CLIENT.id,
    subject: subject,
    category: category,
    priority: priority,
    description: description,
    status: 'pending',
    date: new Date().toISOString().split('T')[0],
    createdAt: new Date().toISOString()
  });
  saveDB();

  toast('Request submitted successfully', 'success');
  renderSupport();
  navigate('support');
}

function toggleFaq(index) {
  var el = document.getElementById('faq-' + index);
  if (el) el.classList.toggle('open');
}

    '<div><div class="form-label">Business Name</div><div style="font-size:14px;color:var(--white);font-weight:600">' + escHtml(CLIENT.bizName) + '</div></div>' +
    '<div><div class="form-label">Plan</div><div style="font-size:14px;color:var(--white);font-weight:600;text-transform:capitalize">' + escHtml(CLIENT.plan || '--') + '</div></div>' +
    '<div><div class="form-label">Status</div><div><span class="badge ' + (CLIENT.status === 'live' ? 'badge-green' : CLIENT.status === 'onboarding' ? 'badge-amber' : 'badge-muted') + '"><span class="badge-dot"></span> ' + escHtml(CLIENT.status || '--') + '</span></div></div>' +
    '<div><div class="form-label">Website URL</div><div style="font-size:13px;color:var(--indigo2)">' + escHtml(CLIENT.liveUrl || 'In progress') + '</div></div>' +
    '</div></div></div>';
}

function saveAccount() {
  var name = document.getElementById('acct-name').value.trim();
  var email = document.getElementById('acct-email').value.trim();
  var phone = document.getElementById('acct-phone').value.trim();

  if (!name) { toast('Name is required', 'error'); return; }
  if (!email) { toast('Email is required', 'error'); return; }

  // Update client in DB
  var clientId = USER.clientId || USER.client_id;
  var client = (DB.clients || []).find(function(c) { return c.id === clientId; });
  if (client) {
    client.contactName = name;
    client.email = email;
    client.phone = phone;
    client.updatedAt = new Date().toISOString().split('T')[0];
    saveDB();
    CLIENT = client;
    toast('Account updated successfully', 'success');
  } else {
    toast('Error updating account', 'error');
  }
}

// ════════════════════════════════════════════════════
//  CURSOR CANVAS
// ════════════════════════════════════════════════════
function initCursor() {
  var canvas = document.getElementById('cursor-canvas');
  if (!canvas) return;
  var ctx = canvas.getContext('2d');
  var W, H;
  function resize() { W = canvas.width = window.innerWidth; H = canvas.height = window.innerHeight; }
  resize(); window.addEventListener('resize', resize);
  var mx = W / 2, my = H / 2;
  document.addEventListener('mousemove', function(e) { mx = e.clientX; my = e.clientY; });
  var sparks = [];
  function spawnSparks() {
    var count = 3 + Math.floor(Math.random() * 3);
    for (var i = 0; i < count; i++) {
      var angle = Math.random() * Math.PI * 2;
      var speed = 0.6 + Math.random() * 1.2;
      var zSpeed = 1.5 + Math.random() * 2.5;
      sparks.push({ x: mx, y: my, z: 0, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed, vz: zSpeed, life: 1, maxLife: 1, trail: [{ x: mx, y: my, z: 0 }] });
    }
  }
  function project(x, y, z) {
    var fov = 400; var scale = fov / (fov + z);
    return { x: mx + (x - mx) * scale, y: my + (y - my) * scale, scale: scale };
  }
  function draw() {
    ctx.clearRect(0, 0, W, H);
    if (Math.random() > 0.3) spawnSparks();
    for (var i = sparks.length - 1; i >= 0; i--) {
      var s = sparks[i];
      s.x += s.vx; s.y += s.vy; s.z += s.vz; s.life -= 0.03;
      if (s.life <= 0 || s.z > 600) { sparks.splice(i, 1); continue; }
      s.trail.push({ x: s.x, y: s.y, z: s.z });
      if (s.trail.length > 8) s.trail.shift();
      var alpha = s.life * 0.07;
      if (s.trail.length > 1) {
        ctx.beginPath();
        var p0 = project(s.trail[0].x, s.trail[0].y, s.trail[0].z);
        ctx.moveTo(p0.x, p0.y);
        for (var j = 1; j < s.trail.length; j++) {
          var tp = s.trail[j];
          var jx = (Math.random() - 0.5) * 4 * s.life;
          var jy = (Math.random() - 0.5) * 4 * s.life;
          var pp = project(tp.x + jx, tp.y + jy, tp.z);
          ctx.lineTo(pp.x, pp.y);
        }
        var endScale = project(s.x, s.y, s.z).scale;
        ctx.strokeStyle = 'rgba(201,169,110,' + alpha + ')';
        ctx.lineWidth = Math.max(0.3, 1.5 * endScale); ctx.stroke();
        ctx.strokeStyle = 'rgba(212,149,107,' + (alpha * 0.25) + ')';
        ctx.lineWidth = Math.max(0.5, 4 * endScale); ctx.stroke();
      }
      var tip = project(s.x, s.y, s.z);
      var dotSize = Math.max(0.5, 2.5 * tip.scale);
      ctx.beginPath(); ctx.arc(tip.x, tip.y, dotSize, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(232,213,168,' + (alpha * 0.8) + ')'; ctx.fill();
      if (s.trail.length > 3 && Math.random() > 0.92) {
        var bi = Math.floor(Math.random() * s.trail.length);
        var bp = s.trail[bi]; var bProj = project(bp.x, bp.y, bp.z);
        var bAngle = Math.random() * Math.PI * 2; var bLen = 6 + Math.random() * 10;
        ctx.beginPath(); ctx.moveTo(bProj.x, bProj.y);
        ctx.lineTo(bProj.x + Math.cos(bAngle) * bLen * bProj.scale, bProj.y + Math.sin(bAngle) * bLen * bProj.scale);
        ctx.strokeStyle = 'rgba(201,169,110,' + (alpha * 0.4) + ')'; ctx.lineWidth = 0.5; ctx.stroke();
      }
    }
    var grd = ctx.createRadialGradient(mx, my, 0, mx, my, 20);
    grd.addColorStop(0, 'rgba(201,169,110,.03)');
    grd.addColorStop(1, 'rgba(201,169,110,0)');
    ctx.beginPath(); ctx.arc(mx, my, 20, 0, Math.PI * 2); ctx.fillStyle = grd; ctx.fill();
    if (sparks.length > 100) sparks.splice(0, sparks.length - 100);
    requestAnimationFrame(draw);
  }
  draw();
}
</script>
